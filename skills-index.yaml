# Skill Index
# Agent 先比對 task intent 與 triggers，找到對應 skill 後再讀 entrypoint。
# 不掃描整個 skills/ 目錄。

skills_index_version: v1
status: candidate
owner_layer: knowledge/indexes
description: >
  Skill routing index。讓 AI 先路由 skill，而不是掃整個 repo。
  每個 skill 定義 triggers、cost、entrypoint 與 summary path。

skills:
  - id: apk-analysis
    name: APK Analysis
    description: 授權 APK 流量分析、動態抓包、Flutter/Dart AOT、response 解碼、文件化
    triggers:
      - apk
      - mitm
      - flutter
      - frida
      - traffic-analysis
      - proxy
      - reverse-engineering
      - network-capture
      - dart-aot
      - hls
      - media-streaming
    cost:
      estimated_tokens: 4500
      context_load: high
    entrypoint: skills/apk-analysis/SKILL.md
    summary: knowledge/summaries/apk-analysis-pilot.md
    related:
      - architecture/apk-analysis-pilot-migration.md
      - analysis/apk/README.md
      - workflow/apk-analysis/README.md
      - intelligence/engineering/apk-analysis/README.md

  - id: app-development-guidance
    name: App/API/Embedded Development Guidance
    description: 將授權 App/API/Embedded/Firmware 觀察轉成開發 guidance、實作模式、控制項、檢查清單
    triggers:
      - api
      - backend
      - architecture
      - mobile
      - security
      - firmware
      - embedded
      - flutter
      - react-native
      - ios
      - android
      - kotlin
      - swift
      - typescript
      - dart
      - contract
      - codegen
      - signing
      - session
      - anti-tamper
    cost:
      estimated_tokens: 3500
      context_load: medium
    entrypoint: skills/app-development-guidance/SKILL.md
    summary: null
    related:
      - skills/app-development-guidance/README.md
      - skills/app-development-guidance/checklists/README.md
      - skills/app-development-guidance/controls/README.md

  - id: travel-planning
