# Skill Index
# Agent 先比對 task intent 與 triggers，找到對應 skill 後再讀 entrypoint。
# 不掃描整個 skills/ 目錄。

skills_index_version: v2
status: candidate
owner_layer: knowledge/indexes
description: >
  Skill routing index v2。讓 AI 先路由 skill，而不是掃整個 repo。
  每個 skill 定義 triggers、cost、weight、domains、dependencies、conflicts、
  entrypoint 與 summary path。Runtime 使用 weight 做 relevance scoring，
  domains/dependencies/conflicts 做 dynamic loading 與 conflict detection。

