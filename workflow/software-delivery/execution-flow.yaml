schema_version: executable-contract/v1
id: workflow.software-delivery.execution-flow.contract
title: Software delivery execution flow contract
owner_layer: workflow
source_markdown: workflow/software-delivery/execution-flow.md
status: active
contract_type: workflow_flow
blocking_level: blocking

runtime_projection:
  enabled: true
  target_key: workflow.software_delivery.execution_flow.contract
  surface_type: executable_yaml_contract
  execution_scope: workflow_execution

activation:
  events:
    - software_change_requested
    - code_review_requested
    - design_review_requested
    - release_review_requested
    - behavior_change_requested
    - refactor_or_replacement_requested
    - sdk_defect_reported
    - performance_sensitive_change_detected
  required_when:
    - Work involves development, implementation, code modification, code review, design review, release review, security review, or contract governance review.
    - A change may alter observable behavior, public contract, domain invariant, error handling, storage, security, performance, or tests.
    - A refactor, migration, replacement, new entrypoint, tool rewrite, or architecture split may replace existing capability.

required_sources:
  - workflow/software-delivery/README.md
  - workflow/software-delivery/execution-flow.md
  - workflow/software-delivery/artifact-gates.md
  - workflow/software-delivery/development-process.md
  - workflow/software-delivery/intake.md
  - workflow/software-delivery/contracts.md
  - workflow/software-delivery/test-strategy.md
  - workflow/software-delivery/validation.md
  - workflow/software-delivery/closure.md
  - workflow/software-delivery/surgical-changes.md
  - workflow/software-delivery/requirements/README.md
  - workflow/software-delivery/requirements/pre-build-interrogation.md
  - workflow/software-delivery/architecture/README.md
  - enforcement/goal-action-validation.md
  - enforcement/evidence-hierarchy.md
  - enforcement/sanitization.md
  - enforcement/linked-updates.md

loading_surfaces:
  intake:
    source: workflow/software-delivery/intake.md
    load_when:
      - new requirement, change intake, refactor or replacement parity, requirements cognition, product brief validation, missing information, or existing-project backfill is needed
    do_not_load_when:
      - contract is stable and task is pure implementation or evidence-only analysis
  contracts:
    source: workflow/software-delivery/contracts.md
    load_when:
      - contract governance, traceability, API/domain/error contracts, or contract-first discipline is needed
    do_not_load_when:
      - no contract or traceability surface changes
  test_strategy:
    source: workflow/software-delivery/test-strategy.md
    load_when:
      - BDD closure, test strategy, mutation testing, or test-first ordering is needed
    do_not_load_when:
      - task does not touch behavior proof or test design
  validation:
    source: workflow/software-delivery/validation.md
    load_when:
      - validation, performance gate, old/new behavior proof, or completion evidence is needed
    do_not_load_when:
      - implementation has not reached validation or task is evidence-only analysis
  closure:
    source: workflow/software-delivery/closure.md
    load_when:
      - Definition of Ready/Done, handoff, close-loop, or reusable lesson feedback is needed
    do_not_load_when:
      - task is still in intake, implementation, or validation
  surgical_caveats:
    source: workflow/software-delivery/surgical-changes.md
    load_when:
      - surgical change discipline, diff purity, or orphan cleanup boundary is needed
    do_not_load_when:
      - large greenfield implementation or evidence-only analysis
  examples:
    source: workflow/software-delivery/examples/EXAMPLES.md
    default_load: false
    load_when:
      - user explicitly asks for examples or ambiguity requires concrete behavior examples
    do_not_load_when:
      - default execution-only, evidence-only, or mixed workflow task

steps:
  - id: start_from_evidence
    order: 1
    action: Load the intake surface when needed, then define goal, action, validation, observed behavior, evidence layer, and confidence before promoting guidance or changing code.
    gates:
      - gate.software_delivery.evidence_classified
  - id: run_change_intake
    order: 2
    action: Read planning artifacts and classify the request as new behavior, bug fix, refactor/replacement, hardening, architecture decision, performance change, or documentation conflict.
    gates:
      - gate.software_delivery.change_intake_complete
  - id: run_pre_build_interrogation
    order: 3
    action: For plans, implementation, and framework changes, run pre-build interrogation for goal, scope, non-goals, acceptance, framework source-of-truth, duplication risk, and unknown disposition.
    required_if:
      - plan_requested
      - observable_behavior_change
      - framework_change_requested
      - ambiguous_requirement_detected
    gates:
      - gate.software_delivery.pre_build_interrogation_complete
  - id: run_requirements_checkpoint
    order: 4
    action: For observable behavior, run requirements stage for product impact, behavior boundary, acceptance definition, ambiguity disposition, and validation target.
    required_if:
      - observable_behavior_change
  - id: produce_replacement_parity_inventory
    order: 5
    action: For replacement or migration work, list old entrypoints, capabilities, side effects, dependencies, new entrypoints, parity status, and validation evidence before implementation.
    required_if:
      - refactor_or_replacement_requested
    gates:
      - gate.software_delivery.replacement_parity_ready
  - id: keep_docs_first_bdd_closure
    order: 6
    action: Load the test-strategy and contracts surfaces when behavior or contract changes require them, then update owner contracts, human-readable behavior specs, executable behavior tests, implementation, and traceability in the same batch.
    required_if:
      - observable_behavior_change
    gates:
      - gate.software_delivery.bdd_closure_complete
  - id: handle_sdk_defect_closure
    order: 7
    action: Reproduce SDK defects through supported public surfaces, sanitize evidence, and lock behavior with specs and regression tests when needed.
    required_if:
      - sdk_defect_reported
  - id: define_test_strategy
    order: 8
    action: Load the test-strategy surface, then define old behavior regression, new behavior proof, mutation/negative checks, persistence/integration tests, and hardware/performance evidence when relevant.
    gates:
      - gate.software_delivery.validation_target_defined
  - id: run_performance_gate
    order: 9
    action: Load the validation surface for performance-sensitive changes, then define latency, throughput, error-rate, and resource budgets plus load/stress/spike/soak evidence.
    required_if:
      - performance_sensitive_change_detected
  - id: validate_and_close
    order: 10
    action: Load validation and closure surfaces as needed, run at least one validation method, check blockers, update durable docs, feed reusable lessons when appropriate, and report scope honestly.
    gates:
      - gate.software_delivery.validation_complete

gates:
  - id: gate.software_delivery.evidence_classified
    blocks: implementation_or_completion_claim
    pass_when:
      - goal, action, and validation method are stated
      - observed behavior and evidence layer are identified
      - target-specific secrets, tokens, device IDs, raw user data, or project incident details are not copied into reusable guidance
  - id: gate.software_delivery.change_intake_complete
    blocks: code_change
    pass_when:
      - planning/product/issue/design/BDD/API contract source was read or a lightweight change brief was created
      - major claims are marked validated, assumption, open question, scoped out, or invalidated
      - blocker questions are asked before affected implementation continues
  - id: gate.software_delivery.pre_build_interrogation_complete
    blocks: implementation_plan_or_framework_change
    pass_when:
      - goal, scope, non-goals, acceptance, validation target, open questions, assumptions, and decision are recorded
      - framework changes identify canonical source, owner layer, runtime projection, generated surfaces, mirrors, compiler impact, and linked updates
      - duplicate rule body, activation path, runtime table, mirror, generated report, or ambiguous source-of-truth risk is removed, deprecated, or explicitly ranked
  - id: gate.software_delivery.replacement_parity_ready
    blocks: replacement_implementation
    pass_when:
      - parity inventory covers old entrypoints, capabilities, side effects, external dependencies, target new entrypoints, parity status, and validation evidence
      - deferred, not planned, or tool-specific gaps have non-blocking rationale
  - id: gate.software_delivery.bdd_closure_complete
    blocks: behavior_change_completion
    pass_when:
      - owner contract, human-readable behavior spec, executable behavior test, implementation, and traceability move together
      - scoped documentation debt is explicitly recorded if any part is deferred
  - id: gate.software_delivery.validation_target_defined
    blocks: validation_phase
    pass_when:
      - old behavior protection and new behavior proof are separated
      - relevant contract, integration, fixture, mutation, property, persistence, generated-client, host, target, or hardware-in-loop checks are chosen
  - id: gate.software_delivery.validation_complete
    blocks: final_completion_response
    pass_when:
      - at least one validation method ran or a blocker is reported
      - unresolved blockers affecting behavior, contract, error handling, security, storage, ownership, or tests are not hidden
      - completion claim scope matches evidence

required_evidence:
  - goal / action / validation statement
  - change intake classification
  - pre-build interrogation decision for plans, ambiguous requests, and framework changes
  - requirements or behavior boundary evidence when observable behavior changes
  - framework source-of-truth and duplication risk evidence when framework/runtime/governance/workflow surfaces change
  - parity inventory when replacing existing capability
  - BDD / contract / test traceability when behavior changes
  - performance budget evidence when performance-sensitive
  - validation result or blocker

success_criteria:
  - Software changes start from evidence and owner contracts rather than implementation guesses.
  - Plans and framework changes pass pre-build interrogation before implementation work begins.
  - Behavior changes keep docs, BDD/contracts, tests, implementation, and traceability aligned.
  - Replacement and migration work preserves observable capability or records scoped gaps.
  - Validation distinguishes old behavior still protected from new behavior proven.
  - Reusable lessons are sanitized and linked to the correct owner layer.

failure_modes:
  - id: implementation_as_source_of_truth
    detection: Agent treats passing code or tests as the only source when product, BDD, API, or owner contract conflicts.
    recovery: Stop patching, reload owner sources, rebuild execution graph, and update contracts before continuing.
  - id: plan_without_pre_build_interrogation
    detection: Agent produces an implementation plan or framework migration without goal, scope, non-goals, acceptance, source-of-truth, duplication risk, and unknown disposition.
    recovery: Stop implementation planning, run pre-build interrogation, ask blocker questions, and revise the plan.
  - id: replacement_without_parity
    detection: New entrypoint, migration, refactor, or tool rewrite starts without old/new capability inventory.
    recovery: Produce parity inventory and validation evidence before implementation.
  - id: green_tests_stale_docs
    detection: Tests pass but owner docs, BDD, contracts, or traceability still describe old behavior.
    recovery: Update durable docs in the same batch or record scoped documentation debt.
  - id: performance_claim_without_budget
    detection: Agent says performance is fine from functional tests or average latency only.
    recovery: Define P95/P99, throughput, error-rate, resource budget, and appropriate performance test evidence.

final_status_report:
  required_fields:
    - change_type
    - sources_read
    - pre_build_interrogation
    - contracts_or_bdd_updated
    - parity_status
    - validation_performed
    - blockers_or_deferred_scope
