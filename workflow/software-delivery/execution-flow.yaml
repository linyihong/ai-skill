schema_version: executable-contract/v1
id: workflow.software-delivery.execution-flow.contract
title: Software delivery execution flow contract
owner_layer: workflow
source_markdown: workflow/software-delivery/execution-flow.md
status: active
contract_type: workflow_flow
blocking_level: blocking

runtime_projection:
  enabled: true
  target_key: workflow.software_delivery.execution_flow.contract
  surface_type: executable_yaml_contract
  execution_scope: workflow_execution

activation:
  events:
    - software_change_requested
    - code_review_requested
    - design_review_requested
    - release_review_requested
    - behavior_change_requested
    - refactor_or_replacement_requested
    - sdk_defect_reported
    - performance_sensitive_change_detected
    - state_visibility_gap_detected
    - proxy_prone_side_effect_detected
    - critical_journey_claim
    - journey_validation_claim
  required_when:
    - Work involves development, implementation, code modification, code review, design review, release review, security review, or contract governance review.
    - A change may alter observable behavior, public contract, domain invariant, error handling, storage, security, performance, or tests.
    - A refactor, migration, replacement, new entrypoint, tool rewrite, or architecture split may replace existing capability.
    - A success signal may not prove persisted, external, identity-specific, or user-observable state.
    - A project-defined critical journey is claimed complete or a BDD scenario defines a multi-step user outcome.

required_sources:
  - workflow/software-delivery/README.md
  - workflow/software-delivery/execution-flow.md
  - workflow/software-delivery/artifact-gates.md
  - workflow/software-delivery/development-process.md
  - workflow/software-delivery/intake.md
  - workflow/software-delivery/contracts.md
  - workflow/software-delivery/ui-contracts.md
  - workflow/software-delivery/ui-governance.md
  - workflow/software-delivery/test-strategy.md
  - workflow/software-delivery/validation.md
  - workflow/software-delivery/closure.md
  - workflow/software-delivery/surgical-changes.md
  - workflow/software-delivery/requirements/README.md
  - workflow/software-delivery/requirements/pre-build-interrogation.md
  - workflow/software-delivery/architecture/README.md
  - enforcement/goal-action-validation.md
  - enforcement/evidence-hierarchy.md
  - enforcement/sanitization.md
  - enforcement/linked-updates.md
  - intelligence/engineering/execution/validation-reasoning/state-visibility-gap.md
  - intelligence/engineering/execution/validation-reasoning/evidence-model.md
  - intelligence/engineering/execution/validation-reasoning/evidence-depth.md
  - intelligence/engineering/execution/validation-reasoning/evidence-chain-validation.md
  - intelligence/engineering/anti-patterns/mock-completeness-illusion.md
  - intelligence/engineering/anti-patterns/validation-proxy-trap.md

loading_surfaces:
  intake:
    source: workflow/software-delivery/intake.md
    load_when:
      - new requirement, change intake, refactor or replacement parity, requirements cognition, product brief validation, missing information, or existing-project backfill is needed
    do_not_load_when:
      - contract is stable and task is pure implementation or evidence-only analysis
  contracts:
    source: workflow/software-delivery/contracts.md
    load_when:
      - contract governance, traceability, API/domain/error contracts, or contract-first discipline is needed
    do_not_load_when:
      - no contract or traceability surface changes
  ui_contracts:
    source: workflow/software-delivery/ui-contracts.md
    load_when:
      - frontend, mobile, CLI, SDK, job, test harness, or other consumer surface needs Consumer, UI Behavior, Screen, ViewModel, or Accessibility contracts
      - provider and consumer teams or agents need to work in parallel from shared contracts
    do_not_load_when:
      - no consumer surface exists or the task is provider-internal only
  ui_governance:
    source: workflow/software-delivery/ui-governance.md
    load_when:
      - UI or consumer surface needs design-system enforcement, accessibility evidence, responsive evidence, behavior pattern checks, visual baseline review, AI visual review scoping, or UI compliance completion evidence
      - UI contract exists and the task needs to classify governance domain, render context, collection method, validation mechanism, evidence class, severity, or project-local design-system policy
    do_not_load_when:
      - no user-visible consumer surface exists or the task only defines expected UI contracts without compliance evidence
  test_strategy:
    source: workflow/software-delivery/test-strategy.md
    load_when:
      - BDD closure, Journey Specification, test strategy, mutation testing, or test-first ordering is needed
    do_not_load_when:
      - task does not touch behavior proof or test design
  validation:
    source: workflow/software-delivery/validation.md
    load_when:
      - validation, Journey Validation, evidence acquisition, performance gate, old/new behavior proof, or completion evidence is needed
    do_not_load_when:
      - implementation has not reached validation or task is evidence-only analysis
  closure:
    source: workflow/software-delivery/closure.md
    load_when:
      - Definition of Ready/Done, handoff, close-loop, or reusable lesson feedback is needed
    do_not_load_when:
      - task is still in intake, implementation, or validation
  surgical_caveats:
    source: workflow/software-delivery/surgical-changes.md
    load_when:
      - surgical change discipline, diff purity, or orphan cleanup boundary is needed
    do_not_load_when:
      - large greenfield implementation or evidence-only analysis
  examples:
    source: workflow/software-delivery/examples/EXAMPLES.md
    default_load: false
    load_when:
      - user explicitly asks for examples or ambiguity requires concrete behavior examples
    do_not_load_when:
      - default execution-only, evidence-only, or mixed workflow task

steps:
  - id: start_from_evidence
    order: 1
    action: Load the intake surface when needed, then define goal, action, validation, observed behavior, evidence layer, and confidence before promoting guidance or changing code.
    gates:
      - gate.software_delivery.evidence_classified
  - id: run_change_intake
    order: 2
    action: Read planning artifacts and classify the request as new behavior, bug fix, refactor/replacement, hardening, architecture decision, performance change, or documentation conflict.
    gates:
      - gate.software_delivery.change_intake_complete
  - id: run_pre_build_interrogation
    order: 3
    action: For plans, implementation, and framework changes, run pre-build interrogation for goal, scope, non-goals, acceptance, framework source-of-truth, duplication risk, and unknown disposition.
    required_if:
      - plan_requested
      - observable_behavior_change
      - framework_change_requested
      - ambiguous_requirement_detected
    gates:
      - gate.software_delivery.pre_build_interrogation_complete
  - id: run_requirements_checkpoint
    order: 4
    action: For observable behavior, run requirements stage for product impact, behavior boundary, acceptance definition, ambiguity disposition, and validation target.
    required_if:
      - observable_behavior_change
  - id: produce_replacement_parity_inventory
    order: 5
    action: For replacement or migration work, list old entrypoints, capabilities, side effects, dependencies, new entrypoints, parity status, and validation evidence before implementation.
    required_if:
      - refactor_or_replacement_requested
    gates:
      - gate.software_delivery.replacement_parity_ready
  - id: keep_docs_first_bdd_closure
    order: 6
    action: Load the test-strategy, contracts, and ui-contracts surfaces when behavior, contract, or consumer-facing changes require them, then update owner contracts, human-readable behavior specs, executable behavior tests, implementation, and traceability in the same batch.
    required_if:
      - observable_behavior_change
    gates:
      - gate.software_delivery.bdd_closure_complete
  - id: classify_ui_governance
    order: 7
    action: Load the ui-governance surface when UI compliance evidence is needed, then classify governance domain, render context, collection method, validation mechanism, evidence class, severity, project-local design-system policy, and advisory runtime projection boundary before test strategy or completion claims.
    required_if:
      - ui_compliance_claim
      - design_system_policy_applies
      - accessibility_evidence_required
      - visual_validation_claim
      - ai_visual_review_used
      - responsive_validation_claim
    gates:
      - gate.software_delivery.ui_governance_complete
      - gate.software_delivery.ui_evidence_classified
      - gate.software_delivery.ui_visual_validation_scoped
      - gate.software_delivery.responsive_validation_complete
  - id: handle_sdk_defect_closure
    order: 8
    action: Reproduce SDK defects through supported public surfaces, sanitize evidence, and lock behavior with specs and regression tests when needed.
    required_if:
      - sdk_defect_reported
  - id: define_test_strategy
    order: 9
    action: Load the test-strategy surface, then define old behavior regression, new behavior proof, BDD-owned Journey Specification when a multi-step user outcome is in scope, mutation/negative checks, persistence/integration tests, state visibility evidence chain, and hardware/performance evidence when relevant.
    gates:
      - gate.software_delivery.validation_target_defined
  - id: run_performance_gate
    order: 10
    action: Load the validation surface for performance-sensitive changes, then define latency, throughput, error-rate, and resource budgets plus load/stress/spike/soak evidence.
    required_if:
      - performance_sensitive_change_detected
  - id: validate_and_close
    order: 11
    action: Load validation and closure surfaces as needed, acquire evidence, run validation at the required evidence depth, validate critical journey execution against expected outcomes when applicable, check blockers, update durable docs, feed reusable lessons when appropriate, and report scope honestly.
    gates:
      - gate.software_delivery.validation_complete
      - gate.software_delivery.journey_validation_complete

gates:
  - id: gate.software_delivery.evidence_classified
    blocks: implementation_or_completion_claim
    pass_when:
      - goal, action, and validation method are stated
      - observed behavior and evidence layer are identified
      - target-specific secrets, tokens, device IDs, raw user data, or project incident details are not copied into reusable guidance
  - id: gate.software_delivery.change_intake_complete
    blocks: code_change
    pass_when:
      - planning/product/issue/design/BDD/API contract source was read or a lightweight change brief was created
      - major claims are marked validated, assumption, open question, scoped out, or invalidated
      - blocker questions are asked before affected implementation continues
  - id: gate.software_delivery.pre_build_interrogation_complete
    blocks: implementation_plan_or_framework_change
    pass_when:
      - goal, scope, non-goals, acceptance, validation target, open questions, assumptions, and decision are recorded
      - framework changes identify canonical source, owner layer, runtime projection, generated surfaces, mirrors, compiler impact, and linked updates
      - duplicate rule body, activation path, runtime table, mirror, generated report, or ambiguous source-of-truth risk is removed, deprecated, or explicitly ranked
  - id: gate.software_delivery.replacement_parity_ready
    blocks: replacement_implementation
    pass_when:
      - parity inventory covers old entrypoints, capabilities, side effects, external dependencies, target new entrypoints, parity status, and validation evidence
      - deferred, not planned, or tool-specific gaps have non-blocking rationale
  - id: gate.software_delivery.bdd_closure_complete
    blocks: behavior_change_completion
    pass_when:
      - owner contract, human-readable behavior spec, executable behavior test, implementation, and traceability move together
      - scoped documentation debt is explicitly recorded if any part is deferred
  - id: gate.software_delivery.ui_governance_complete
    blocks: ui_compliance_completion_claim
    pass_when:
      - UI governance domain is classified as Contract, Design System, Accessibility, Responsive, Behavior, Closure, or not_applicable
      - render context is classified as desktop, tablet, mobile, narrow_mobile, not_applicable, or project-declared equivalent
      - collection method is classified separately as contract_readback, static_analysis, runtime_trace, browser_review, human_observation, or not_applicable
      - validation mechanism is classified separately as deterministic, screenshot_diff, ai_review, manual_review, or not_applicable
      - no governance domain is represented solely by a validation mechanism
      - no validation mechanism is owned by a single governance domain
      - no collection method is treated as a governance domain, validation mechanism, or proof of compliance by itself
  - id: gate.software_delivery.ui_evidence_classified
    blocks: ui_validation_claim
    pass_when:
      - evidence class is identified as contract, runtime, accessibility_scan, visual_diff, screenshot, responsive_capture, ai_review, human_review, or not_applicable
      - severity is identified as block_candidate, warn, research, or not_applicable
      - project-local design-system policy is referenced when design-token or component-primitive compliance is claimed
      - evidence acquisition is distinguished from evaluation result when browser_review, screenshot, visual_diff, ai_review, or human_review is involved
  - id: gate.software_delivery.ui_visual_validation_scoped
    blocks: ai_visual_or_visual_regression_blocking_claim
    pass_when:
      - AI visual review remains warn/research unless project opt-in, objective rubric, deterministic capture, and review policy exist
      - screenshot_diff claims name the baseline and capture determinism
      - visual taste is not treated as a build-failure equivalent without objective criteria
      - browser_review is treated as evidence acquisition, not as a blocking validator
  - id: gate.software_delivery.responsive_validation_complete
    blocks: responsive_ui_completion_claim
    pass_when:
      - responsive claims name the governed render contexts rather than device SKUs
      - browser_review responsive evidence includes at least desktop_capture and mobile_capture or equivalent wide/narrow contexts
      - each required render context records screenshot, DOM snapshot or layout metrics, and interaction trace when user action, keyboard, focus, sticky chrome, modal, sidebar, safe-area, orientation, or touch target behavior is in scope
      - desktop pass does not substitute for mobile, narrow_mobile, tablet, orientation, safe-area, or high-zoom evidence
  - id: gate.software_delivery.validation_target_defined
    blocks: validation_phase
    pass_when:
      - old behavior protection and new behavior proof are separated
      - relevant contract, integration, fixture, mutation, property, persistence, generated-client, host, target, or hardware-in-loop checks are chosen
      - state visibility gaps map observed signals to real state, evidence scope, and evidence chain segments
      - proxy-prone side effects identify whether independent observation is required
      - critical journey claims have BDD-owned Journey Specification, project-defined journey name, criticality reason, side-effect chain, expected outcomes, and observable evidence plan
  - id: gate.software_delivery.validation_complete
    blocks: final_completion_response
    pass_when:
      - at least one validation method ran or a blocker is reported
      - state visibility gap claims have evidence depth matching risk
      - critical payment, email, external API, storage, queue, or entitlement paths include independent observation or are reported as blocked
      - unresolved blockers affecting behavior, contract, error handling, security, storage, ownership, or tests are not hidden
      - completion claim scope matches evidence
  - id: gate.software_delivery.journey_validation_complete
    blocks: critical_journey_completion_claim
    pass_when:
      - Journey is treated as validation scope, not validation_domain or UI governance domain
      - Journey Specification is owned by BDD or an equivalent project behavior spec
      - journey name and criticality are project-defined, with criticality reason recorded for critical journeys
      - side-effect chain is listed from user action through expected state transitions
      - expected outcomes are separated from observable evidence
      - observable evidence proves the expected outcomes at the required evidence depth
      - API success, adapter success, mock pass, screen-level UI pass, or screenshot-only evidence is not accepted as full journey proof

required_evidence:
  - goal / action / validation statement
  - change intake classification
  - pre-build interrogation decision for plans, ambiguous requests, and framework changes
  - requirements or behavior boundary evidence when observable behavior changes
  - framework source-of-truth and duplication risk evidence when framework/runtime/governance/workflow surfaces change
  - parity inventory when replacing existing capability
  - BDD / contract / test traceability when behavior changes
  - Journey Specification and Journey Validation evidence when a project-defined critical journey is claimed complete
  - Consumer / UI Behavior / Screen / ViewModel contract evidence when a consumer surface changes
  - UI governance domain, render context, collection method, validation mechanism, evidence class, severity, and project-local design-system policy when UI compliance is claimed
  - responsive validation matrix with at least desktop and mobile evidence when responsive behavior is claimed
  - advisory-only runtime projection boundary when UI governance signals are named before runtime/enforcement promotion
  - performance budget evidence when performance-sensitive
  - state visibility / evidence chain coverage when observed success may diverge from real state
  - independent observation when proxy-prone side effects are critical
  - validation result or blocker

success_criteria:
  - Software changes start from evidence and owner contracts rather than implementation guesses.
  - Plans and framework changes pass pre-build interrogation before implementation work begins.
  - Behavior changes keep docs, BDD/contracts, tests, implementation, and traceability aligned.
  - Replacement and migration work preserves observable capability or records scoped gaps.
  - Validation distinguishes old behavior still protected from new behavior proven.
  - Validation evidence follows the state propagation chain when observed success may diverge from real state.
  - Critical journey validation follows the BDD specification through side effects, expected outcomes, and observable evidence.
  - Reusable lessons are sanitized and linked to the correct owner layer.

failure_modes:
  - id: implementation_as_source_of_truth
    detection: Agent treats passing code or tests as the only source when product, BDD, API, or owner contract conflicts.
    recovery: Stop patching, reload owner sources, rebuild execution graph, and update contracts before continuing.
  - id: plan_without_pre_build_interrogation
    detection: Agent produces an implementation plan or framework migration without goal, scope, non-goals, acceptance, source-of-truth, duplication risk, and unknown disposition.
    recovery: Stop implementation planning, run pre-build interrogation, ask blocker questions, and revise the plan.
  - id: replacement_without_parity
    detection: New entrypoint, migration, refactor, or tool rewrite starts without old/new capability inventory.
    recovery: Produce parity inventory and validation evidence before implementation.
  - id: green_tests_stale_docs
    detection: Tests pass but owner docs, BDD, contracts, or traceability still describe old behavior.
    recovery: Update durable docs in the same batch or record scoped documentation debt.
  - id: performance_claim_without_budget
    detection: Agent says performance is fine from functional tests or average latency only.
    recovery: Define P95/P99, throughput, error-rate, resource budget, and appropriate performance test evidence.
  - id: state_visibility_gap_unverified
    detection: Agent accepts API, adapter, mock, or UI success without proving persisted, external, identity-specific, or user-observable state.
    recovery: Load validation-reasoning evidence chain sources, map evidence scope, and require live_system or independent_observation evidence as appropriate.
  - id: validation_proxy_trap
    detection: Agent treats API 200, SMTP success, queue publish, upload success, or payment accepted as final proof of business/user effect.
    recovery: Identify proxy signal scope and require final readback, provider/consumer evidence, or independent observation.
  - id: ui_governance_acquisition_mechanism_collapse
    detection: Agent treats browser_review, screenshot capture, DOM snapshot, accessibility tree, or human observation as a validation mechanism or proof of compliance.
    recovery: Reclassify through ui-governance.md and validation.md; record collection method separately from validation mechanism, evidence class, severity, and project-local policy.
  - id: responsive_context_evidence_missing
    detection: Agent claims responsive validation from desktop-only evidence, names only device SKUs, or omits constrained render-context capture.
    recovery: Reclassify as Responsive domain, record render_context, and collect at least desktop_capture plus mobile_capture or equivalent wide/narrow evidence before completion.
  - id: journey_validation_proxy_success
    detection: Agent treats API 200, adapter success, mock pass, or screen-level UI pass as proof that a critical user journey completed.
    recovery: Load test-strategy.md and validation.md; require BDD-owned Journey Specification, side-effect chain, expected outcomes, and observable evidence before completion.

final_status_report:
  required_fields:
    - change_type
    - sources_read
    - pre_build_interrogation
    - contracts_or_bdd_updated
    - parity_status
    - validation_performed
    - evidence_depth_and_chain_scope
    - blockers_or_deferred_scope
