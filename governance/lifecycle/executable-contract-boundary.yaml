schema_version: "1.0"
id: governance.lifecycle.executable-contract-boundary
status: active
owner_layer: governance
source_markdown: governance/lifecycle/executable-contract-boundary.md

runtime_projection:
  enabled: true
  target_key: governance.executable_contract_boundary.contract
  surface: generated_surfaces

purpose: >
  定義哪些 Markdown / YAML source 需要 machine-readable executable
  contract，以及哪些 contract 必須投影到 runtime.db。

boundary_rules:
  source_ownership:
    rule: keep_contract_source_in_owner_layer
    description: Governance、enforcement 與 workflow contract 留在 owner source 旁邊。
    forbidden:
      - moving governance source into runtime/
      - moving enforcement source into runtime/
      - creating runtime/**/*.yaml committed mirrors
  runtime_projection:
    rule: project_execution_affecting_contracts_to_runtime_db
    required_marker:
      runtime_projection.enabled: true
    target: runtime/runtime.db generated_surfaces
  markdown_companion:
    rule: markdown_explains_yaml_executes
    description: Markdown 承載理由與維護脈絡；YAML 承載可執行 triggers、steps、gates 與 evidence。
  canonical_policy:
    rule: executable_contract_boundary_md_is_yaml_placement_policy
    description: governance/lifecycle/executable-contract-boundary.md 定義 Ai-skill YAML 應放在哪裡；schema 與 inventory 文件不得重新定義 placement policy。
    supporting_sources:
      schema: metadata/executable-contract-schema.md
      inventory: governance/lifecycle/executable-contract-inventory.yaml
      runtime_boundary: runtime/README.md
  activation_lookup:
    rule: contract_backed_activation_replaces_activation_rules_tables
    description: owner-layer executable YAML contract 定義 activation；runtime.db 只保存 generated_surfaces projection，不再維護 activation_rules / activation_rules_mirror tables。
    contract_first_when:
      - owner_layer_executable_contract_exists
      - contract_contains_activation
    transition_exception: 若未來新增非 enforcement activation lookup，必須先建立 owner-layer contract 或明確 governance exception，不得恢復雙寫。
  pre_build_interrogation:
    rule: framework_contract_changes_require_interrogation
    description: 修改 executable contract placement、runtime projection 或 framework source-of-truth 前，必須先執行 pre-build interrogation，確認 canonical owner、projection boundary、duplication risk 與 validation target。
    required_source: workflow/software-delivery/requirements/pre-build-interrogation.md
    blocks:
      - migration_without_source_discovery
      - duplicate_runtime_projection
      - ambiguous_contract_owner

yaml_required_when:
  - ordered_steps
  - activation_conditions
  - required_reads
  - depends_on_relationships
  - exit_conditions
  - blocking_gates
  - required_evidence
  - failure_actions
  - final_status_report

yaml_not_required_when:
  - philosophy_only
  - architecture_rationale_only
  - historical_decision_record
  - non_executable_navigation_index

placement:
  governance:
    contract_location: governance/**/*.yaml
    runtime_projection: required_when_execution_affecting
  enforcement:
    contract_location: enforcement/**/*.yaml
    runtime_projection: required_when_execution_affecting
    activation_rule_boundary: executable enforcement semantics 屬於 enforcement/*.yaml；runtime 只保存 generated_surfaces projection。
  workflow:
    contract_location: workflow/**/*.yaml
    runtime_projection: required_when_execution_affecting
  ai_tools:
    contract_location: ai-tools/**/*.yaml
    runtime_projection: required_when_execution_affecting
  metadata_rules:
    contract_location: metadata/rules/*.yaml
    default_role: metadata_only
    runtime_projection: forbidden_unless_full_executable_contract
    allowed_exception: Metadata YAML 只有在具備 schema_version executable-contract/v1、contract_type、blocking_level、activation、execution-bearing fields，且 runtime_projection.enabled 為 true 時，才可承載 executable contract。
  runtime_internal_config:
    contract_location: runtime/runtime.db
    runtime_projection: already_runtime_owned

inventory_reference:
  canonical_source: governance/lifecycle/executable-contract-inventory.yaml
  rule: 不在 boundary contract 中維護 contract inventory rows。
  allowed_states:
    - contract_exists
    - contract_required
    - markdown_only
    - not_applicable

agent_update_rule:
  if_markdown_has_executable_signals_without_yaml:
    action: create_or_record_yaml_contract_gap
    blocking_level: linked_update_gap
  if_yaml_contract_affects_execution:
    action: ensure_runtime_projection_enabled_and_compile_runtime_db
    blocking_level: runtime_surface_gate
