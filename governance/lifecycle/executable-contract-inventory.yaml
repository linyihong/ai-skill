schema_version: executable-contract/v1
id: governance.lifecycle.executable-contract-inventory
title: Executable contract inventory
owner_layer: governance
source_markdown: governance/lifecycle/executable-contract-boundary.md
status: active
contract_type: schema_contract
blocking_level: advisory

runtime_projection:
  enabled: true
  target_key: governance.executable_contract_inventory.contract
  surface_type: executable_yaml_contract
  execution_scope: contract_migration_planning

activation:
  events:
    - executable_contract_migration
    - workflow_documentation_standard_update
    - enforcement_rule_yamlization
    - runtime_projection_validation
  required_when:
    - Deciding whether a Markdown or metadata YAML source requires companion executable YAML.
    - Starting implementation for `plans/active/2026-05-22-0855-executable-yaml-contract-migration.md`.
    - Reviewing an agent change that claims a process is covered by YAML.

location_decisions:
  enforcement_contracts:
    decision: use_owner_layer_companion_yaml
    default_location: enforcement/*.yaml
    rationale: >
      Enforcement metadata in `metadata/rules/*.yaml` summarizes rules for routing and loading.
      It should not be upgraded in place until schema and validator coverage can prevent
      weaker agents from treating metadata-only YAML as an executable contract.
    allowed_exception: >
      `metadata/rules/*.yaml` may host an executable contract only when it includes
      `schema_version: executable-contract/v1`, `contract_type`, `blocking_level`,
      execution-bearing fields, and `runtime_projection.enabled: true`.
  workflow_contracts:
    decision: use_workflow_companion_yaml
    default_location: workflow/<domain>/<source>.yaml
    rationale: Workflow ownership stays with the workflow domain; runtime receives projections only.
  project_documentation_contracts:
    decision: allow_project_local_structured_contract
    default_location: project_convention
    rationale: >
      Other repositories can map the Ai-skill field semantics to their own front-matter,
      companion YAML, or structured contract format. Ai-skill defines the decision standard,
      not a forced downstream file layout.

decision_states:
  contract_required:
    meaning: Source contains executable signals and needs companion YAML or equivalent structured contract.
    required_followup:
      - create_or_update_owner_layer_yaml
      - enable_runtime_projection_if_execution_affecting
      - run_runtime_compile_refresh_validate
  markdown_only:
    meaning: Source is rationale, background, navigation, or human explanation without repeatable execution gates.
    required_followup:
      - keep_markdown_canonical
      - do_not_create_runtime_noise
  not_applicable:
    meaning: Source is a template, example, generated report, deprecated stub, or project-local output where executable contract ownership is elsewhere.
    required_followup:
      - record_reason
      - link_to_owner_contract_when_available

