# Example `.ai-skill-project.yaml` — place this file at the root of a
# downstream project (or in `.agent-goals/<project-id>/` for per-project
# metadata within a multi-project repository).
#
# Schema canonical: metadata/project/ai-skill-project-schema.yaml
# Human-readable explanation: metadata/project/README.md
#
# This file is illustrative only. All entity names below are synthetic
# placeholders — do NOT copy them verbatim into a real project.

project:
  id: example-project
  visibility: private

  private_entities:
    # A codename entity with two aliases. case_variants: auto means
    # Phase 1C projection expands match_tokens across CamelCase /
    # kebab-case / SCREAMING_SNAKE etc automatically.
    #
    # NOTE — intentional collision demo: this entity's match_tokens
    # include "Atlas", and the AtlasMobile entity (below) also includes
    # "Atlas" via its own match_tokens. This collision is deliberate to
    # exercise governance collision-detection in Phase 1C+ (a single
    # matched token may map back to multiple entities). Do not de-dupe
    # the overlap when copying this example for real use; instead,
    # declare each entity's intended tokens and let the framework detect
    # collisions explicitly.
    - name: ProjectAtlas
      kind: codename
      match_tokens:
        - Atlas
        - ProjectAtlas
      case_variants: auto

    # A client entity with explicit case variants (no auto-expansion).
    # Use explicit list when auto-expansion would produce false positives
    # (e.g. the canonical form is a common English word in one case but
    # private in another).
    - name: AcmeCorporation
      kind: client
      match_tokens:
        - Acme
        - AcmeCorp
      case_variants:
        - Acme
        - ACME
        - AcmeCorp
        - acme-corp

    # An individual — Phase 1A treats all kinds equivalently, but Phase 1C+
    # may attach per-kind handling (e.g. expires_at on individuals).
    #
    # WARNING — match_token false-positive risk: "Dr. Smith" contains
    # a period and a space. Future scanners doing substring or word-
    # boundary matching may flag any sentence containing "Dr." or any
    # standalone "Smith" as a leak. For real projects, prefer match
    # tokens that are unlikely to appear by accident in shared-layer
    # prose (use a unique codename, e.g. "EngineerHandleSmith42", and
    # link the real-name → codename mapping in project-local metadata
    # only). This example keeps the natural form to demonstrate the
    # schema shape, NOT as a recommended pattern.
    - name: DrJaneSmith
      kind: individual
      match_tokens:
        - JaneSmith
        - "Dr. Smith"
      case_variants: auto

    # A product entity. match_tokens may include multi-word strings.
    # See the NOTE under ProjectAtlas for the intentional "Atlas" collision.
    - name: AtlasMobile
      kind: product
      match_tokens:
        - AtlasMobile
        - "Atlas Mobile"
      case_variants: auto
