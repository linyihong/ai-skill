# Source: bootstrap-yaml-migration Phase 6 — validateCLIDocSync
id: cli-doc-sync-enforcement-v1
domain: bootstrap
type: routing-stability
priority: P1

failure_source:
  pattern: cli-doc-drift
  class: source-of-truth-duplication
  date: "2026-05-26"
  description: |
    Per runtime/cli-modification-policy.yaml gate.cli.command_contract_synced.
    When commit stages Go files under scripts/ai-skill-cli/internal/app/
    adding new CLI subcommands (new `case "run <x>":` or new
    `func runXxxHook` / `func buildRuntimeXxxResult`), the same commit
    must also stage scripts/ai-skill-cli/docs/command-contract.md.

given:
  artifacts:
    - scripts/ai-skill-cli/internal/app/hooks.go
    - scripts/ai-skill-cli/internal/app/runtime.go
    - scripts/ai-skill-cli/docs/command-contract.md

when:
  action: phase6_completion_check

then:
  expected_route:
    - validateCLIDocSync function present in hooks.go
    - runCommitMsgHook calls validateCLIDocSync

validation:
  detection_command: |
    v=$(grep -c 'func validateCLIDocSync' scripts/ai-skill-cli/internal/app/hooks.go 2>/dev/null)
    rch=$(grep -c 'validateCLIDocSync' scripts/ai-skill-cli/internal/app/hooks.go 2>/dev/null)
    [ "${v:-0}" -ge 1 ] && [ "${rch:-0}" -ge 2 ] && echo "PASS" || echo "FAIL v=${v:-0} rch=${rch:-0}"
  pass_criteria: detection_command outputs PASS
  initial_state: FAIL pre-Phase-6
  reference_governance: governance/lifecycle/system-upgrade-governance.md §3 Rule 9
