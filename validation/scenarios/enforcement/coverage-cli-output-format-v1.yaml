# Source: Phase 7 of plans/active/2026-05-31-2100-mechanical-enforcement-registry.md
id: coverage-cli-output-format-v1
domain: enforcement
type: cli-output-contract
priority: P1

# Phase 4 (2026-06-02): `ai-skill enforcement coverage` CLI landed; scenario
# flipped to runnable. The original shell pipeline (head -1 | grep -qE +
# jq -e + grep) is replaced by the CLI's built-in --self-check, which
# renders text/json/markdown internally and validates the 9-point schema
# contract in pure Go (cross-platform, no jq dependency).
execution_status:
  runnable: true
  cli_surface: "ai-skill enforcement coverage --self-check"
  phase3_equivalent: []  # none — pure CLI contract, no Phase 3 engine analogue

failure_source:
  pattern: coverage-report-format-drift
  class: cli-contract
  date: "2026-05-31"
  description: |
    `ai-skill enforcement coverage` is Phase 4's primary deliverable
    (per plan §Phase 4 "v2: 本 plan 主要交付"). Output format must be
    stable enough for governance dashboards to parse. This scenario
    locks down the expected output shape BEFORE Phase 4 implementation
    so downstream consumers (PR check, governance dashboard) can be
    written against a known contract.

given:
  task: phase_4_cli_outputs_coverage_report
  artifacts:
    - enforcement/enforcement-registry.yaml (current 28 rule_classes)
    - scripts/ai-skill-cli/cmd/enforcement.go (Phase 4 implementation)

when:
  action: run `ai-skill enforcement coverage --format text`
  action_alternative_1: run `ai-skill enforcement coverage --format json`
  action_alternative_2: run `ai-skill enforcement coverage --format markdown`

then:
  expected_route:
    text_format:
      - first line matches regex "^Enforcement Coverage Report \\([0-9]{4}-[0-9]{2}-[0-9]{2}\\)$"
      - second line is "═" repeated
      - "Total Rule Classes: <N>" appears (N matches actual count)
      - bucket counts shown for all 6 coverage values
      - bucket count percentages sum to 100% (rounded)
      - per-class detail table with columns: "Rule Class | Status | Verification | Runtime (Nd)"
      - "Pending implementation (active child plans):" section appears if any pending
      - "Research required (no clear mechanization path):" section appears if any research
      - "Behavioral_only awaiting sunset review:" section appears if any behavioral_only
      - "Not_mechanizable (closed, will not appear in review queue):" section if any
      - "Deprecated (awaiting removal):" section if any
      - "⚠ Runtime-observed gaps (v4):" section if runtime_metrics show under-observation
    json_format:
      - top-level keys: schema_version, generated_at, total_rule_classes, buckets, per_class, alerts
      - schema_version is numeric (1 for initial Phase 4)
      - generated_at is ISO-8601 timestamp
      - buckets is object with 6 keys matching coverage enum
      - per_class is array of objects with: id, coverage, verification, runtime_observed_pct, alerts
      - alerts is array (may be empty)
    markdown_format:
      - "# Enforcement Coverage Report" h1 header
      - "## Summary" h2 with bucket table
      - "## Per-class detail" h2 with markdown table
      - "## Alerts" h2 if any alerts
  forbidden_routes:
    - text output contains ANSI color codes when stdout is not a TTY
    - json output uses snake_case for some keys and camelCase for others (must be consistent snake_case)
    - markdown output uses raw HTML
    - any format omits a non-empty bucket
    - any format silently drops runtime_observed when metrics are present

validation:
  # Cross-platform: --self-check renders all 3 formats internally and
  # validates 9 schema checks (text first-line regex + ═ underline +
  # Total line, markdown h1 + Summary h2, JSON schema_version=1 +
  # 6-bucket completeness + per_class array + snake_case keys). No shell
  # pipeline, no jq, single Go binary invocation.
  detection_command: |
    ai-skill enforcement coverage --self-check
  pass_criteria: detection_command exits 0 (9/9 internal checks pass). Failure cases enumerated in the self-check output identify which format/schema dimension regressed.
  initial_state: PASS (Phase 4 CLI landed 2026-06-02)
  reference_governance:
    - plans/active/2026-05-31-2100-mechanical-enforcement-registry.md §Phase 4
    - enforcement/enforcement-registry.yaml (source of truth for rule_classes)

phase_4_cli_contract:
  subcommands:
    - "ai-skill enforcement coverage [--format text|json|markdown] [--detail]"
    - "ai-skill enforcement coverage --diff <base-ref> (compare two registry states)"
    - "ai-skill enforcement lint (Phase 3 lint subcommand; separate from coverage)"
  ci_integration: |
    PR check should run: `ai-skill enforcement coverage --diff origin/main --format json`
    and fail the check if:
      - new rule_class added without coverage field
      - existing rule_class changed coverage without status_transition_matrix compliance
      - mechanical → behavioral_only without adr_reference (R2 self-governance lint)
