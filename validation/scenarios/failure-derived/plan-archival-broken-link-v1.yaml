# yaml-language-server: $schema=../../scenario.schema.json
# Plan Archival Broken Link Scenario
# Commit-time block: when a plan archive event (active/ <-> archived/ rename)
# leaves any markdown link unresolvable — either in the moved file itself
# (outbound) or in any repo .md referring to the old path (inbound) —
# validatePlanArchivalLinkIntegrity emits a block finding with
# suggested_replacement derived from the batch rename map.

id: plan-archival-broken-link-v1
domain: runtime-governance
type: heuristic-obedience
priority: P1

failure_source:
  class: reference-integrity-drift
  origin_plan: plans/active/2026-06-11-1100-plan-archival-link-integrity.md
  origin_phase: Phase 1-3 implementation
  description: >
    Empirical: 2026-06-11 archiving plans/active/2026-06-06-1800-sanitization-mechanical-enforcement.md
    (commit 3f7c4b4) silently broke 8 inbound markdown references (README,
    runtime yaml source_plan, failure-patterns, metadata, topology-migration)
    plus 3 outbound links in the moved file itself. Manual grep + per-file
    edit was the only mitigation. validatePlanArchivalAudit covers archive
    workflow completeness (unchecked `- [ ]` items) but does not parse
    markdown links, so the drift landed without mechanical signal.

given:
  task: stage_plan_archive_event
  artifacts:
    - plans/active/**
    - plans/archived/**
    - scripts/ai-skill-cli/internal/app/plan_archival_link_integrity.go
    - scripts/ai-skill-cli/internal/app/markdown_links.go
    - runtime/core-bootstrap.yaml  # per_commit_obligations[obligation.commit.plan_archival_link_integrity]
    - enforcement/enforcement-registry.yaml  # rule_class plan_archival_link_integrity
  signals:
    - staged diff contains R* rename between plans/active/ and plans/archived/ (`git diff --cached --find-renames=90% --name-status`)
    - moved file or repo .md contains markdown link `[text](path)` whose target does not resolve from its current location
    - resolved target hits the batch rename map old-path entry (preferred suggestion path) OR target does not exist anywhere on disk
  constraints:
    - validator reads staged blob via `git show :<path>` (TD-1 Resolution Gate outcome); worktree fallback only on read failure
    - batch rename map MUST be built before any link resolution so multi-archive cross-references resolve correctly
    - bounded markdown parser supports inline links + escaped parens + code-fence exclusion; reference-style / HTML anchor / autolink are ignored not partially interpreted

when:
  action: invoke_commit_msg_validator_plan_archival_link_integrity

then:
  expected_route:
    primary: block_with_suggested_replacement
    steps:
      - Emit block finding per broken link with payload {Severity:block, Category:broken_outbound_link|broken_inbound_link, File, Line, Column, Target, SuggestedReplacement}.
      - SuggestedReplacement derives from the rename map (new path), formatted as repo-rooted when original target was repo-rooted, else posix-relative from the source file's directory.
      - Group findings into a `blocking:` section in the formatter output; multi-archive cross-references resolve against the full batch rename map, not per-file.
      - Author updates each broken link to the suggested target, OR adds standalone `[skip-plan-archival-link-integrity]` trailer for emergency archives.
  forbidden_routes:
    - silently_drop_finding_when_target_exists_in_renamed_old_path_position
    - resolve_links_against_worktree_when_staged_blob_differs  # TD-1 anti-pattern
    - report_outbound_finding_under_broken_inbound_link_category_or_vice_versa
    - partially_interpret_reference_style_or_html_anchor_link_constructs
  expected_intelligence:
    - scripts/ai-skill-cli/internal/app/plan_archival_link_integrity.go
    - scripts/ai-skill-cli/internal/app/plan_archival_link_integrity_test.go
    - scripts/ai-skill-cli/internal/app/plan_archival_link_integrity_integration_test.go
    - scripts/ai-skill-cli/internal/app/plan_archival_link_integrity_td1_test.go
    - enforcement/failure-patterns/plan-archival-link-drift.md
  validation:
    - TestValidatePlanArchivalLinkIntegrity_OutboundBroken / _InboundBroken assert block finding with correct category
    - TestValidatePlanArchivalLinkIntegrity_MultiArchiveCrossRefBroken asserts batch-rename-map cross-resolution + suggested replacement
    - TestValidatePlanArchivalLinkIntegrity_TD1_StagedBrokenWorktreeFixed asserts staged-blob read (no worktree false-clean)
    - TestValidatePlanArchivalLinkIntegrity_CleanArchivePass asserts no finding on fully retargeted archive
    - TestExtractMarkdownLinks reference-style + html + autolink cases assert "ignored, not partially interpreted" contract
