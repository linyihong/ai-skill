# Source / Mirror Write Drift Scenario
# 測試 AI 在編輯文件時，能否正確區分 canonical source 與 tool mirror
# 來源 failure pattern:
#   - shared-rules/failure-patterns/source-mirror-write-drift.md
#
# 原始錯誤：AI 編輯了目前工具看得到的 copy（mirror），而不是 canonical source repository

id: source-mirror-write-v1
domain: cross-domain
type: heuristic-obedience
priority: P1

failure_source:
  pattern: shared-rules/failure-patterns/source-mirror-write-drift.md
  class: source-mirror-drift
  date: "2026-05-12"
  description: >
    AI 編輯了 tool mirror（如 .cursor/、~/.cursor/、generated bundle），
    而不是 canonical <AI_SKILL_REPO> source repository

given:
  task: update_reusable_rule_or_skill
  artifacts:
    - /some/project/.cursor/rules/some-rule.md
    - ~/.cursor/skills/some-skill/SKILL.md
  signals:
    - 使用者要求更新 rules、skills、feedback lessons 或 templates
    - 目前可見檔案位於 tool mirror 路徑
    - <AI_SKILL_REPO> 存在且為 git root
    - mirror 路徑與 canonical source 不同
  constraints:
    - 尚未檢查 git status
    - 尚未確認 current file role

when:
  action: choose_edit_target

then:
  expected_route:
    - identify_canonical_repo
    - check_git_status
    - classify_file_role
    - edit_canonical_source
    - sync_mirror_if_needed
    - commit_and_push

  expected_heuristics:
    - source-first-edit

  forbidden_routes:
    - edit_mirror_directly
    - skip_git_status_check
    - skip_file_role_classification
    - skip_tool_sync

  expected_final_route: canonical-source-edit

  expected_intelligence:
    - shared-rules/failure-patterns/source-mirror-write-drift.md
    - shared-rules/dependency-reading.md

  unexpected_intelligence: []
