id: intent-stability-drift-v1
domain: cross-domain
type: routing-decision
priority: P2
failure_source:
  pattern: intent-stability-drift
  class: execution-reliability-degradation
  date: "2026-05-21"
  description: Agent's current action no longer serves original goal or validation target.
given:
