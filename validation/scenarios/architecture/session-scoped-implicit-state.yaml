id: session-scoped-implicit-state
category: architecture
version: v1
type: anti-pattern-obedience
priority: P2
source_atom: intelligence/engineering/anti-patterns/session-scoped-implicit-state.md

given:
  task: design_execution_context_passing_for_agent_runtime
  artifacts:
    - intelligence/engineering/anti-patterns/session-scoped-implicit-state.md
    - intelligence/engineering/agent-architecture/README.md
  signals:
    - execution_unit_may_be_replayed
    - execution_unit_may_be_forked_or_parallel
    - state_includes_user_phase_or_tenant
  constraints:
    - runtime_is_sqlite_as_canonical
    - agent_invocation_can_come_from_multiple_callers

when:
