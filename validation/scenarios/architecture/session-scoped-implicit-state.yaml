then:
  expected_route:
    - load_session_scoped_implicit_state_anti_pattern
    - prefer_explicit_run_context_parameter
    - reject_ambient_thread_local_or_session_service
  expected_heuristics:
    - explicit_context_over_ambient_state
    - snapshot_immutable_at_function_entry
  forbidden_routes:
    - inject_session_service_into_domain_layer
    - read_current_phase_from_sqlite_inside_agent_function
    - rely_on_async_local_for_request_scoped_state
  expected_final_route: explicit_run_context_with_phase_id_tenant_id_user_id
  expected_intelligence:
    - intelligence/engineering/anti-patterns/session-scoped-implicit-state.md
  unexpected_intelligence:
    - runtime/runtime.db
