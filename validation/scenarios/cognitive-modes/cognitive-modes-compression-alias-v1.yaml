# Source: Phase 3.2 Cognitive Modes вҖ” test-first per system-upgrade-governance В§3 иҰҸеүҮ 9
# Pre-implementation scenario (currently failing вҖ” Phase 3.2 not yet started)
id: cognitive-modes-compression-alias-v1
domain: cognitive-modes
type: routing-stability
priority: P2

failure_source:
  pattern: cognitive-modes-compression-alias-missing
  class: framework-upgrade-acceptance
  date: "2026-05-25"
  description: |
    Phase 3.2 must annotate models/compression/README.md so each compression
    level is marked as the implementation reference for its corresponding
    context_mode UPPERCASE alias. Without this annotation, the two vocabularies
    remain disconnected and agents may treat compression/ and context_mode as
    separate systems.

given:
  task: phase_3_2_context_mode_compression_alias
  artifacts:
    - models/compression/README.md
  signals:
    - plan В§3.2: еҗҲдҪө models/compression/ levels зӮә context_mode зҡ„еҜҰдҪңеұӨ
    - Open Question 1 resolved: lowercase = alias; UPPERCASE = runtime primitive
    - 5 pairs: index-onlyвҶ”INDEX_ONLY, summary-firstвҶ”SUMMARY_FIRST,
      checklist-firstвҶ”CHECKLIST_FIRST, source-backedвҶ”SOURCE_BACKED,
      graph-assistedвҶ”GRAPH_ASSISTED

when:
  action: phase_3_completion_check

then:
  expected_route:
    - models/compression/README.md contains context_mode alias annotation
    - file references "context_mode" (the runtime primitive)
    - file references "INDEX_ONLY" or equivalent UPPERCASE mapping
    - file references cognitive-modes.yaml or context_mode UPPERCASE vocabulary
  forbidden_routes:
    - no_alias_annotation_in_compression_readme
    - compression_readme_treats_levels_as_independent_system

validation:
  detection_command: |
    test -f models/compression/README.md && \
      grep -qi "context_mode" models/compression/README.md && \
      grep -q "INDEX_ONLY\|SUMMARY_FIRST\|SOURCE_BACKED" models/compression/README.md && \
      echo "PASS" || echo "FAIL"
  pass_criteria: detection_command outputs "PASS"
  initial_state: FAILпјҲfail-by-absence вҖ” alias annotation not yet addedпјү
  reference_governance: governance/lifecycle/system-upgrade-governance.md В§3 Rule 9
