id: ai-codegen-perf-risk-checklist
category: software-delivery
version: v1
type: heuristic-obedience
priority: P1
status: candidate
source_failure_pattern: enforcement/failure-patterns/ai-codegen-passes-ci-fails-production.md
source_intelligence: intelligence/engineering/ai-augmented-delivery/generation-validation-rate-parity.md
source_analysis: analysis/ai-augmented-delivery/perf-test-bottleneck-anatomy.md

given:
  task: review_pr_with_ai_generated_code
  artifacts:
    - workflow/software-delivery/perf-risk-gate.md
    - analysis/ai-augmented-delivery/perf-test-bottleneck-anatomy.md
  signals:
    - pr_diff_touches_hot_path  # API handler, DB layer, external HTTP, cache/session structure
    - pr_has_ai_authorship_marker  # Co-Authored-By: <model>, AI-assisted, generated by
    - pr_lacks_perf_evidence  # no benchmark output, no load test result, no APM link

when:
  action: approve_pr_for_merge

then:
  expected_route:
    - detect_ai_authorship_signal
    - run_perf_anti_pattern_static_scan
    - require_micro_benchmark_or_skip_marker
    - require_reviewer_perf_checklist_completion
  expected_heuristics:
    - generation_validation_rate_parity
    - cheap_static_detection_before_expensive_load_test
  forbidden_routes:
    - approve_pr_based_on_unit_test_only
    - approve_pr_with_unbounded_collection_on_hot_path
    - approve_pr_with_missing_external_timeout
    - approve_pr_with_string_concatenated_sql
  expected_final_route: pr_safe_to_merge_after_perf_gate
  expected_intelligence:
    - intelligence/engineering/ai-augmented-delivery/generation-validation-rate-parity.md

# Four perf anti-patterns to scan (cheap static detection):
checks:
  - id: no_query_in_loop
    description: |
      Detect ORM / db.Query / db.Exec calls inside for/while loops.
      Catches N+1 queries that look fine in unit tests but saturate DB under production load.
    detection: ast_scan_or_linter
    severity: block_if_hot_path
    remediation: "Batch-fetch outside the loop, or use JOIN / IN clause."

  - id: bounded_collections
    description: |
      Detect long-lived map / slice that only appends without eviction.
      Catches unbounded growth that passes short tests but causes OOM in production.
    detection: ast_scan_for_module_level_or_long_scoped_collections
    severity: block_if_module_level_or_singleton
    remediation: "Add LRU / TTL eviction, or scope collection to a request lifetime."

  - id: external_call_has_timeout
    description: |
      Detect HTTP client / fetch / external RPC without timeout configured.
      Catches cascading failures when downstream slows down.
    detection: grep_or_linter_rule
    severity: block_if_blocking_path
    remediation: "Set explicit timeout (read + connect) or AbortSignal / context.WithTimeout."

  - id: parameterized_sql
    description: |
      Detect string concatenation immediately followed by SQL keyword (SELECT, INSERT, UPDATE, DELETE, WHERE).
      Catches both SQL injection and query plan cache miss.
    detection: regex_or_sast
    severity: block
    remediation: "Use prepared statements / parameter binding / ORM query builder."

opt_out:
  marker: "[skip-perf-bench]"
  required_justification: true
  acceptable_reasons:
    - docs_only_change
    - ui_style_only
    - test_only_addition
    - mechanical_refactor_with_unchanged_runtime_behavior

acceptance:
  - All four checks pass OR opt_out marker is present with justification
  - If PR touches hot_path: micro-benchmark output attached OR opt_out marker present
  - Reviewer has explicitly confirmed perf checklist completion (PR comment / checkbox)

related_patterns:
  - enforcement/failure-patterns/ai-codegen-passes-ci-fails-production.md
  - enforcement/failure-patterns/shell-script-added-without-go-migration.md  # sibling meta-tool-risk pattern

source: |
  2026-05-27 session: derived from 2025 industry infographic on AI codegen
  defect distribution; the four anti-patterns map to the four "為什麼 Performance
  Test 特別慘" items in the source material. Status `candidate` until repo-local
  trail emerges.
