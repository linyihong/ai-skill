# Pre-commit Hook Scenario
# 測試 scripts/git-hooks/pre-commit 是否能正確檢查：
# 1. Compiler sync：prose source 修改時，對應的 generated YAML 必須同步更新
# 2. Output governance：commit 的檔案是否符合 language policy、sanitization rules
#
# 來源 hook:
#   - scripts/git-hooks/pre-commit
#   - runtime/compiler/compiler-rules.yaml (compile.rule.sync_on_commit)

id: precommit-hook-v1
domain: app-dev
type: hook-verification
priority: P1

given:
  task: commit_with_unsynced_changes
  artifacts:
    - scripts/git-hooks/pre-commit
    - runtime/compiler/compiler-rules.yaml
    - runtime/compiler/compiler-engine.rb
    - scripts/git-hooks/pre-commit
  signals:
    - workflow/software-delivery/execution-flow.md 被修改（新增或修改 gate 描述）
    - runtime.db 的 generated_surfaces 表未同步更新（對應 workflow_phases 記錄）
    - git add 已將 execution-flow.md 加入 staging
    - git commit 被執行
    - SKIP_COMPILER_CHECK 環境變數未設定
  constraints:
    - pre-commit hook 已安裝（透過 ai-skill hooks install 或 git config core.hooksPath scripts/git-hooks）
    - repo-local ai-skill runtime validate 可用於驗證同步狀態
    - hook 使用 set -euo pipefail 嚴格模式
    - REPO_ROOT 透過 git rev-parse --show-toplevel 取得

when:
  action: run_precommit_hook

then:
  expected_route:
    primary: block_commit_with_unsynced_yaml
    steps:
      - hook 偵測到 git diff --cached 包含 workflow/*/execution-flow.md
      - hook 從 compiler-rules.yaml 讀取 source_target_mapping
      - hook 比對修改的檔案是否符合 source pattern（workflow/*/execution-flow.md）
      - hook 執行 runtime compiler 並重新 stage runtime/runtime.db
      - runtime validation 回傳非零 exit code（因為 generated surface 未同步）
      - hook 輸出 runtime validation failed 訊息
      - hook 提示使用者執行 repo-local ai-skill runtime refresh / validate
      - hook 以 exit 1 阻擋 commit
    reject:
      - allow_unsynced_commit: "即使 generated YAML 未同步，仍允許 commit 通過"
      - skip_check_silently: "跳過 compiler sync check 且不提示使用者"
      - wrong_error_message: "輸出不明確的錯誤訊息，不提示如何修復"

  expected_heuristics:
    - precommit-compiler-sync-check
    - precommit-output-governance-check
    - deterministic-block-on-unsynced

  expected_governance_checks:
    - check_2a_language_policy:
        description: "檢查 commit 的 .md/.yaml/.yml/.mdc 檔案是否包含 'Default to English'"
        trigger: "任何 staged 檔案包含 'default to english'（case-insensitive）"
        expected_result: "block commit with violation message"
    - check_2b_sanitization:
        description: "檢查 commit 的 .md/.yaml/.yml 檔案是否包含未經去敏的本地絕對路徑"
        trigger: "任何 staged 檔案包含 /Users/[A-Za-z]+/ 且非 larrylin/Documents/Ai-skill"
        expected_result: "block commit with violation message"

  expected_skip_behaviors:
    - env_var_skip_compiler:
        var: SKIP_COMPILER_CHECK=1
        effect: "跳過 compiler sync check，顯示 ⚠ 警告"
    - env_var_skip_governance:
        var: SKIP_GOVERNANCE_CHECK=1
        effect: "跳過 output governance check，顯示 ⚠ 警告"

  expected_success_path:
    - "所有 prose source 與 generated YAML 同步"
    - "所有 staged 檔案符合 language policy（無 'Default to English'）"
    - "所有 staged 檔案符合 sanitization rules（無未經去敏的本地路徑）"
    - "hook 輸出 ✅ All pre-commit checks passed"
    - "hook 以 exit 0 允許 commit"

  validation:
    - "修改 workflow/software-delivery/execution-flow.md 後不執行 compiler → commit 應被阻擋"
    - "修改後執行 repo-local ai-skill runtime refresh / validate → commit 應通過"
    - "staged 檔案包含 'Default to English' → commit 應被阻擋"
    - "staged 檔案包含 /Users/otheruser/ 路徑 → commit 應被阻擋"
    - "設定 SKIP_COMPILER_CHECK=1 → compiler check 被跳過"
    - "設定 SKIP_GOVERNANCE_CHECK=1 → governance check 被跳過"
    - "未修改任何 prose source → compiler check 顯示 'No prose sources modified' 並跳過"
