schema_version: executable-contract/v1
id: ai-tools.agent.cursor.contract
title: Cursor agent adapter contract
owner_layer: ai-tools
source_markdown: ai-tools/agent/cursor.md
status: active
contract_type: onboarding_flow
blocking_level: blocking

runtime_projection:
  enabled: true
  target_key: ai_tools.agent_cursor.contract
  surface_type: executable_yaml_contract
  execution_scope: agent_behavior

activation:
  events:
    - cursor_session_started
    - cursor_adapter_changed
    - cursor_rule_changed
    - cursor_hook_changed
  required_when:
    - Cursor operates in this repository or a project using Ai-skill.
    - .cursor/rules, .cursor/hooks.json, or ai-tools/agent/cursor.md changes.
    - Cursor goal ledger, checkpoint, or language behavior is reviewed.

required_sources:
  - .cursor/rules/ai-skill-bootstrap.mdc
  - CORE_BOOTSTRAP.md
  - runtime/core-bootstrap.yaml
  - ai-tools/agent/cursor.md
  - ai-tools/README.md
  - enforcement/tool-neutral-documentation.md

steps:
  - id: load_cursor_always_apply_rule
    order: 1
    action: Use .cursor/rules/ai-skill-bootstrap.mdc only as a thin Cursor always-apply bootstrap pointer.
  - id: load_project_overlay
    order: 2
    action: If <PROJECT_ROOT>/.ai-skill/project/README.md exists, load it as the project-local overlay index; project-specific rule bodies should be discovered there instead of through extra Cursor project-rule .mdc files.
  - id: load_core_bootstrap
    order: 3
    action: Load CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml as the only bootstrap entry sources before expanding detailed sources.
  - id: load_cursor_adapter
    order: 4
    action: Read ai-tools/agent/cursor.md only for Cursor-specific rules, hooks, workspace, and config differences.
  - id: apply_cursor_hook_boundary
    order: 5
    action: Cursor hooks must never silently edit files, close goals, or auto-commit. The preToolUse gate IS a mechanical block (native permission:deny on a real bootstrap/workflow gate hit) but fails open (exit 0) when AI_SKILL_REPO is unresolvable; the stop check uses followup_message loopback. Do not describe the preToolUse gate as a mere reminder.
    gates:
      - gate.cursor.hooks_fail_open
  - id: enforce_cursor_cognitive_close_out
    order: 6
    action: Ensure init-project Cursor hooks include sessionStart dirty repo close-out guidance, a preToolUse mechanical gate (calls the canonical hook runner; native permission:deny on block; read-type tools allowed; fail-open when repo unresolvable), and a stop close-out check that uses Cursor's followup_message loopback when Bootstrap Receipt, final Cognitive Mode reporting, or required Project Git Report is missing.
    gates:
      - gate.cursor.cognitive_close_out
  - id: enforce_thin_adapter_boundary
    order: 7
    action: Do not duplicate canonical bootstrap obligations, runtime phase details, or shared enforcement text in Cursor adapter files.
    gates:
      - gate.cursor.thin_adapter_boundary

gates:
  - id: gate.cursor.hooks_fail_open
    blocks: hook_design_claim
    pass_when:
      - hooks do not silently edit files, close goals, or auto-commit unless explicitly configured
      - the preToolUse gate blocks via native permission:deny on a real gate hit, and fails open (exit 0) when AI_SKILL_REPO is unresolvable so a missing repo never blocks every tool
      - the stop check fails closed (exit 2 + failClosed) only for close-out, using followup_message loopback, not exit-2 looping
  - id: gate.cursor.thin_adapter_boundary
    blocks: reusable_doc_change
    pass_when:
      - Cursor-specific paths, hooks, and UI details stay in ai-tools/agent/cursor.md or .cursor config.
      - Bootstrap Receipt, Cognitive Mode, close-loop, goal ledger, and runtime phase details remain in CORE_BOOTSTRAP.md, runtime/core-bootstrap.yaml, or their canonical sources.
      - Shared enforcement and workflow docs remain tool-neutral.
  - id: gate.cursor.cognitive_close_out
    blocks: cursor_init_project_template_change
    pass_when:
      - init-project Cursor hooks contain sessionStart guidance for dirty repo close-out, a preToolUse mechanical gate, and a stop/final-response check.
      - The preToolUse and stop hooks delegate to the canonical Ai-skill hook runner rather than duplicating gate or Cognitive Mode parsing in the Cursor template.
      - The preToolUse gate fails open (exit 0) when AI_SKILL_REPO is unresolvable; read-type tools are always allowed.
      - Missing Bootstrap Receipt, final Cognitive Mode reporting, or required Project Git Report uses Cursor stop `followup_message` loopback with exit 0 instead of relying on exit 2.
  - id: gate.cursor.always_apply_bootstrap_current
    blocks: cursor_rule_change
    pass_when:
      - .cursor/rules/ai-skill-bootstrap.mdc remains a thin pointer to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml
      - Bootstrap obligations, formats, enums, and examples are not duplicated in the Cursor rule
      - Project-specific rule bodies live in .ai-skill/project/rules/ and are discovered through .ai-skill/project/README.md, not through separate Cursor project-rule .mdc files

required_evidence:
  - Cursor adapter sources read
  - hook/rule linked updates when .cursor config changes
  - init-project Cursor hook regression when Cursor hook template changes
  - runtime validation when execution-affecting adapter contract changes
  - final git status after writeback

success_criteria:
  - Cursor starts from .cursor/rules/ai-skill-bootstrap.mdc, CORE_BOOTSTRAP.md, runtime/core-bootstrap.yaml, and ai-tools/agent/cursor.md as appropriate.
  - Cursor init-project installs sessionStart dirty repo close-out guidance, a preToolUse mechanical gate, and a stop close-out check for Bootstrap Receipt, final Cognitive Mode reporting, and required Project Git Report.
  - Project-local custom checks can live in .ai-skill/project/rules/ and remain available to non-Cursor tools without adding separate project-rule .mdc files.
  - The Cursor preToolUse gate mechanically blocks (native permission:deny) on a real bootstrap/workflow gate hit while failing open when the repo is unresolvable; hooks never silently edit files, close goals, or auto-commit.
  - Cursor-specific details stay in the adapter layer and canonical bootstrap content is not duplicated.
  - Execution-affecting adapter changes are projected and validated.

failure_modes:
  - id: cursor_hook_overclaim
    detection: Documentation claims the stop/close-out check deterministically enforces completion, or claims the preToolUse gate blocks even when AI_SKILL_REPO is unresolvable (it fails open).
    recovery: Scope the claim to what the hook runner actually does — preToolUse mechanically denies only on a real gate hit with the repo resolved; stop uses followup_message loopback — or add the real implementation and validation.
  - id: cursor_path_leaks_to_shared_rule
    detection: Generic enforcement or workflow doc makes .cursor paths universal.
    recovery: Move path and UI detail back to ai-tools/agent/cursor.md or .cursor config.
  - id: cursor_adapter_bootstrap_duplication
    detection: Cursor adapter repeats bootstrap obligations, formats, or runtime phase details instead of pointing to canonical sources.
    recovery: Replace duplicated prose with links to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml.
  - id: cursor_bootstrap_stale
    detection: Cursor always-apply rule no longer points to core bootstrap and runtime source-of-truth.
    recovery: Update .cursor/rules/ai-skill-bootstrap.mdc and validate linked updates.
  - id: cursor_final_cognitive_missing
    detection: Cursor init-project lacks a stop final-response hook that checks for Bootstrap Receipt plus compact or full Cognitive Mode reporting with `followup_message` loopback.
    recovery: Restore the init-project Cursor stop hook and add regression tests for missing Bootstrap Receipt and final Cognitive output using Cursor's loopback protocol.

final_status_report:
  required_fields:
    - adapter_sources_read
    - cursor_rule_status
    - hook_or_sync_status
    - runtime_validation_status
    - git_status
