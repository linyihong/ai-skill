schema_version: executable-contract/v1
id: ai-tools.agent.cursor.contract
title: Cursor agent adapter contract
owner_layer: ai-tools
source_markdown: ai-tools/agent/cursor.md
status: active
contract_type: onboarding_flow
blocking_level: blocking

runtime_projection:
  enabled: true
  target_key: ai_tools.agent_cursor.contract
  surface_type: executable_yaml_contract
  execution_scope: agent_behavior

activation:
  events:
    - cursor_session_started
    - cursor_adapter_changed
    - cursor_rule_changed
    - cursor_hook_changed
  required_when:
    - Cursor operates in this repository or a project using Ai-skill.
    - .cursor/rules, .cursor/hooks.json, or ai-tools/agent/cursor.md changes.
    - Cursor goal ledger, checkpoint, or language behavior is reviewed.

required_sources:
  - .cursor/rules/dependency-reading.mdc
  - CORE_BOOTSTRAP.md
  - runtime/core-bootstrap.yaml
  - ai-tools/agent/cursor.md
  - ai-tools/README.md
  - enforcement/tool-neutral-documentation.md

steps:
  - id: load_cursor_always_apply_rule
    order: 1
    action: Use .cursor/rules/dependency-reading.mdc only as a thin Cursor always-apply bootstrap pointer.
  - id: load_core_bootstrap
    order: 2
    action: Load CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml as the only bootstrap entry sources before expanding detailed sources.
  - id: load_cursor_adapter
    order: 3
    action: Read ai-tools/agent/cursor.md only for Cursor-specific rules, hooks, workspace, and config differences.
  - id: apply_cursor_hook_boundary
    order: 4
    action: Treat Cursor hooks as optional reminders/checks unless a team explicitly enables automation.
    gates:
      - gate.cursor.hooks_fail_open
  - id: enforce_thin_adapter_boundary
    order: 5
    action: Do not duplicate canonical bootstrap obligations, runtime phase details, or shared enforcement text in Cursor adapter files.
    gates:
      - gate.cursor.thin_adapter_boundary

gates:
  - id: gate.cursor.hooks_fail_open
    blocks: hook_design_claim
    pass_when:
      - Cursor hooks are described as reminders/checks by default
      - hooks do not silently edit or close goals unless explicitly configured
      - hook behavior is fail-open unless the team intentionally makes it blocking
  - id: gate.cursor.thin_adapter_boundary
    blocks: reusable_doc_change
    pass_when:
      - Cursor-specific paths, hooks, and UI details stay in ai-tools/agent/cursor.md or .cursor config.
      - Bootstrap Receipt, Cognitive Mode, close-loop, goal ledger, and runtime phase details remain in CORE_BOOTSTRAP.md, runtime/core-bootstrap.yaml, or their canonical sources.
      - Shared enforcement and workflow docs remain tool-neutral.
  - id: gate.cursor.always_apply_bootstrap_current
    blocks: cursor_rule_change
    pass_when:
      - .cursor/rules/dependency-reading.mdc remains a thin pointer to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml
      - Bootstrap obligations, formats, enums, and examples are not duplicated in the Cursor rule

required_evidence:
  - Cursor adapter sources read
  - hook/rule linked updates when .cursor config changes
  - runtime validation when execution-affecting adapter contract changes
  - final git status after writeback

success_criteria:
  - Cursor starts from .cursor/rules/dependency-reading.mdc, CORE_BOOTSTRAP.md, runtime/core-bootstrap.yaml, and ai-tools/agent/cursor.md as appropriate.
  - Cursor hooks remain optional reminders/checks unless explicitly configured otherwise.
  - Cursor-specific details stay in the adapter layer and canonical bootstrap content is not duplicated.
  - Execution-affecting adapter changes are projected and validated.

failure_modes:
  - id: cursor_hook_overclaim
    detection: Documentation says hooks deterministically enforce completion without validation or explicit configuration.
    recovery: Reword as optional reminder/check or add the real hook implementation and validation.
  - id: cursor_path_leaks_to_shared_rule
    detection: Generic enforcement or workflow doc makes .cursor paths universal.
    recovery: Move path and UI detail back to ai-tools/agent/cursor.md or .cursor config.
  - id: cursor_adapter_bootstrap_duplication
    detection: Cursor adapter repeats bootstrap obligations, formats, or runtime phase details instead of pointing to canonical sources.
    recovery: Replace duplicated prose with links to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml.
  - id: cursor_bootstrap_stale
    detection: Cursor always-apply rule no longer points to core bootstrap and runtime source-of-truth.
    recovery: Update .cursor/rules/dependency-reading.mdc and validate linked updates.

final_status_report:
  required_fields:
    - adapter_sources_read
    - cursor_rule_status
    - hook_or_sync_status
    - runtime_validation_status
    - git_status
