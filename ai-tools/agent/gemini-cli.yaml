schema_version: "1.0"
id: ai_tools.agent.gemini_cli
title: Gemini CLI Tool Adapter
owner_layer: ai-tools
source_markdown: ai-tools/agent/gemini-cli.md
status: active
contract_type: tool_adapter_contract

runtime_projection:
  enabled: true
  target_key: ai_tools.agent.gemini_cli.contract
  surface_type: executable_yaml_contract
  execution_scope: agent_behavior

activation:
  events:
    - session_start
    - gemini_md_detected
  required_when:
    - 使用 Gemini CLI 進入 Ai-skill 專案

required_sources:
  - GEMINI.md
  - CORE_BOOTSTRAP.md
  - runtime/core-bootstrap.yaml
  - ai-tools/agent/gemini-cli.md
  - ai-tools/README.md
  - enforcement/tool-neutral-documentation.md

steps:
  - id: load_thin_entrypoint
    action: Use GEMINI.md only as a thin bootstrap pointer.
    order: 1
  - id: load_core_contract
    action: Load CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml as the only bootstrap entry sources before expanding detailed sources.
    order: 2
  - id: load_gemini_adapter
    action: Read ai-tools/agent/gemini-cli.md only for Gemini CLI-specific entrypoint, tool capability, and config differences.
    order: 3
  - id: enforce_thin_adapter_boundary
    action: Do not duplicate canonical bootstrap obligations, runtime phase details, or shared enforcement text in GEMINI.md or the Gemini CLI adapter.
    order: 4
    gates:
      - gate.gemini_cli.thin_adapter_boundary

gates:
  - id: gate.gemini_cli.thin_adapter_boundary
    severity: high
    description: GEMINI.md and the Gemini CLI adapter stay thin and point to CORE_BOOTSTRAP.md plus runtime/core-bootstrap.yaml for canonical bootstrap behavior.
    pass_when:
      - GEMINI.md points to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml without duplicating their obligations.
      - ai-tools/agent/gemini-cli.md records only Gemini CLI-specific differences.
      - Bootstrap Receipt, Cognitive Mode, close-loop, goal ledger, and runtime phase details remain in canonical sources.

success_criteria:
  - Gemini CLI starts from GEMINI.md, CORE_BOOTSTRAP.md, runtime/core-bootstrap.yaml, and ai-tools/agent/gemini-cli.md as appropriate.
  - Gemini-specific details stay in the adapter layer and canonical bootstrap content is not duplicated.
  - Execution-affecting adapter changes are projected and validated.

failure_modes:
  - id: gemini_adapter_bootstrap_duplication
    detection: GEMINI.md or the Gemini CLI adapter repeats bootstrap obligations, formats, or runtime phase details instead of pointing to canonical sources.
    recovery: Replace duplicated prose with links to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml.
