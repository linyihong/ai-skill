id: agent.copilot
name: GitHub Copilot
description: Compatibility adapter for Copilot custom instructions and scoped instructions
owner_layer: ai-tools
source_markdown: ai-tools/agent/copilot.md
status: compatibility
entrypoints:
  - .github/copilot-instructions.md
  - .github/instructions/ai-skill.instructions.md
required_files:
  - CORE_BOOTSTRAP.md
  - runtime/core-bootstrap.yaml
  - ai-tools/agent/copilot.md
enforcement_boundary:
  - repository hooks
  - GitHub Actions / PR checks
  - ai-skill runtime validate
  - runtime/core-bootstrap.yaml
notes: |
  Copilot instruction files guide the model back to canonical sources but do
  not reliably enforce runtime gates. Keep instructions thin, avoid local
  absolute paths, and rely on repository validation for hard enforcement.
