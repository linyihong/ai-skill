schema_version: executable-contract/v1
id: ai-tools.agent.codex.contract
title: Codex agent adapter contract
owner_layer: ai-tools
source_markdown: ai-tools/agent/codex.md
status: active
contract_type: onboarding_flow
blocking_level: blocking

runtime_projection:
  enabled: true
  target_key: ai_tools.agent_codex.contract
  surface_type: executable_yaml_contract
  execution_scope: agent_behavior

activation:
  events:
    - codex_session_started
    - codex_adapter_changed
    - root_agents_md_changed
    - runtime_or_contract_boundary_changed
  required_when:
    - Codex is operating in this repository or a project using Ai-skill.
    - AGENTS.md or ai-tools/agent/codex.md changes.
    - Codex behavior depends on runtime SQLite, executable YAML projection, or commit/push workflow.

required_sources:
  - AGENTS.md
  - CORE_BOOTSTRAP.md
  - runtime/core-bootstrap.yaml
  - ai-tools/agent/codex.md
  - ai-tools/README.md
  - enforcement/tool-neutral-documentation.md

steps:
  - id: load_thin_entrypoint
    order: 1
    action: Use AGENTS.md only as a thin bootstrap pointer.
  - id: load_core_contract
    order: 2
    action: Load CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml as the only bootstrap entry sources before expanding detailed sources.
  - id: load_codex_adapter
    order: 3
    action: Read ai-tools/agent/codex.md only for Codex-specific behavior and generic AGENTS-aware tool differences.
  - id: enforce_thin_adapter_boundary
    order: 4
    action: Do not duplicate canonical bootstrap obligations, runtime phase details, or shared enforcement text in AGENTS.md or the Codex adapter.
    gates:
      - gate.codex.thin_adapter_boundary
  - id: preserve_owner_layer_contracts
    order: 5
    action: Keep governance, enforcement, workflow, ai-tools, and metadata executable contracts in owner layers and rely on runtime projection.
    gates:
      - gate.codex.no_runtime_yaml_mirror

gates:
  - id: gate.codex.no_runtime_yaml_mirror
    blocks: adapter_or_contract_change
    pass_when:
      - executable contracts remain in owner layers
      - runtime_projection.enabled contracts are projected through runtime compile
  - id: gate.codex.thin_adapter_boundary
    blocks: adapter_or_entrypoint_change
    pass_when:
      - AGENTS.md points to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml without duplicating their obligations.
      - ai-tools/agent/codex.md records only Codex-specific differences.
      - Bootstrap Receipt, Cognitive Mode, close-loop, goal ledger, and runtime phase details remain in canonical sources.
  - id: gate.codex.no_duplicate_root_rules
    blocks: agents_md_change
    pass_when:
      - AGENTS.md remains a thin bootstrap pointer.
      - reusable Codex rules live in shared enforcement sources or this adapter only when Codex-specific.

required_evidence:
  - dependency read summary
  - runtime compile / refresh / validate when execution-affecting contracts change
  - git status after writeback

success_criteria:
  - Codex starts from AGENTS.md, CORE_BOOTSTRAP.md, runtime/core-bootstrap.yaml, and ai-tools/agent/codex.md as appropriate.
  - Root AGENTS.md stays thin and does not duplicate bootstrap or reusable adapter rules.
  - Runtime SQLite remains canonical; no committed runtime YAML mirror is introduced.
  - Execution-affecting adapter changes are projected and validated.

failure_modes:
  - id: root_agents_rule_duplication
    detection: AGENTS.md grows independent rules instead of pointing to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml.
    recovery: Move reusable content to canonical sources or Codex-only deltas to ai-tools/agent/codex.md, then keep AGENTS.md as bootstrap pointer.
  - id: codex_adapter_bootstrap_duplication
    detection: Codex adapter repeats bootstrap obligations, formats, or runtime phase details instead of pointing to canonical sources.
    recovery: Replace duplicated prose with links to CORE_BOOTSTRAP.md and runtime/core-bootstrap.yaml.
  - id: runtime_yaml_mirror_created
    detection: Codex flow creates committed runtime YAML config mirror.
    recovery: Remove mirror and update runtime/runtime.db through the approved runtime flow.
  - id: metadata_yaml_as_contract
    detection: Codex treats metadata-only YAML as executable contract.
    recovery: Require executable-contract/v1 fields and runtime_projection.enabled.

final_status_report:
  required_fields:
    - adapter_sources_read
    - runtime_validation_status
    - root_entrypoint_status
    - git_status
