id: ai_tools.new_project_onboarding
title: New project onboarding flow
owner_layer: ai-tools
source_markdown: ai-tools/new-project-onboarding.md
status: active
contract_type: project_onboarding_flow

runtime_projection:
  enabled: true
  target_key: ai_tools.new_project_onboarding.contract
  surface_type: executable_yaml_contract
  execution_scope: project_initialization

activation:
  events:
    - new_project_created
    - init_project_command_changed
    - agent_tool_added_to_project_setup
    - project_bootstrap_template_changed
  required_when:
    - 修改 `ai-skill init-project`
    - 新增或移除 project-level AI tool bootstrap
    - 修改 `ai-tools/agent/<tool>.md` 且影響新專案初始化
    - 修改 project-local tool files 或 durable Markdown setup
    - 修改 GitHub Copilot project instructions 或 scoped instructions

inputs:
  required:
    - project_root
    - selected_tools
    - ai_skill_repo_path
  optional:
    - force_overwrite
    - dry_run
    - global_tool_setup

steps:
  - id: select_tools
    order: 1
    action: 決定新專案需要初始化哪些 AI tool
    required_sources:
      - ai-tools/README.md
      - ai-tools/agent-onboarding.yaml
    output: selected_tool_set

  - id: render_project_bootstrap_files
    order: 2
    action: 產生或更新 thin project-level bootstrap pointer files
    required_sources:
      - scripts/ai-skill-cli/internal/app/init_project.go
      - CORE_BOOTSTRAP.md
      - runtime/core-bootstrap.yaml
      - README.md
    output: project_bootstrap_files

  - id: apply_tool_specific_adapters
    order: 3
    action: 依工具套用 adapter-specific project setup
    required_sources:
      - ai-tools/agent/claude.md
      - ai-tools/agent/cursor.md
      - ai-tools/agent/roo.md
      - ai-tools/agent/gemini-cli.md
      - ai-tools/agent/codex.md
      - ai-tools/agent/copilot.md
    output: tool_adapter_setup

  - id: wire_durable_documentation_flow
    order: 4
    action: 不在通用 bootstrap 內複製 durable Markdown workflow；需要時由 project overlay 指向 documentation workflow
    required_sources:
      - workflow/documentation/README.md
      - workflow/documentation/execution-flow.md
    output: documentation_overlay_decision

  - id: validate_language_and_runtime_policy
    order: 5
    action: 套用語言一致性、tool neutrality 與 runtime source-of-truth 規則
    required_sources:
      - runtime/runtime.db
      - enforcement/neutral-language.md
      - enforcement/tool-neutral-documentation.md
    gates:
      - gate.output.language_consistency
      - gate.output.tool_neutrality
    output: policy_validation

  - id: run_runtime_validation
    order: 6
    action: 執行 runtime compile、refresh、validate
    required_commands:
      - "scripts\\ai-skill-cli\\bin\\ai-skill-windows-amd64.exe runtime compile --repo . --native-compiler --json"
      - "scripts\\ai-skill-cli\\bin\\ai-skill-windows-amd64.exe runtime refresh --repo . --json"
      - "scripts\\ai-skill-cli\\bin\\ai-skill-windows-amd64.exe runtime validate --repo . --json"
    output: validation_result

success_criteria:
  - 新專案 bootstrap files 只指向 `CORE_BOOTSTRAP.md` 與 `runtime/core-bootstrap.yaml` 等 canonical bootstrap source，不複製規則全文
  - project-local bootstrap files do not embed the local Ai-skill repository absolute path; use `<AI_SKILL_REPO>` placeholder and `AI_SKILL_REPO` environment variable instead
  - init-project creates `.ai-skill/local.env` as an ignored machine-local bridge file and `.ai-skill/.gitignore` to prevent committing the local path
  - Claude Code project setup includes `.claude/settings.json` hook wiring to Ai-skill Go runner for per-turn Cognitive Mode and nested Git report enforcement
  - GitHub Copilot project setup includes `.github/copilot-instructions.md` and `.github/instructions/ai-skill.instructions.md` as thin pointers only; hard enforcement remains in hooks, CI, and runtime validation
  - selected tools 與 `ai-tools/agent/` adapter 清單一致
  - 新增工具時同步更新 agent onboarding 與 project onboarding
  - 根目錄 README.md 已同步更新工具清單
  - runtime projection 為 synced

failure_modes:
  - id: missing_tool_in_project_onboarding
    detection: "`ai-tools/agent/<tool>.md` 存在，但 new project onboarding 沒有列入工具清單或 init-project 支援說明"
    recovery: "更新 `ai-tools/new-project-onboarding.md`、`ai-tools/new-project-onboarding.yaml` 與必要的 init-project code"

  - id: duplicated_project_rules
    detection: "project bootstrap file 複製大量規則正文"
    recovery: "改成 pointer，指向 `CORE_BOOTSTRAP.md`、`runtime/core-bootstrap.yaml` 與對應 adapter"

  - id: copilot_missing_scoped_instruction
    detection: "`--tools copilot` 只產生 `.github/copilot-instructions.md`，沒有 `.github/instructions/ai-skill.instructions.md`"
    recovery: "同步產生 project-wide 與 scoped thin pointer，並在 docs / tests / init-project code 中列入"
