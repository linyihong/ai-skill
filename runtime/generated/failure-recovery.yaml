loop_steps:
- step: Capture
  description: 在目前工作脈絡記錄發生什麼、在哪裡被發現、造成什麼 user-facing risk。
- step: Classify
  description: 用下方 taxonomy 分類失效模式。
- step: Contain
  description: 繼續廣泛工作前先控制當前風險。
- step: Promote
  description: 把可重用 lesson 放到正確 durable location。**寫入前必須依 [`sanitization.md`](sanitization.md)
    去敏**：不得包含本機絕對路徑（改用 `<AI_SKILL_REPO>`、`<PROJECT_ROOT>`、`<WORKSPACE>` 占位符）、使用者名稱、私有工作目錄、clone
    位置、secrets、raw tokens、私人 host、個資或 project-specific evidence。
- step: Strengthen
  description: 補強原本可防止它的 rule、workflow、checklist、tool adapter 或 validation gate。
- step: Validate
  description: 確認未來 agent 找得到並能套用這個 prevention。
- step: 可 stateless 重現
  description: 不需要前文提示或 conversation memory，給定相同 signals 應產出相同決策
- step: 有明確的 expected/forbidden route
  description: 可以定義「應該走哪條路」和「不該走哪條路」
- step: 有 prevention 價值
  description: 未來模型升級、架構變更或 routing 調整後，可能再次發生
- step: 不是一次性事件
  description: 同類 signals 組合可能在真實任務中再次出現
