failure_taxonomy:
- class: source-mirror-drift
  meaning: Agent 更新了 local tool mirror、project `.cursor`、runtime copy 或 generated
    bundle，而不是 canonical source repository。
  common_prevention: 要求 canonical repo check、source-first edit，再做 tool sync。
- class: dependency-miss
  meaning: Agent 修改或使用 rule/skill 時沒有讀 required linked dependencies。
  common_prevention: 補強 dependency read ledger 與 linked updates。
- class: goal-ledger-miss
  meaning: Multi-step 或可恢復 user goal 沒有正確記錄、更新、拆分、暫停或完成。
  common_prevention: 繼續前更新 `.agent-goals/`，並連到 todos/plans。
- class: validation-gap
  meaning: Agent 未做 diff review、lints、tests、link check、source check、sync、push、readback
    或 clean status 就宣稱完成。
  common_prevention: 加入具體 validation gate，並回報實際跑了什麼。
- class: scope-drift
  meaning: Agent 把無關變更、project incident details 或 local absolute paths 混進 reusable
    docs。
  common_prevention: 套用 reusable guidance boundary 與 sanitization。
- class: handoff-gap
  meaning: Agent 留下不清楚的 next actions、blockers、owner/lock state 或 remaining decisions。
  common_prevention: 更新 goal ledger、Document TODO 或 handoff notes。
- class: tool-strategy-gap
  meaning: Reusable rule 假設單一工具行為，而沒有隔離 tool-specific execution。
  common_prevention: 將工具細節移到 `ai-tools/` 或 skill adapter。
- class: parallelization-risk
  meaning: 多個 agents 可能獨立編輯 shared state、git history、migrations、release steps 或 rules。
  common_prevention: 標記 `non-parallelizable` 或 `single-owner`，遇到衝突 lock 就停止。
