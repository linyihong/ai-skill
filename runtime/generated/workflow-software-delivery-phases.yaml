  - action: "**必須完成。** 從可觀察的 UI、API、程式碼、測試、日誌、fixtures 和手動驗證中完成"
    source: table
  - action: 從已實作的行為和證據回填領域模型、架構、API/介面、錯誤處理和測試計劃
    source: table
  - action: 從程式碼、日誌、接線筆記和測試中回填 datasheet/協定參考、硬體上下文、驅動程式/服務/應用程式邊界、主機 fixtures 和啟動證據
    source: table
  - action: 將產品/規則 ID 連結到 BDD，BDD 連結到程式碼引用，BDD 連結到測試，API/命令/診斷合約連結到 fixtures，以及生成的客戶端連結到來源合約
    source: table
  blocking_gates:
  - &3
    id: gate.blocking.api
