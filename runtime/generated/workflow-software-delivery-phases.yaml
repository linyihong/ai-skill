    source: table
  - action: 首先添加一個小的、可重複的效能檢查；根據風險選擇負載、壓力、尖峰或浸泡測試。追蹤 P95/P99 延遲、吞吐量、錯誤率和資源使用率，而不僅是平均延遲
    source: table
  tables:
  - header:
    - 根本原因
    - 緩解措施
    rows:
    - - 任務被框架化為僅程式碼
