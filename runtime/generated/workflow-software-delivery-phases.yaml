      來源或目標驗證方法也是阻擋項
    severity: critical
    source: blocking_condition
  tables:
  - header:
    - 文件
    - 回填要求
    rows:
    - - Product Brief
      - 僅回填證據支援的目標、使用者、範圍、限制和假設；將不可取得的意圖標記為 `unknown` 或 `open question`
    - - BDD 行為
      - "**必須完成。** 從可觀察的 UI、API、程式碼、測試、日誌、fixtures 和手動驗證中完成"
    - - 合約
