    - - 使用者訊息省略了「更新文件」
      - 技能仍然適用：改變語義的 bug 修復在治理目的上**是**行為變更
    - - 完成定義 = 綠色 CI
      - 擴展 DoD：擁有合約/BDD 行已更新，或在變更簡報中記錄明確的**範圍化**文件債務 ticket ID
    - - 專案連結更新僅存在於儲存庫 README 中
      - 在觸及所列表面時遵循該矩陣；agent 在編輯這些套件時應讀取它
  - header:
    - 問題
    - 必要行動
    rows:
    - - 哪些既有行為不能回歸？
      - 為受影響的舊行為執行或添加回歸測試
    - - 引入了什麼新行為？
      - 在可行時在生產程式碼之前撰寫 BDD 和失敗測試或可執行規格
    - - 總覆蓋率是否隱藏了未測試的新程式碼？
      - 分別追蹤變更/新程式碼覆蓋率與整個專案覆蓋率
    - - 邏輯是否規則密集或安全敏感？
      - 添加突變測試、基於屬性的測試、不變量測試或負面案例
    - - 持久化是否重要？
      - 添加 fixture 支援的資料庫/儲存庫/遷移測試或整合測試
    - - 程式碼是否由 AI 生成？
      - 需要測試加上針對規劃文件、BDD、合約和邊緣案例的人類審查
    - - 這是嵌入式或硬體支援的？
      - 分開主機可重複測試與僅目標或硬體在迴路中的證據；記錄板子、接線、引腳/匯流排設定、韌體版本、日誌和觀察到的偏差
    - - 這個變更是否涉及效能？
      - 首先添加一個小的、可重複的效能檢查；根據風險選擇負載、壓力、尖峰或浸泡測試。追蹤 P95/P99 延遲、吞吐量、錯誤率和資源使用率，而不僅是平均延遲
- name: 5. 效能測試關卡（Performance Test Gate）
  source_line: 94
  allowed_actions:
  - action: 預期流量或正常批次量已知 | 系統在正常需求下保持在延遲、吞吐量、錯誤率和資源預算內
    source: table
  - action: 容量限制或擴展行為未知 | 系統可預測地降級，並在生產之前暴露第一個瓶頸
    source: table
  - action: 流量可能突然跳升、佇列可能爆量、或 AI 生成的變更改變了呼叫量 | 自動擴展、佇列、速率限制、快取和重試行為能承受突然的需求變化
    source: table
  - action: 記憶體、連線、快取、檔案控制代碼、佇列或資料庫漂移可能隨時間出現 | 長時間運行的行為保持穩定，不會洩漏資源或逐漸降級
    source: table
  - action: 延遲：使用者可見或合約可見操作的 P95 和 P99；平均值僅為支援性上下文。
    source: bullet
  - action: 吞吐量：相關表面的每秒/分鐘請求、作業、訊息或操作數。
    source: bullet
  - action: 錯誤率：超時、5xx、重試耗盡、佇列失敗或領域特定的失敗預算。
    source: bullet
  - action: 資源使用率：相關時的 CPU、記憶體、磁碟、網路、資料庫連線、佇列深度、執行緒/任務計數和外部呼叫量。
    source: bullet
  tables:
  - header:
    - 測試類型
    - 使用時機
    - 證明
    rows:
    - - 負載測試
      - 預期流量或正常批次量已知
      - 系統在正常需求下保持在延遲、吞吐量、錯誤率和資源預算內
    - - 壓力測試
      - 容量限制或擴展行為未知
      - 系統可預測地降級，並在生產之前暴露第一個瓶頸
    - - 尖峰測試
      - 流量可能突然跳升、佇列可能爆量、或 AI 生成的變更改變了呼叫量
      - 自動擴展、佇列、速率限制、快取和重試行為能承受突然的需求變化
    - - 浸泡測試
      - 記憶體、連線、快取、檔案控制代碼、佇列或資料庫漂移可能隨時間出現
      - 長時間運行的行為保持穩定，不會洩漏資源或逐漸降級
- name: 6. 已實作專案的回填規則（Backfill Rules for Implemented Projects）
  source_line: 114
  allowed_actions:
  - action: 僅回填證據支援的目標、使用者、範圍、限制和假設；將不可取得的意圖標記為 `unknown` 或 `open question`
