- name: 2. Quick Start（預設執行順序）
  source_line: 64
  allowed_actions:
  - action: 選擇 Frida 部署策略：- 初始化階段的函數（static initializer、constructor、library loading）→
      使用 **spawn 模式**（`frida -U -f <package> -l script.js`）
    source: step
  - action: 分析 Dart AOT 函數時檢查大小和回傳值：- 函數 ≤ 12 bytes（ARM64）→ 幾乎是 trivial field accessor，不是業務
      getter
    source: step
  - action: 分析加密 token 前綴時跨 session 比對：- 不要假設前綴是 device-specific——跨 session 比對是唯一可靠方式
    source: step
  - action: Automatic skill feedback：每次學到新 reusable technique 時，在同一輪寫入 `feedback_history/`。
    source: step
