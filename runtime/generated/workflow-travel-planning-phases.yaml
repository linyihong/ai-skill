- name: 12. 可行性建構
  source_line: 182
  allowed_actions:
  - action: 市區大眾運輸或步行轉乘：在不熟悉的地方至少 10-20 分鐘。
    source: bullet
  - action: 鄉村駕駛：為停車、狹窄道路、燃料、雪地或山路增加時間。
    source: bullet
  - action: 熱門餐廳和景點：考慮排隊、預訂確認、最後點餐時間、評論時效性、停車/交通便利性和售罄風險。
    source: bullet
  - action: 車中泊：在規則、廁所或停車佈局不確定時，在天黑前抵達。
    source: bullet
- name: 13. 行程可行性檢查
  source_line: 201
- name: 14. 日曆 / 應用程式就緒輸出
  source_line: 212
- name: 15. 車中泊 / Road Trip 檢查
  source_line: 224
  allowed_actions:
  - action: 當前官方規則允許或至少未明確禁止過夜停留。
    source: bullet
  - action: 停車場開放時間、閘門、高度限制、費用、安靜時間和車輛尺寸限制。
    source: bullet
  - action: 安靜程度和睡眠品質：與主要道路的距離、卡車停車/怠速、深夜交通、附近便利商店/餐廳活動、照明、火車/港口噪音、活動/人群風險和清晨活動。
    source: bullet
  - action: 夜間廁所 availability。
    source: bullet
  - action: 附近的沐浴或淋浴選項及其關門時間。
    source: bullet
  - action: 當行程跨越數夜、包含健行/海灘/雪地活動或使用者要求輕裝旅行時的洗衣或清洗選項。
    source: bullet
  - action: 垃圾、烹飪、發電機、怠速、帳篷、桌子和椅子規則。
    source: bullet
  - action: 安全、照明、冬季封閉、洪水、風或孤立風險。
    source: bullet
  - action: 附近合法的備案：RV Park、露營地、飯店、膠囊旅館、渡輪碼頭或 24 小時休息設施。
    source: bullet
  - action: 如果深夜或清晨供應不確定，在過夜區域前的燃料或充電。
    source: bullet
  - action: "`quiet`（安靜）：低交通/活動，無明顯的卡車/怠速集中，適合睡眠。"
    source: bullet
  - action: "`moderate`（中等）：有一些交通、照明或設施；在有注意事項的情況下可用。"
    source: bullet
  - action: "`noisy`（吵雜）：道路/卡車/深夜活動可能影響睡眠；僅在必要時使用。"
    source: bullet
  - action: "`unknown`（未知）：近期證據不足；添加較安靜的備案。"
    source: bullet
  - action: 沐浴：溫泉、錢湯、超級錢湯、日間使用飯店浴室、露營地淋浴或投幣式淋浴。
    source: bullet
  - action: 洗衣：靠近過夜基地、沐浴停留點、雜貨店或早晨出發路線的投幣式洗衣店。
    source: bullet
  - action: 恢復：深夜食物、便利商店、超市、燃料/充電、廁所、垃圾規則和乾燥的室內休息選項。
    source: bullet
  - action: 時間安排：在關門前有足夠緩衝的支援性停留；除非時間已確認，否則避免需要深夜沐浴或洗衣的計劃。
    source: bullet
  blocking_gates:
  - id: gate.prerequisite.
    description: 在
    severity: high
    source: prerequisite
- name: 16. 推薦檢查
  source_line: 255
  allowed_actions:
  - action: 每天是否有明確的主題和現實的節奏？
    source: bullet
  - action: 如果使用了旅行社/模型路線參考，計劃是否說明了每個來源是直接套裝選項還是僅供基準參考、直接選項的價格/包含項目，以及在驗證後借用或更改了什麼？
    source: bullet
  - action: 對於 2 小時以上或跨區域的轉乘，計劃是否按門到門時間、總成本、行李/轉乘負擔和延誤/天氣風險比較了合理的長途交通方式？
    source: bullet
  - action: 每天的行程是 `comfortable`（舒適）、`tight`（緊湊）還是 `too packed`（過滿），並且過載的日程是否已簡化？
    source: bullet
  - action: 對於每個關鍵停留點，計劃是否說明了做什麼、停留多久，以及是否有美食/當地特產推薦或支援性停留角色？
    source: bullet
  - action: 對於餐廳推薦，計劃是否使用了該國適用的評分/評論工具、交叉檢查了時間和路線適合性，並在售罄、排隊、關閉或停車風險重大時包含了附近的備案？
    source: bullet
  - action: 每個推薦地點是否有確切的 Google Maps 地點連結或精確標記，並且任何模糊位置是否清楚標記？
    source: bullet
  - action: 如果行程包含過夜住宿，每個住宿區域/候選是否根據路線邏輯、入住時間、停車/交通便利性和次日流程來放置？
    source: bullet
  - action: 路線是否避免了 A→B→中間點的折返？如果沒有，是否有 `backtracking warning`（折返警告）、原因和較短的替代方案？
    source: bullet
  - action: 順序是否針對天氣預報、日照和天氣敏感活動進行了優化？
    source: bullet
  - action: 營業時間和旅行時間是否與使用者的日期相容？
    source: bullet
  - action: 如果使用者可能使用日曆、地圖、提醒或旅行應用程式，是否包含了活動標題、時間、地點、備註、提醒和地圖列表分組？
    source: bullet
  - action: 是否檢查了關閉、季節性通行、假日和維護通知？
    source: bullet
  - action: 如果不是自駕，是否列出了出發時間、轉乘緩衝、最後返回選項、必要預訂和票價估算？
    source: bullet
  - action: 如果是自駕，是否使用距離、燃料/充電、過路費、停車、渡輪/橋樑和租車假設估算了粗略的交通成本？
    source: bullet
  - action: 如果自駕穿越稀疏區域，是否識別了燃料/充電間距，並推薦了加油/充電點和備案？
    source: bullet
  - action: 對於日本自駕，每個開車前往的停留點是否包含 Mapcode 或備用導航輸入，是否已與 Google Maps 和官方地址/交通詳細資訊進行交叉比對，並且
      Google Maps 駕駛點是否是最近確認的訪客可用停車場/官方停車場，而非景點入口、月極或私人專用停車場？
    source: bullet
  - action: 用餐和休息停留是否現實？
    source: bullet
  - action: 雨天、炎熱、雪、風、交通和關閉的備案是否足夠近以便使用？
    source: bullet
  - action: 對於公路旅行或車中泊，是否涵蓋了沐浴、洗衣、燃料/充電、雜貨和備用住宿？
    source: bullet
  - action: 對於車中泊，是否標記了安靜程度/睡眠品質，並且如果主要候選地點吵雜或未知，是否有較安靜的備案？
    source: bullet
  - action: 所有不確定的聲明是否已標記？
    source: bullet
  - action: 下一步行動是否具體：預訂、打電話、檢查官方公告、購買通行證、下載離線地圖或準備現金？
    source: bullet
- name: 17. 最終驗證
  source_line: 283
  allowed_actions:
  - action: 目標：計劃正在優化的目標。
    source: bullet
  - action: 行動：檢查的來源和使用的路線邏輯。
    source: bullet
  - action: 驗證或參考來源：官方/當前來源，或明確的不確定性標籤。
    source: bullet
gates:
- *1
