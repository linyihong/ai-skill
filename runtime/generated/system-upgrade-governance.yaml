forced_rules:
- id: rule.1
  title: 計畫書必須包含完成檢查清單
  lesson: "`2026-05-15-0920-runtime-execution-layer-upgrade-analysis.md` 的 Phase 規劃中沒有明確列出「完成後需要更新
    README」，導致執行 agent 忘記更新系統名稱。"
  enforcement: 每一份升級計畫書必須在結尾包含 §2 的檢查清單（或子集），執行 agent 在完成所有實作後逐項確認。
- id: rule.2
  title: 系統名稱變更必須寫在計畫書中
  lesson: 從 Knowledge OS → Cognitive Execution System 的名稱變更，在計畫書中只有 §一 的「現有框架摘要」提到舊名稱，沒有明確寫出「升級完成後
    README 標題要改為 XXX」。
  enforcement: |-
    如果升級涉及系統名稱變更，計畫書必須明確寫出：
    ```
    ## 完成條件
    - [ ] README.md 標題改為「# AI-native Cognitive Execution System」
    - [ ] README.md 描述改為「AI 認知執行系統 — ...」
    ```
- id: rule.3
  title: 舊檔案必須在升級過程中標註
  lesson: 第一次升級（skill → Knowledge OS）時，舊 `skills/` 檔案沒有即時標註 `# Deprecated`，導致 agent
    仍然優先讀取舊路徑。後來才透過 `primary_entrypoint` 機制修正。
  enforcement: |-
    - 內容被搬遷的舊檔案：標註 `# Deprecated — see <new path>`
    - 內容被提取的舊檔案：標註 `# Intelligence Extracted` 或 `# Extracted — See <target>`
    - 刪除舊檔案前：至少保留一個版本的 deprecated 過渡期
- id: rule.4
  title: 索引必須在升級完成前更新
  lesson: "`knowledge/runtime/routing-registry.yaml` 和 `knowledge/indexes/README.md`
    在多次升級中都曾被遺漏，直到跨層一致性檢查才補上。"
  enforcement: 索引更新是升級的**完成條件**，不是「有時間再補」。在檢查清單中必須有對應項目。
- id: rule.5
  title: Compiler 必須在升級完成前執行
  lesson: 修改 prose 檔案後忘記執行 `ruby runtime/compiler/compiler-engine.rb`，導致 generated
    YAML 與 canonical source 不一致。
  enforcement: 任何修改 prose 檔案的升級，在 commit 前必須執行 compiler 重新編譯 generated YAML。
