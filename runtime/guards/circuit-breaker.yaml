---
:circuit_breaker_version: v1
:status: candidate
:owner_layer: runtime/guards
:recursive_depth:
  :description: 防止 agent 在同一 task 中無限遞迴
  :max_depth: 4
  :reset_condition: task_completed
  :on_exceed:
  - :action: halt_agent
    :message: "⛔ Recursive depth exceeded ({depth}/{max_depth}). Agent halted."
  - :action: suggest_decomposition
    :message: 建議將目前 task 拆解為更小的子任務，使用 .agent-goals/ 管理。
:tool_calls:
  :description: 防止 tool 呼叫爆炸（search → search → search loop）
  :max_calls_per_task: 20
  :max_calls_per_session: 100
  :window_minutes: 5
  :max_calls_per_window: 15
  :on_exceed:
  - :action: warn
    :message: "⚠️ Tool call rate high ({calls}/{max_calls_per_window} in {window_minutes}m). 請確認是否陷入 tool loop。"
  - :action: suggest_consolidate
    :message: 建議合併多個 tool call 為一次綜合查詢。
:context_growth:
  :description: 防止 context 在單一 task 中快速膨脹
  :max_growth_per_task: 0.3
  :max_growth_per_session: 0.8
  :check_interval: task_boundary
  :on_exceed:
  - :action: warn
    :message: "⚠️ Context growth exceeded ({growth}/{max_growth}). 建議 prune 或建立新 session。"
  - :action: force_prune
    :strategy: moderate
:hallucination_risk:
  :description: 偵測高 hallucination 風險情境
  :risk_factors:
  - :factor: stale_summary
    :weight: 0.3
    :signal: summary 與 source 不一致
  - :factor: conflicting_rules
    :weight: 0.3
    :signal: 多條規則對同一情境有不同指示
  - :factor: insufficient_source
    :weight: 0.2
    :signal: 未讀 canonical source 就做出結論
  - :factor: tool_output_truncated
    :weight: 0.2
    :signal: tool output 被截斷但 agent 仍做判斷
  :risk_threshold: 0.7
  :on_exceed:
  - :action: halt_agent
    :message: "⛔ Hallucination risk score: {score}. Agent halted. 請先讀取 canonical source 再繼續。"
  - :action: suggest_source_reading
    :message: 建議先讀取以下 canonical source：{sources}
:mismatch_escalation:
  :description: 偵測 execution 中段的假設崩塌、反覆失敗或 source-of-truth miss，將一般 retry 升級為 recovery trigger
  :trigger_classes:
  - :class: repeated_failure
    :signal: 同一路徑、同一 automation、同一 checkpoint 連續失敗 2 次
    :level: L3
    :action: suspend_execution
  - :class: user_contradiction
    :signal: 使用者指出 agent 沒看文件、不是這個流程、或仍在猜測
    :level: L4
    :action: enter_recovery
  - :class: evidence_conflict
    :signal: UI、API、repo structure 與 workflow / contract / README 衝突
    :level: L4
    :action: enter_recovery
  - :class: source_of_truth_miss
    :signal: 重要操作前未讀 canonical workflow、owner docs、UI map、API contract 或 runtime source
    :level: L4
    :action: rediscovery_required
  - :class: automation_drift
    :signal: 腳本反覆 patch，但 checkpoint 截圖、foreground 或 feature context 不對
    :level: L4
    :action: suspend_execution
  :check_on:
  - per_failed_attempt
  - user_contradiction
  - evidence_conflict
  - before_retry_after_failure
  :actions:
  - :action: warn
    :message: "⚠️ Mismatch escalation trigger detected: {trigger_class}. Stop local patching and reload source-of-truth."
  - :action: suspend_execution
    :message: 暫停目前 implementation / automation，先寫出舊假設與反證。
  - :action: enter_recovery
    :message: 依 enforcement/escalation-policy.md 重建 execution graph。
  - :action: rediscovery_required
    :message: 重新讀 workflow primary source、owner docs、artifact gates 與必要 source-of-truth。
:conflict_rules:
  :description: 偵測目前 context 中的規則衝突
  :check_on: task_start
  :sources:
  - enforcement/rule-weight.md
  - enforcement/README.md
  :on_conflict:
  - :action: warn
    :message: "⚠️ 偵測到規則衝突。依 rule-weight.md 判斷優先序。"
  - :action: suggest_resolution
    :message: P0（安全/source）> P1（validation）> P2（user goal）> P3（tool adapter）> P4（efficiency）
