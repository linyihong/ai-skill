queue_management_rules:
    - description: 進入新 phase 時初始化 execution queue
      id: queue.rule.init_on_phase_entry
      name: Initialize Queue on Phase Entry
      rule: |
        載入 runtime.db phase_machine 中該 phase 的 blocking_gates 與 obligations， 加上 runtime.db blocking_gates 與 runtime.db obligation_ledger 的完整定義， 建立初始 queue。
      trigger: phase transition
    - description: queue 依 priority 降序排列
      id: queue.rule.sort_by_priority
      name: Sort by Priority
      rule: P0 > P1 > P2 > P3，同 priority 內依 deadline 升序
      trigger: 每次 queue 變更
    - description: 有 depends_on 的項目必須在上游完成後才能執行
      id: queue.rule.resolve_dependencies
      name: Resolve Dependencies
      rule: 如果 depends_on 中有未完成的項目，該項目設為 blocked
      trigger: 每次 queue 變更
    - description: 取出 queue 中 priority 最高且 dependencies 已滿足的項目
      id: queue.rule.dequeue_next
      name: Dequeue Next Runnable
      rule: 過濾 status=pending 且所有 depends_on 皆為 completed 的項目，取 priority 最高者
      trigger: 目前項目完成時
    - description: 當項目執行失敗時的處理
      id: queue.rule.handle_failure
      name: Handle Item Failure
      rule: |
        如果 severity=critical → 阻斷 phase transition，進入 recovery phase。 如果 severity=high → 阻斷 transition 但可進入 recovery。 如果 severity=medium → 記錄 warning，繼續執行。
      trigger: 項目 status=failed
    - description: recovery phase 的 queue 優先於所有其他 queue
      id: queue.rule.recovery_override
      name: Recovery Override
      rule: 當 current_phase=recovery 時，recovery queue 的項目提升至 P0
      trigger: phase=recovery
queue_structure:
    description: |
        每個 phase 有一個 execution queue，包含該 phase 的所有待執行項目。 Queue 是動態的：完成一個項目可能新增相依項目到 queue 中。
    fields:
        - description: 項目唯一識別碼
          format: queue.{phase}.{type}.{seq}
          name: id
          type: string
        - description: 所屬 phase
          enum:
            - bootstrap
            - checkpoint
            - execution
            - validation
            - commit
            - push
            - readback
            - finalize
            - recovery
          name: phase
          type: string
        - description: 項目類型
          enum:
            - gate
            - obligation
            - action
            - repair
            - reconciliation
          name: type
          type: string
        - description: 引用 runtime.db blocking_gates、runtime.db obligation_ledger 或 recovery 中的 id
          name: ref
          type: string
        - description: 優先級
          enum:
            - P0
            - P1
            - P2
            - P3
          name: priority
          type: string
        - description: 執行狀態
          enum:
            - pending
            - running
            - completed
            - failed
            - skipped
          name: status
          type: string
        - description: 此項目依賴的其他 queue item id
          name: depends_on
          type: list[string]
        - description: 估計的資源消耗
          name: estimated_cost
          properties:
            steps: integer
            tokens: integer
          type: object
        - description: 應在多少步驟內完成（null = 無期限）
          name: deadline
          type: integer
        - description: 執行結果
          name: result
          properties:
            message: string
            status: string
            timestamp: string
          type: object
    name: Phase Execution Queue
status: candidate
