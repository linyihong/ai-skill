schema_version: "1.0"
id: runtime.cli-modification-policy
status: active
owner_layer: runtime
source_markdown: null

runtime_projection:
  enabled: true
  target_key: runtime.cli_modification_policy.contract
  surface: generated_surfaces

purpose: >
  Executable policy for modifying ai-skill CLI (scripts/ai-skill-cli/).
  Every CLI change is a software-delivery task; this contract specifies
  the CLI-specific gates layered on top of the generic
  workflow/software-delivery/ execution flow.

  Triggered by 2026-05-26 observation: hooks run commit-msg / pre-push /
  runtime obligations subcommands shipped without command-contract.md
  updates (multi-day documentation drift). YAML defines the gates so
  future modifications follow the same closure.

parent_workflow:
  path: workflow/software-delivery/execution-flow.md
  yaml: workflow/software-delivery/execution-flow.yaml
  role: |
    CLI changes inherit the full software-delivery flow:
    1. Start From Evidence
    2. Docs-First BDD Closure Loop
    3. Acceptance + Validation
    4. Linked updates + close-loop
    This contract adds CLI-specific gates as required artifacts within
    that flow.

applies_when:
  - staged_path_glob: scripts/ai-skill-cli/internal/**/*.go
  - staged_path_glob: scripts/ai-skill-cli/cmd/**/*.go
  - staged_path_glob: scripts/ai-skill-cli/internal/app/*.go

cli_specific_gates:
  - id: gate.cli.command_contract_synced
    description: |
      Adding / renaming / removing a CLI subcommand or hook handler MUST
      update scripts/ai-skill-cli/docs/command-contract.md in the SAME
      commit (table row + per-command section). Internal validator
      functions called from existing hooks do not require contract row
      updates but should be mentioned in the affected hook section.
    detection_signals:
      - new `case "<command>":` dispatch added in Go
      - new `runXxxHook` or `buildRuntimeXxxResult` function added
      - new subcommand value added to allowed-command list
    enforcement_layer: commit_msg_hook
    validator: validateCLIDocSync
    severity: block
    opt_out_marker: "[skip-cli-doc-sync]"

  - id: gate.cli.go_tests_pass
    description: |
      go test ./scripts/ai-skill-cli/... must pass before commit.
      Currently enforced via pre-push hook's cli_ci_preflight; this
      gate documents the explicit requirement.
    enforcement_layer: pre_push_hook
    severity: block

  - id: gate.cli.bin_rebuild_for_HEAD
    description: |
      When CLI source changes, scripts/ai-skill-cli/bin/* must be rebuilt
      with HEAD commit SHA before push. Enforced by
      TestRepoLocalBinariesMatchChecksumsAndCurrentSource pre-push test.
    enforcement_layer: pre_push_hook
    severity: block
    canonical_command: |
      cd scripts/ai-skill-cli && go run ./cmd/releasebuild \
        --stable-names --version "repo-$(git rev-parse --short HEAD)" \
        --commit "$(git rev-parse --short HEAD)" --dist bin

  - id: gate.cli.scenario_or_unit_test
    description: |
      New behavioral validators / hook handlers / runtime subcommands
      need either (a) a validation scenario in validation/scenarios/ OR
      (b) a Go unit test in scripts/ai-skill-cli/internal/app/*_test.go.
      Pure refactors are exempt.
    enforcement_layer: review (manual + future CI)
    severity: warning

  - id: gate.cli.runtime_compile_when_yaml_touched
    description: |
      If the CLI change touches runtime/*.yaml schemas or compileXxx
      functions in runtime_compiler.go, the same commit must include
      runtime.db recompile + staged.
    enforcement_layer: pre_commit_hook (already wired via hooks.go
      runtime source change detection)
    severity: block

  - id: gate.cli.no_new_shell_scripts
    description: |
      New .sh script files are forbidden. Per cross-platform Go script
      runtime policy (plans/archived/2026-05-21-0834-cross-platform-go-script-runtime.md),
      all new script logic MUST be implemented in Go CLI
      (scripts/ai-skill-cli/internal/app/hooks.go or new subcommand).
      ai-skill hooks install writes platform-correct binary path to
      .claude/settings.json.

      Modifying existing .sh files (pending migration) does NOT trigger.
      Short-lived transition wrappers may opt out with [skip-go-migration]
      as a standalone line in commit message body, but MUST include a
      Go migration plan in the commit message.
    detection_signals:
      - git diff --cached --diff-filter=A --name-only | grep '\.sh$'
    enforcement_layer: pre_commit_hook
    validator: validateNoNewShellScripts
    severity: block
    opt_out_marker: "[skip-go-migration]"
    failure_pattern: enforcement/failure-patterns/shell-script-added-without-go-migration.md

  - id: gate.glossary.retro_own_required
    description: |
      When staged diff touches framework cognitive vocabulary surface
      (runtime/cognitive-modes*.yaml, runtime/economics/**, ecosystem/**),
      knowledge/glossary/ai-skill.md MUST also be staged in the same
      commit. Prevents subsystem-local term drift — any new signal /
      enum value / mode name / contract field introduced to the
      cognitive vocabulary surface must retro-own a canonical glossary
      entry so the term has single owner-layer per knowledge/glossary/
      README.md §Semantic Ownership.

      Pure refactor / typo / comment-only changes may opt out via
      [skip-glossary-retro-own] as a standalone trailer line with
      explanation in the commit message body.
    detection_signals:
      - staged path matches runtime/cognitive-modes*.yaml
      - staged path matches runtime/economics/**
      - staged path matches ecosystem/**
      - knowledge/glossary/ai-skill.md NOT in staged paths
    enforcement_layer: commit_msg_hook
    validator: validateGlossaryRetroOwn
    severity: block
    opt_out_marker: "[skip-glossary-retro-own]"
    upstream_plan: plans/active/2026-05-25-1000-context-language-glossary-system.md (Phase 6)
    related_scenario: validation/scenarios/failure-derived/glossary-retro-own-missing-v1.yaml

  - id: gate.plan.checkbox_sync_required
    description: |
      When a commit references plans/active/<plan>.md in its body AND
      stages real work (Go source, validation scenarios, runtime YAML,
      governance, enforcement), the referenced plan MUST be staged in
      the same commit AND its staged diff MUST include at least one
      `- [ ]` → `- [x]` transition. Prevents reality-only-completion
      drift (work landed but plan checkboxes stay unchecked).

      Pure hotfix / refactor / pre-existing-state edits that do not
      advance a plan phase may opt out via [skip-plan-checkbox-sync]
      as a standalone trailer line.
    detection_signals:
      - "commit body contains plans/active/*.md reference"
      - "staged paths include .go / validation/scenarios/ / runtime/ / governance/ / enforcement/ path"
      - "plan diff lacks any `+- [x]` line addition"
    enforcement_layer: commit_msg_hook
    validator: validatePlanCheckboxSync
    severity: block
    opt_out_marker: "[skip-plan-checkbox-sync]"
    upstream_plan: plans/active/2026-05-28-1200-gen3-runtime-trigger-audit-and-completion.md (Phase 5)

  - id: gate.plan_archival_audit_required
    description: |
      When a commit moves a plan file from plans/active/<name>.md to
      plans/archived/<name>.md (detected by staged deletion + addition of
      the same basename), the archived version MUST have no unresolved
      `- [ ]` items OR the commit body MUST explicitly justify each
      open item (deferred / non-goal / scope reduced / handover / 延後 / 拆分).

      Emergency archives may opt out via [skip-plan-archival-audit] as a
      standalone trailer line.
    detection_signals:
      - "staged paths include plans/active/<name>.md (deletion) AND plans/archived/<name>.md (addition) with matching basename"
      - "archived file content contains one or more '- [ ]' lines"
      - "commit body lacks justification keyword"
    enforcement_layer: commit_msg_hook
    validator: validatePlanArchivalAudit
    severity: block
    opt_out_marker: "[skip-plan-archival-audit]"
    upstream_plan: plans/active/2026-05-28-1830-plan-archival-audit-validator.md (Phase 2)

  - id: gate.runtime_trigger_wiring_required
    description: |
      When staged diff adds a new route.* entry to
      knowledge/runtime/routing-registry.yaml OR a new target_key to
      any runtime/*.yaml file, the new surface MUST be wired:
      - new route: discovery signal in runtime/cognitive-modes-discovery.yaml
        OR commit-msg validator / hook reference in
        scripts/ai-skill-cli/internal/app/hooks.go OR explicit
        `manual_activation: { reason: <enum> }` annotation in the same
        routing-registry entry
      - new target_key: routing-registry consumer OR Go validator
        / hook that queries the projection

      Enforces governance/lifecycle/system-upgrade-governance.yaml
      §define_runtime_trigger_flow forbidden rules at commit time so
      new orphans cannot land. Doc-only / annotation-only / pre-existing
      cleanup commits may opt out via [skip-runtime-trigger-wiring] as
      a standalone trailer line.
    detection_signals:
      - "staged path is knowledge/runtime/routing-registry.yaml with added `- id: route.*` line in git diff --cached"
      - "staged path matches runtime/*.yaml with added `target_key:` line"
    enforcement_layer: commit_msg_hook
    validator: validateRuntimeTriggerWiring
    severity: block
    opt_out_marker: "[skip-runtime-trigger-wiring]"
    upstream_plan: plans/active/2026-05-28-1200-gen3-runtime-trigger-audit-and-completion.md (Phase 5)
    related_scenario: validation/scenarios/failure-derived/orphan-routing-entry-v1.yaml + validation/scenarios/failure-derived/orphan-projection-target-key-v1.yaml

modification_rule:
  description: |
    When editing this YAML / validator / gate list:
    1. Update workflow/software-delivery/execution-flow.md cross-link
       (if a new gate is added to that flow).
    2. Update scripts/ai-skill-cli/docs/command-contract.md if the new
       gate produces a CLI surface.
    3. Add a failure pattern at enforcement/failure-patterns/cli-doc-drift.md
       if the failure is new.
    4. Failing scenario test-first per system-upgrade-governance §3 Rule 9.

related_failure_patterns:
  - enforcement/failure-patterns/source-mirror-write-drift.md
  - enforcement/failure-patterns/framework-duplication-without-interrogation.md
  - enforcement/failure-patterns/bootstrap-entry-bloat.md
  - planned: enforcement/failure-patterns/cli-doc-drift.md (Phase 6 of bootstrap-yaml-migration)
  - enforcement/failure-patterns/shell-script-added-without-go-migration.md

linked_plans:
  - plans/archived/2026-05-25-2200-bootstrap-contract-yaml-migration.md (Phase 6 adds validateCLIDocSync)
  - plans/archived/2026-05-21-0834-cross-platform-go-script-runtime.md (parent CLI build-out)

acceptance:
  - YAML projected to generated_surfaces[runtime.cli_modification_policy.contract]
  - Phase 6 of bootstrap-yaml-migration implements validateCLIDocSync per this contract
  - workflow/software-delivery/ retains canonical execution-flow ownership

source: >
  2026-05-26 user feedback: hooks run commit-msg / pre-push / runtime
  obligations shipped without command-contract.md updates. Need a YAML
  contract so future ai-skill-cli changes follow the same closure,
  linking to software-delivery workflow as parent.
