# Capability Discovery Checkpoints
# 定義每個 phase 中 agent 應執行的能力探索檢查點。
# Discovery 的目的是讓 agent 在執行前主動搜尋「可能不知道的能力」，
# 解決 Capability Discovery Problem：lazy loading 本身不會產生探索意識。
#
# 每個 checkpoint 定義：
#   - phase: 所屬 phase
#   - trigger: 觸發時機（before_execution / before_validation / before_finalize）
#   - discovery_targets: 要搜尋的能力類型
#   - search_sources: 搜尋來源（knowledge graph / routing registry / indexes）
#   - min_confidence: 最低信心度，低於此值時建議讀取原始 prose
#   - failure_action: 探索失敗時的處理方式
#
# 依賴：
#   - knowledge/graphs/README.md（graph edge types）
#   - knowledge/runtime/routing-registry.yaml（routing records）
#   - knowledge/indexes/README.md（task intent routing table）
#   - runtime/phases/phase-machine.yaml（phase 定義）

discovery_checkpoints_version: v1
status: active
owner_layer: runtime/discovery
description: >
  Phase-aware capability discovery checkpoints. 定義 agent 在每個 phase 中
  應主動探索的能力類型與搜尋來源。Discovery 是 meta-cognitive 層的操作，
  與 lazy-loading（activation engine）互補：activation 被動回應已知條件，
  discovery 主動搜尋未知能力。

checkpoints:
  # ── Checkpoint Phase Discovery ──
  # 在 checkpoint 階段，agent 應搜尋與本輪任務相關的工作流程、驗證規則、
  # 以及可能適用的 intelligence atoms。
  - phase: phase.checkpoint
    trigger: before_execution
    description: >
      在進入 execution 前，搜尋與本輪任務相關的能力。
      此 checkpoint 確保 agent 不會因為不知道某個 workflow 或 intelligence atom
      而採用次佳策略。
    discovery_targets:
      - type: workflow
        description: "搜尋與任務意圖相關的工作流程"
        search_sources:
          - knowledge/indexes/README.md  # 55-route task intent routing table
          - knowledge/runtime/routing-registry.yaml  # 1227-line routing records
        min_confidence: medium
        failure_action: warn + continue
      - type: intelligence
        description: "搜尋與任務領域相關的 intelligence atoms"
        search_sources:
          - knowledge/graphs/README.md  # graph edges: depends_on, related_to
          - intelligence/README.md  # intelligence layer index
        min_confidence: low
        failure_action: warn + continue
      - type: validation_rules
        description: "搜尋與任務相關的驗證規則與 failure patterns"
        search_sources:
          - enforcement/failure-patterns/README.md  # failure pattern index
          - validation/README.md  # validation scenarios
        min_confidence: low
        failure_action: ignore
      - type: governance
        description: "搜尋與任務相關的治理規則（系統升級、知識更新等）"
        search_sources:
          - governance/lifecycle/README.md  # lifecycle index
          - governance/validation/README.md  # validation gates
        min_confidence: low
        failure_action: ignore

  # ── Execution Phase Discovery ──
  # 在 execution 階段，agent 應搜尋與當前操作相關的技術細節、
  # 語言特定 intelligence、以及可能需要的工具。
  - phase: phase.execution
    trigger: during_execution
    description: >
      在執行過程中，當遇到未知領域或技術問題時，主動搜尋相關 intelligence。
      此 checkpoint 是「on-demand discovery」，只在需要時觸發。
    discovery_targets:
      - type: language_specific
        description: "搜尋與當前程式語言相關的 intelligence atoms"
        search_sources:
          - intelligence/engineering/language-specific/README.md
        min_confidence: low
        failure_action: ignore
      - type: analytical_reasoning
        description: "搜尋與當前分析任務相關的啟發式規則"
        search_sources:
          - intelligence/engineering/analytical-reasoning/README.md
        min_confidence: low
        failure_action: ignore
      - type: failure_patterns
        description: "搜尋與當前操作相關的已知失效模式"
        search_sources:
          - enforcement/failure-patterns/README.md
        min_confidence: low
        failure_action: ignore

  # ── Validation Phase Discovery ──
  # 在 validation 階段，agent 應搜尋與驗證相關的規則與 scenarios，
  # 確保驗證的完整性。
  - phase: phase.validation
    trigger: before_validation
    description: >
      在執行驗證前，搜尋與本輪產出相關的驗證規則與 scenarios。
      此 checkpoint 確保 agent 不會遺漏重要的驗證項目。
    discovery_targets:
      - type: validation_scenarios
        description: "搜尋與本輪產出相關的 validation scenarios"
        search_sources:
          - validation/README.md  # scenario index
        min_confidence: medium
        failure_action: warn + continue
      - type: output_governance
        description: "搜尋 output governance 規則"
        search_sources:
          - runtime/output-governance/README.md
        min_confidence: medium
        failure_action: warn + continue
      - type: linked_updates
        description: "搜尋需要連動更新的相關檔案"
        search_sources:
          - enforcement/linked-updates.md
        min_confidence: high
        failure_action: warn + continue

  # ── Finalize Phase Discovery ──
  # 在 finalize 階段，agent 應搜尋 writeback 需求與 transaction gates。
  - phase: phase.finalize
    trigger: before_finalize
    description: >
      在完成前，搜尋 writeback 需求與 transaction 相關規則。
      此 checkpoint 確保 agent 不會遺漏回寫步驟。
    discovery_targets:
      - type: writeback_requirements
        description: "搜尋回寫需求與 transaction gates"
        search_sources:
          - runtime/transactions/transaction-machine.yaml
          - enforcement/dependency-reading.md  # writeback transaction guard
        min_confidence: high
        failure_action: warn + continue
      - type: completion_criteria
        description: "搜尋完成條件與 close-loop 規則"
        search_sources:
          - enforcement/conversation-goal-ledger.md
          - scripts/ai-skill-close-loop.sh
        min_confidence: high
        failure_action: warn + continue

# ── Discovery Search Strategy ──
# 定義 discovery 的搜尋策略與優先順序。
search_strategy:
  priority_order:
    - knowledge/indexes/README.md  # 最快：55-route task intent table
    - knowledge/graphs/README.md  # 次快：graph edges
    - knowledge/runtime/routing-registry.yaml  # 最完整：1227-line routing records
  fallback:
    - type: directory_scan
      description: "掃描相關目錄結構，尋找未在索引中註冊的檔案"
      max_depth: 2
    - type: grep_search
      description: "使用 regex 搜尋關鍵字"
      max_results: 10
  min_confidence_threshold: low  # 低於此值時建議讀取原始 prose

# ── Integration Notes ──
# Discovery 與 Activation Engine 的關係：
#   - Activation Engine（runtime/router/activation-engine.rb）: 被動 lazy-loading，
#     根據已知條件（file_change、task_intent、user_signal）觸發規則載入。
#   - Discovery Checkpoints（本檔案）: 主動探索，在每個 phase 的關鍵時機
#     搜尋 agent 可能不知道的能力。
#   - 兩者互補：activation 確保已知規則被載入，discovery 確保未知能力被發現。
#
# Discovery 與 Knowledge Graphs 的關係：
#   - Knowledge graphs（knowledge/graphs/）提供 edge relationships
#     （depends_on、related_to、routes_to）作為 discovery 的搜尋索引。
#   - Discovery 使用 graph edges 來發現與當前任務相關的知識。
#   - 當 graph 中缺少 edge 時，discovery 會 fallback 到 directory_scan 或 grep_search。
