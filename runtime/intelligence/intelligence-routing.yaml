# Intelligence Routing
# 定義 agent 如何根據 phase + task intent 路由到 intelligence/ 層的領域知識。
# Intelligence 知識留在原處（intelligence/），runtime 只存放 routing 規則。
# COMPILER SOURCE → intelligence_routing
#
# 使用方式：
# 1. 當 task intent 確定後 → 查詢本檔找到對應 domain
# 2. 檢查目前 phase 是否在 applicable_phases 中
# 3. 載入 domain 的 README.md（summary）
# 4. 若需要 → 載入特定 heuristic/pattern/tradeoff 檔案
# 5. 若無匹配 → fallback 到 intelligence/README.md 全文搜尋

version: 1.0
status: candidate
owner_layer: runtime/intelligence
last_updated: 2026-05-15

routing_rules:

  # ── Analytical Reasoning ──
  - id: route.intelligence.analytical_reasoning
    domain: analytical_reasoning
    path: intelligence/engineering/analytical-reasoning/
    applicable_phases:
      - phase.execution
      - phase.validation
    task_intent_patterns:
      - "分析"
      - "逆向"
      - "偵測"
      - "triage"
      - "capture"
      - "證據"
    load_strategy: lazy
    priority: P2
    description: "分析推理 heuristic，適用於 APK 分析、流量分析、偵測等任務"

  # ── Agent Architecture ──
  - id: route.intelligence.agent_architecture
    domain: agent_architecture
    path: intelligence/engineering/agent-architecture/
    applicable_phases:
      - phase.checkpoint
      - phase.finalize
    task_intent_patterns:
      - "架構"
      - "規則"
      - "設計"
      - "migration"
      - "重構"
    load_strategy: lazy
    priority: P2
    description: "Agent 架構知識，適用於規則設計、架構遷移等任務"

  # ── Development ──
  - id: route.intelligence.development
    domain: development
    path: intelligence/engineering/development/
    applicable_phases:
      - phase.execution
      - phase.validation
    task_intent_patterns:
      - "開發"
      - "BDD"
      - "測試"
      - "contract"
      - "程式碼"
    load_strategy: lazy
    priority: P2
    description: "開發流程 heuristic，適用於 BDD closure、contract governance 等任務"

  # ── Heuristics ──
  - id: route.intelligence.heuristics
    domain: heuristics
    path: intelligence/engineering/heuristics/
    applicable_phases:
      - phase.execution
    task_intent_patterns:
      - "heuristic"
      - "經驗"
      - "判斷"
      - "通用"
    load_strategy: lazy
    priority: P3
    description: "通用 engineering heuristics"

  # ── Anti-patterns ──
  - id: route.intelligence.anti_patterns
    domain: anti_patterns
    path: intelligence/engineering/anti-patterns/
    applicable_phases:
      - phase.validation
      - phase.finalize
    task_intent_patterns:
      - "反模式"
      - "anti-pattern"
      - "可疑"
      - "重複問題"
    load_strategy: lazy
    priority: P3
    description: "Engineering anti-patterns，適用於 code review 與設計審查"

  # ── Tradeoffs ──
  - id: route.intelligence.tradeoffs
    domain: tradeoffs
    path: intelligence/engineering/tradeoffs/
    applicable_phases:
      - phase.execution
      - phase.checkpoint
    task_intent_patterns:
      - "技術決策"
      - "tradeoff"
      - "比較"
      - "選擇"
    load_strategy: lazy
    priority: P3
    description: "技術 tradeoff 分析"

  # ── Distributed Systems ──
  - id: route.intelligence.distributed_systems
    domain: distributed_systems
    path: intelligence/engineering/distributed-systems/
    applicable_phases:
      - phase.execution
    task_intent_patterns:
      - "分散式"
      - "distributed"
      - "一致性"
      - "共識"
    load_strategy: lazy
    priority: P3
    description: "分散式系統模式與 heuristic"

  # ── Domain ──
  - id: route.intelligence.domain
    domain: domain
    path: intelligence/engineering/domain/
    applicable_phases:
      - phase.execution
    task_intent_patterns:
      - "領域建模"
      - "domain"
      - "aggregate"
      - "bounded context"
    load_strategy: lazy
    priority: P3
    description: "領域驅動設計 heuristic"

  # ── Failure ──
  - id: route.intelligence.failure
    domain: failure
    path: intelligence/engineering/failure/
    applicable_phases:
      - phase.validation
      - phase.recovery
    task_intent_patterns:
      - "失效"
      - "failure"
      - "錯誤"
      - "異常"
      - "blocking gate"
    load_strategy: lazy
    priority: P2
    description: "工程 failure pattern，適用於 blocking gate 阻斷或驗證失敗時"

  # ── Travel ──
  - id: route.intelligence.travel
    domain: travel
    path: intelligence/travel/
    applicable_phases:
      - phase.execution
    task_intent_patterns:
      - "旅行"
      - "旅遊"
      - "travel"
      - "itinerary"
    load_strategy: lazy
    priority: P2
    description: "旅行規劃 heuristic"

  # ── Business ──
  - id: route.intelligence.business
    domain: business
    path: intelligence/business/
    applicable_phases:
      - phase.execution
    task_intent_patterns:
      - "商業"
      - "business"
      - "定價"
      - "pricing"
      - "SaaS"
    load_strategy: lazy
    priority: P3
    description: "商業分析 heuristic"

  # ── IDE ──
  - id: route.intelligence.ide
    domain: ide
    path: intelligence/ide/
    applicable_phases:
      - phase.execution
    task_intent_patterns:
      - "IDE"
      - "VSCode"
      - "設定"
      - "extension"
    load_strategy: lazy
    priority: P3
    description: "IDE 設定與使用 heuristic"

# Fallback 規則
fallback:
  strategy: full_search
  target: intelligence/README.md
  description: "若無 routing rule 匹配，fallback 到 intelligence/README.md 全文搜尋"
