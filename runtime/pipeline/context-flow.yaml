# Progressive Context Expansion Flow
# 定義 context 如何從 summary → module summary → detailed source → raw source 漸進擴展。
# 目標：不一次載入全部，只在需要時擴展到下一層。
# COMPILER SOURCE → pipeline_context_flow
#
# 依賴：
#   - knowledge/summaries/ (summary layer)
#   - runtime/context/ttl-policy.yaml (cache/TTL policy)
#   - skills-index.yaml (skill entrypoint mapping)

context_flow_version: v1
status: candidate
owner_layer: runtime/pipeline
description: >
  Progressive context expansion flow. 定義 context 從最輕量的 summary 開始，
  只有在 summary 不足時才逐步擴展到 module summary → detailed source → raw source。
  每個層級有明確的 entry condition、estimated tokens、exit condition 與 cache policy。

expansion_levels:
  - id: summary
    name: Summary Level
    description: >
      最輕量的 context 層。只載入 summary（≤500 tokens），
      提供任務所需的高層次概覽。
    estimated_tokens: 500
    cache_policy:
      ttl: session
      revalidate_on: task_change
    entry_conditions:
      - routing_complete: true
      - skill_identified: true
    sources:
      - type: skill_summary
        path_template: "knowledge/summaries/{skill-id}.md"
        description: "Skill summary（≤500 tokens）"
        condition: "relevance_score >= 0.5"
      - type: rule_summary
        path_template: "knowledge/summaries/{rule-id}.md"
        description: "Rule summary（≤300 tokens）"
        condition: "activation_rule_matched == true"
    exit_conditions:
      - summary_sufficient: true
      - OR summary_insufficient: true  # 進入下一層
    output:
      - summary_context: "Summary-level understanding of skill/rules"
      - next_level: "module_summary (if insufficient)"

  - id: module_summary
    name: Module Summary Level
    description: >
      中量 context 層。載入 skill 的 module-level summary（如 README.md），
      提供模組結構與關鍵入口點。
    estimated_tokens: 1500
    cache_policy:
      ttl: session
      revalidate_on: task_change
    entry_conditions:
      - summary_insufficient: true
      - module_summary_available: true
    sources:
      - type: skill_readme
        path_template: "skills/{skill-id}/README.md"
        description: "Skill README（~800 tokens）"
        condition: "exists"
      - type: module_readme
        path_template: "{module}/README.md"
        description: "Module README（~500 tokens）"
        condition: "cross_module_reference == true"
    exit_conditions:
      - module_summary_sufficient: true
      - OR detailed_source_needed: true  # 進入下一層
    output:
      - module_context: "Module-level understanding of structure"
      - next_level: "detailed_source (if insufficient)"

  - id: detailed_source
    name: Detailed Source Level
    description: >
      重 context 層。載入完整 source file（如 SKILL.md、full rule file），
      提供執行所需的完整細節。
    estimated_tokens: 4500
    cache_policy:
      ttl: task
      revalidate_on: tool_call
    entry_conditions:
      - module_summary_insufficient: true
      - detailed_source_available: true
    sources:
      - type: skill_entrypoint
        path_template: "skills/{skill-id}/SKILL.md"
        description: "Skill full source（~3500 tokens）"
        condition: "summary_insufficient == true"
      - type: rule_full
        path_template: "enforcement/{rule-id}.md"
        description: "Rule full source（~2000 tokens）"
        condition: "activation_rule_matched == true AND summary_insufficient == true"
      - type: architecture_doc
        path_template: "architecture/{doc-id}.md"
        description: "Architecture document（~3000 tokens）"
        condition: "architecture_reference_needed == true"
    exit_conditions:
      - detailed_source_sufficient: true
      - OR raw_source_needed: true  # 進入下一層
    output:
      - detailed_context: "Full source-level understanding"
      - next_level: "raw_source (if insufficient)"

  - id: raw_source
    name: Raw Source Level
    description: >
      最重 context 層。載入原始未壓縮的 source（如完整 feedback history、原始 log），
      僅在 debug 或 deep analysis 時使用。
    estimated_tokens: 10000
    cache_policy:
      ttl: task
      revalidate_on: tool_call
      max_age: 3  # 最多保留 3 個 tool call
    entry_conditions:
      - detailed_source_insufficient: true
      - raw_source_available: true
      - raw_source_justified: true  # 必須有明確理由
    sources:
      - type: feedback_history
        path_template: "skills/{skill-id}/feedback_history/{category}/{filename}"
        description: "Full feedback history（~5000 tokens）"
        condition: "debug_needed == true"
      - type: raw_log
        path_template: "{log-path}"
        description: "Raw log or output（~8000 tokens）"
        condition: "deep_analysis_needed == true"
      - type: full_technique
        path_template: "skills/{skill-id}/techniques/{technique}/README.md"
        description: "Full technique documentation（~4000 tokens）"
        condition: "technique_detail_needed == true"
    exit_conditions:
      - raw_source_sufficient: true
      - OR resource_exhausted: true  # token budget 不足，回退到 summary
    output:
      - raw_context: "Raw source-level understanding"
      - fallback: "summary (if resource exhausted)"

# Context Expansion Decision Flow
# Agent 在每次需要載入新 context 時，遵循以下決策流程：
#
# 1. 檢查當前 expansion level
# 2. 檢查 cache policy（是否仍在 TTL 內？）
# 3. 如果 cache hit → 使用 cached context
# 4. 如果 cache miss → 載入當前 level 的 source
# 5. 如果當前 level 不足 → 進入下一 level
# 6. 如果 resource exhausted → 回退到 summary level
#
# 決策流程圖：
#
# ┌──────────────────┐
# │   Task Start     │
# └────────┬─────────┘
#          ▼
# ┌──────────────────┐     ┌──────────────────┐
# │  Summary Level   │────→│  Sufficient?     │
# │  (~500 tokens)   │     │  Yes → Done      │
# └──────────────────┘     │  No → Next       │
#          │               └──────────────────┘
#          ▼
# ┌──────────────────┐     ┌──────────────────┐
# │ Module Summary   │────→│  Sufficient?     │
# │  (~1500 tokens)  │     │  Yes → Done      │
# └──────────────────┘     │  No → Next       │
#          │               └──────────────────┘
#          ▼
# ┌──────────────────┐     ┌──────────────────┐
# │ Detailed Source  │────→│  Sufficient?     │
# │  (~4500 tokens)  │     │  Yes → Done      │
# └──────────────────┘     │  No → Next       │
#          │               └──────────────────┘
#          ▼
# ┌──────────────────┐     ┌──────────────────┐
# │  Raw Source      │────→│  Sufficient?     │
# │  (~10000 tokens) │     │  Yes → Done      │
# └──────────────────┘     │  No → Fallback   │
#          │               └──────────────────┘
#          ▼
# ┌──────────────────┐
# │  Fallback to     │
# │  Summary Level   │
# └──────────────────┘

# Expansion Rules
rules:
  - id: no-skip-levels
    description: >
      Context 必須依序擴展，不可跳過層級。
      例如：不可直接從 summary 跳到 detailed source。
    severity: error
    rationale: >
      跳過層級會失去 module summary 提供的結構理解，
      可能導致載入不必要的完整 source。

  - id: cache-before-load
    description: >
      載入任何 source 前，先檢查 cache policy。
      如果仍在 TTL 內且 task 未變更，使用 cached context。
    severity: warning
    rationale: >
      避免重複載入相同 context，浪費 token。

  - id: justify-raw-source
    description: >
      進入 raw source level 前必須有明確理由（debug、deep analysis）。
      不可因「summary 不足」就直接跳到 raw source。
    severity: error
    rationale: >
      Raw source 是最高成本層級（~10000 tokens），
      必須有明確 justification 才能使用。

  - id: resource-exhaustion-fallback
    description: >
      如果 token budget 不足以載入下一層級，
      回退到 summary level 並標記 context 為 degraded。
    severity: warning
    rationale: >
      確保即使在資源受限的情況下，
      Agent 仍有 summary-level 的理解。
