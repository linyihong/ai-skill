# Skill Relevance Engine
# 計算每個 skill 對當前 task 的相關性分數。
# 使用 skills-index.yaml v2 的 metadata（weight、domains、triggers、conflicts）
# 做 runtime relevance scoring。
# COMPILER SOURCE → relevance_engine
#
# 依賴：
#   - skills-index.yaml (weight, domains, triggers, conflicts)
#   - enforcement/rule-weight.md (conflict resolution priority)

relevance_engine_version: v1
status: candidate
owner_layer: runtime/pipeline
description: >
  Skill Relevance Engine. 在 routing stage 執行，對 skills-index.yaml 中的每個 skill
  計算 relevance score（0.0-1.0）。Score ≥ 0.5 的 skill 才會被載入 summary。
  Score < 0.5 的 skill 被跳過，避免浪費 token 在不相關的 skill 上。

scoring:
  method: weighted_combination
  description: >
    Relevance score 由三個子分數加權組合而成：
    - trigger_match_score（0.5）：基於 user intent 與 skill triggers 的匹配度
    - domain_match_score（0.3）：基於 task domain 與 skill domains 的匹配度
    - weight_score（0.2）：基於 skill 的基礎 weight（來自 skills-index.yaml）
    
    最終分數 = trigger_match × 0.5 + domain_match × 0.3 + weight × 0.2
    
    如果 skill 與已選 skill 有 conflicts，最終分數 × 0.5（penalty）。
  threshold: 0.5  # ≥ 0.5 才載入 summary

  components:
    - id: trigger_match_score
      weight: 0.5
      description: >
        計算 user intent 中的關鍵詞與 skill triggers 的匹配度。
        匹配度 = matched_triggers / total_triggers（但上限 1.0）。
        如果 user intent 包含 trigger 的精確匹配，該 trigger 計為 2 分。
      scoring_logic: >
        matched_count = count(intent_keywords ∩ skill.triggers)
        exact_match_count = count(exact_match(intent_keywords, skill.triggers))
        raw_score = (matched_count + exact_match_count) / len(skill.triggers)
        return min(raw_score, 1.0)

    - id: domain_match_score
      weight: 0.3
      description: >
        計算 task domain 與 skill domains 的匹配度。
        如果 task domain 與 skill domain 完全匹配，得分 1.0。
        如果 task domain 是 skill domain 的子領域，得分 0.7。
        如果 task domain 與 skill domain 無關，得分 0.0。
      scoring_logic: >
        if task_domain in skill.domains:
          return 1.0
        elif is_subdomain(task_domain, skill.domains):
          return 0.7
        else:
          return 0.0

    - id: weight_score
      weight: 0.2
      description: >
        直接使用 skills-index.yaml 中的 weight 值（0.0-1.0）。
        這是 skill 的基礎重要性，不受 task 影響。
      scoring_logic: >
        return skill.weight

  penalties:
    - id: conflict_penalty
      description: >
        如果 skill 與已選 skill 有 conflicts，最終分數 × 0.5。
        這確保衝突的 skill 不會同時被載入。
      condition: "has_conflict_with_selected_skill(skill)"
      multiplier: 0.5

    - id: dependency_missing_penalty
      description: >
        如果 skill 的 dependencies 不存在或無法載入，最終分數 × 0.8。
        這確保依賴不完整的 skill 不會被優先載入。
      condition: "dependency_check_failed(skill)"
      multiplier: 0.8

# Execution Flow
# Agent 在 routing stage 遵循以下流程：
#
# 1. Parse user intent → extract keywords + domain
# 2. For each skill in skills-index.yaml:
#    a. Calculate trigger_match_score
#    b. Calculate domain_match_score
#    c. Get weight_score from skill.weight
#    d. Compute raw_score = trigger_match × 0.5 + domain_match × 0.3 + weight × 0.2
#    e. Apply conflict_penalty if applicable
#    f. Apply dependency_missing_penalty if applicable
#    g. Final score = raw_score × penalties
# 3. Sort skills by final score (descending)
# 4. Select skills with score ≥ 0.5
# 5. Load summary for selected skills only
# 6. Skip skills with score < 0.5

execution:
  steps:
    - id: parse-intent
      action: analyze
      input: user_message
      output:
        keywords: ["extracted keywords"]
        domain: "identified domain"
      estimated_tokens: 200

    - id: score-all-skills
      action: compute
      input:
        - skills-index.yaml
        - parsed_intent
      output:
        scored_skills:
          - skill_id: "skill-id"
            trigger_match_score: 0.0-1.0
            domain_match_score: 0.0-1.0
            weight_score: 0.0-1.0
            raw_score: 0.0-1.0
            penalties: ["conflict", "dependency_missing"]
            final_score: 0.0-1.0
      estimated_tokens: 200

    - id: select-skills
      action: filter
      input: scored_skills
      condition: "final_score >= 0.5"
      output:
        selected_skills:
          - skill_id: "skill-id"
            final_score: 0.0-1.0
            summary_path: "knowledge/summaries/{skill-id}.md"
      estimated_tokens: 100

    - id: skip-irrelevant
      action: skip
      input: scored_skills
      condition: "final_score < 0.5"
      output:
        skipped_skills:
          - skill_id: "skill-id"
            final_score: 0.0-1.0
            reason: "below_threshold"
      estimated_tokens: 50

# Scoring Examples
examples:
  - scenario: "APK traffic analysis task"
    user_intent: "分析這個 APK 的網路流量，看看有沒有可疑的連線"
    parsed:
      keywords: ["apk", "traffic", "network", "analysis"]
      domain: "mobile-security"
    results:
      - skill: apk-analysis
        trigger_match: 0.8  # matches: apk, traffic-analysis, network-capture
        domain_match: 1.0   # exact match: mobile-security
        weight: 0.9
        raw_score: 0.8 × 0.5 + 1.0 × 0.3 + 0.9 × 0.2 = 0.88
        penalties: []
        final_score: 0.88  # ✅ ≥ 0.5 → load summary
      - skill: app-development-guidance
        trigger_match: 0.1  # weak match
        domain_match: 0.0   # no match
        weight: 0.8
        raw_score: 0.1 × 0.5 + 0.0 × 0.3 + 0.8 × 0.2 = 0.21
        penalties: []
        final_score: 0.21  # ❌ < 0.5 → skip

  - scenario: "iOS API design review"
    user_intent: "幫我 review 這個 iOS app 的 API 設計"
    parsed:
      keywords: ["ios", "api", "design", "review"]
      domain: "mobile-development"
    results:
      - skill: app-development-guidance
        trigger_match: 0.6  # matches: api, mobile, ios
        domain_match: 1.0   # exact match: mobile-development
        weight: 0.8
        raw_score: 0.6 × 0.5 + 1.0 × 0.3 + 0.8 × 0.2 = 0.76
        penalties: []
        final_score: 0.76  # ✅ ≥ 0.5 → load summary
      - skill: apk-analysis
        trigger_match: 0.0  # no match
        domain_match: 0.0   # no match
        weight: 0.9
        raw_score: 0.0 × 0.5 + 0.0 × 0.3 + 0.9 × 0.2 = 0.18
        penalties: []
        final_score: 0.18  # ❌ < 0.5 → skip

  - scenario: "Conflicting skills scenario"
    user_intent: "分析這個 APK 的架構，同時給開發建議"
    parsed:
      keywords: ["apk", "architecture", "development", "analysis"]
      domain: "mobile-security"
    results:
      - skill: apk-analysis
        trigger_match: 0.6  # matches: apk, analysis
        domain_match: 1.0   # exact match: mobile-security
        weight: 0.9
        raw_score: 0.6 × 0.5 + 1.0 × 0.3 + 0.9 × 0.2 = 0.78
        penalties: []
        final_score: 0.78  # ✅ ≥ 0.5 → load summary (selected first)
      - skill: app-development-guidance
        trigger_match: 0.4  # matches: architecture, development
        domain_match: 0.0   # no match
        weight: 0.8
        raw_score: 0.4 × 0.5 + 0.0 × 0.3 + 0.8 × 0.2 = 0.36
        penalties:
          - conflict: apk-analysis  # conflicts with already selected skill
            multiplier: 0.5
        final_score: 0.36 × 0.5 = 0.18  # ❌ < 0.5 → skip

# Engine Rules
rules:
  - id: threshold-gate
    description: >
      Final score < 0.5 的 skill 必須被跳過，不可載入其 summary 或 source。
      即使 Agent 認為該 skill 可能相關，也必須遵守 threshold。
    severity: error
    rationale: >
      Threshold 0.5 確保只有「明顯相關」的 skill 被載入，
      避免「可能相關」的 skill 浪費 token。

  - id: conflict-penalty-mandatory
    description: >
      如果 skill 與已選 skill 有 conflicts，conflict_penalty（×0.5）
      必須被應用。不可因 Agent 判斷而跳過 penalty。
    severity: error
    rationale: >
      Conflicts 定義在 skills-index.yaml 中，代表已知的目標衝突。
      忽略 conflict penalty 可能導致 context pollution。

  - id: score-transparency
    description: >
      Agent 在決定載入或跳過 skill 時，必須記錄每個子分數與最終分數。
      這使得 scoring 決策可追溯、可調試。
    severity: warning
    rationale: >
      透明的 scoring 記錄有助於調試 relevance engine 的行為，
      並在必要時調整 weight 或 threshold。

  - id: no-manual-override
    description: >
      Agent 不可手動覆蓋 relevance score 或強制載入 score < 0.5 的 skill。
      如果 Agent 認為某個 skill 應該被載入但 score < 0.5，
      應記錄 feedback 供後續調整 weight 或 triggers。
    severity: error
    rationale: >
      手動覆蓋會破壞 relevance engine 的可靠性，
      導致 token 浪費在不相關的 skill 上。
