---
:guard_chain_version: v1
:status: candidate
:owner_layer: runtime/pipeline
:description: 'Guard execution order per pipeline stage. 定義每個 stage 中 guards 的執行順序、 檢查頻率與中斷行為。Guards 按 severity 與依賴關係排序， 確保高優先級 guards 先執行，低優先級 guards 在資源允許時才執行。

'
:stages:
- :id: bootstrap
  :name: Bootstrap Stage
  :description: Session 啟動階段的 guard chain
  :guards:
  - :id: token_budget
    :order: 1
    :severity: critical
    :description: 檢查 bootstrap token budget（2000 tokens）
    :check:
      :frequency: once
      :at: after_init
    :action_on_violation: halt_bootstrap
    :source: runtime/budget/token-budget.yaml
  - :id: context_growth
    :order: 2
    :severity: warning
    :description: 檢查 bootstrap 是否載入過多 context
    :check:
      :frequency: once
      :at: after_load
      :threshold: 30%
    :action_on_violation: warn + suggest_prune
    :source: runtime/guards/circuit-breaker.yaml
- :id: routing
  :name: Routing Stage
  :description: 任務路由階段的 guard chain
  :guards:
  - :id: token_budget
    :order: 1
    :severity: critical
    :description: 檢查 routing token budget（2500 tokens）
    :check:
      :frequency: once
      :at: after_routing
    :action_on_violation: halt_routing + fallback_to_summary
    :source: runtime/budget/token-budget.yaml
  - :id: context_growth
    :order: 2
    :severity: warning
    :description: 檢查 routing 是否載入過多 skill/rules
    :check:
      :frequency: once
      :at: after_skill_load
      :threshold: 30%
    :action_on_violation: warn + limit_skill_load
    :source: runtime/guards/circuit-breaker.yaml
  - :id: conflict_rules
    :order: 3
    :severity: warning
    :description: 檢查已載入的 rules 是否有衝突
    :check:
      :frequency: once
      :at: after_activation
    :action_on_violation: warn + suggest_resolution
    :source: runtime/guards/circuit-breaker.yaml
- :id: execution
  :name: Execution Stage
  :description: 任務執行階段的 guard chain（最複雜，最多 guards）
  :guards:
  - :id: token_budget
    :order: 1
    :severity: critical
    :description: 檢查 execution token budget（100000 tokens）
    :check:
      :frequency: per_tool_output
      :thresholds:
        :warning_at: 70000
        :hard_stop_at: 90000
    :action_on_violation:
      :warning: warn + suggest_compression
      :hard_stop: halt_execution + force_close_loop
    :source: runtime/budget/token-budget.yaml
  - :id: recursive_depth
    :order: 2
    :severity: critical
    :description: 檢查遞迴深度是否超過限制
    :check:
      :frequency: per_tool_call
      :threshold: 4
    :action_on_violation: halt_execution + force_close_loop
    :source: runtime/guards/circuit-breaker.yaml
  - :id: tool_calls
    :order: 3
    :severity: critical
    :description: 檢查工具呼叫次數是否超過限制
    :check:
      :frequency: per_tool_call
      :thresholds:
        :warn_at: 15
        :hard_stop_at: 20
    :action_on_violation:
      :warning: warn + suggest_decomposition
      :hard_stop: halt_execution + suggest_new_session
    :source: runtime/guards/circuit-breaker.yaml
  - :id: context_growth
    :order: 4
    :severity: high
    :description: 檢查 context 增長是否超過限制
    :check:
      :frequency: per_task
      :thresholds:
        :warn_at: 30%
        :hard_stop_at: 80%
    :action_on_violation:
      :warning: warn + suggest_prune
      :hard_stop: force_prune
    :source: runtime/guards/circuit-breaker.yaml
  - :id: hallucination_risk
    :order: 5
    :severity: high
    :description: 檢查 hallucination risk factors
    :check:
      :frequency: per_task
      :factors:
      - no_canonical_source
      - speculative_reasoning
      - conflicting_information
      - missing_dependency
      :threshold: 0.7
    :action_on_violation: halt + suggest_source_read
    :source: runtime/guards/circuit-breaker.yaml
  - :id: conversation_length
    :order: 6
    :severity: high
    :description: 檢查對話長度是否超過限制
    :check:
      :frequency: per_task
      :threshold: 50
    :action_on_violation: warn + suggest_new_session
    :source: runtime/guards/context-pollution.yaml
  - :id: conflict_rules
    :order: 7
    :severity: medium
    :description: 檢查執行期間是否有規則衝突
    :check:
      :frequency: per_task
    :action_on_violation: warn + suggest_resolution
    :source: runtime/guards/circuit-breaker.yaml
  - :id: repetitive_edits
    :order: 8
    :severity: medium
    :description: 檢查是否對同一檔案反覆修改
    :check:
      :frequency: per_edit
      :threshold: 5
    :action_on_violation: warn + suggest_review
    :source: runtime/guards/context-pollution.yaml
  - :id: module_count
    :order: 9
    :severity: medium
    :description: 檢查載入的模組數量
    :check:
      :frequency: per_task
      :threshold: 20
    :action_on_violation: warn + suggest_prune
    :source: runtime/guards/context-pollution.yaml
  - :id: cross_reference_depth
    :order: 10
    :severity: medium
    :description: 檢查依賴鏈深度
    :check:
      :frequency: per_task
      :threshold: 5
    :action_on_violation: warn + suggest_simplify
    :source: runtime/guards/context-pollution.yaml
  - :id: token_utilization
    :order: 11
    :severity: medium
    :description: 檢查 token 使用率
    :check:
      :frequency: per_task
      :threshold: 85%
    :action_on_violation: warn + suggest_archive
    :source: runtime/guards/context-pollution.yaml
- :id: close-loop
  :name: Close-loop Stage
  :description: Session 閉環階段的 guard chain
  :guards:
  - :id: token_budget
    :order: 1
    :severity: critical
    :description: 檢查 close-loop token budget（1000 tokens）
    :check:
      :frequency: once
      :at: before_write
    :action_on_violation: force_minimal_write
    :source: runtime/budget/token-budget.yaml
:rules:
- :id: ordered-execution
  :description: 'Guards 必須按 order 順序執行。高 order 的 guard 必須在低 order 的 guard 執行完成後才能執行。

'
  :severity: error
  :rationale: 'Token budget 必須在 recursive depth 之前檢查， 因為 recursive depth 檢查需要 token 來執行。

'
- :id: layered-violation
  :description: '如果 critical guard 違規，直接中斷 stage，不繼續執行 lower-order guards。 如果 high/medium guard 違規，記錄警告但繼續執行。

'
  :severity: warning
  :rationale: 'Critical guards（token_budget、recursive_depth、tool_calls） 直接影響系統穩定性，違規時必須立即中斷。

'
- :id: frequency-respect
  :description: 'Guards 必須按定義的 frequency 執行。 per_tool_call 的 guard 不可只在 per_task 時檢查。

'
  :severity: error
  :rationale: '降低檢查頻率可能導致 guard 在違規發生後才被觸發。

'
- :id: cross-stage-escalation
  :description: '如果某個 guard 在 routing stage 已違規（如 conflict_rules）， 在 execution stage 也必須重新檢查，不可假設 routing stage 已處理。

'
  :severity: warning
  :rationale: 'Execution stage 可能載入新的 rules，導致新的衝突。

'
