# Token Budget System
# 定義 session token 預算、警告門檻與 hard stop。
# Agent 在 session 啟動時載入此 policy，並在 context 成長時持續檢查。

token_budget_version: v1
status: candidate
owner_layer: runtime/budget

default_budget:
  max_tokens: 120000        # 預設 session token 上限
  warning_threshold: 0.7     # 84,000 tokens → 觸發警告
  hard_stop_threshold: 0.9   # 108,000 tokens → 強制停止

# Per-model budget（不同模型有不同 context window）
per_model:
  - model: claude-sonnet-4
    max_tokens: 200000
    warning_threshold: 0.7
    hard_stop_threshold: 0.9

  - model: claude-opus-4
    max_tokens: 200000
    warning_threshold: 0.7
    hard_stop_threshold: 0.9

  - model: gpt-4o
    max_tokens: 128000
    warning_threshold: 0.7
    hard_stop_threshold: 0.9

  - model: gemini-2.5-pro
    max_tokens: 1000000
    warning_threshold: 0.8
    hard_stop_threshold: 0.95

# Per-layer budget allocation
layer_budget:
  bootstrap:
    max_tokens: 2000         # CORE_BOOTSTRAP + README
    priority: P0
  skill_index:
    max_tokens: 500          # skills-index.yaml
    priority: P0
  activation_rules:
    max_tokens: 1000         # activation-rules.yaml
    priority: P1
  summaries:
    max_tokens: 3000         # knowledge summaries
    priority: P1
  full_source:
    max_tokens: 30000        # full skill/source documents
    priority: P2
  tool_output:
    max_tokens: 50000        # tool execution output
    priority: P2
  conversation:
    max_tokens: 30000        # conversation history
    priority: P3

# Warning actions
on_warning:
  - action: log
    message: "⚠️ Token usage at {percentage}% ({used_tokens}/{max_tokens})"
  - action: suggest_prune
    message: "建議 prune 過期 context：TTL-expired tasks、deferred rules、old feedback lessons"
  - action: suggest_new_session
    message: "建議建立新 session 以重置 context"

# Hard stop actions
on_hard_stop:
  - action: halt_agent
    message: "⛔ Token budget exceeded ({used_tokens}/{max_tokens}). Agent halted."
  - action: force_prune
    strategy: aggressive
    preserve:
      - core-bootstrap
      - agent-goals
      - conversation-goal-ledger
  - action: suggest_new_session
    message: "請建立新 session 繼續工作。當前 context 已存檔至 memory/working/。"
