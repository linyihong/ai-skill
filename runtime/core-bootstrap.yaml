schema_version: "1.0"
id: runtime.core-bootstrap
status: active
owner_layer: runtime
source_markdown: CORE_BOOTSTRAP.md

runtime_projection:
  enabled: true
  target_key: runtime.core_bootstrap.contract
  surface: generated_surfaces

purpose: >
  Canonical executable contract for Ai-skill session bootstrap. Migrates
  the prose-only CORE_BOOTSTRAP.md into a machine-readable schema that
  declares required_reads, per_session_obligations, per_turn_obligations,
  per_commit_obligations, and phase_state_init.

  CORE_BOOTSTRAP.md remains as human-readable companion (rationale +
  examples) but this YAML is canonical for obligation enumeration.
  validators and tool entries should query
  generated_surfaces[runtime.core_bootstrap.contract] rather than parse
  prose.

  Scope (Phase 1 of bootstrap-contract-yaml-migration): 3 required_reads
  + 3 obligations (Bootstrap Receipt, Cognitive Mode block per-turn,
  Cognitive Mode block per-commit). Lazy-load rules (9) and detailed
  format examples remain in companion .md for now.

required_reads:
  - id: rule-weight
    path: enforcement/rule-weight.md
    role: P0/P1/P2/P3 weight system (rule conflict resolution priority)
    estimated_tokens: 300
  - id: dependency-reading
    path: enforcement/dependency-reading.md
    role: dependency rule + Ai-skill writeback transaction
    estimated_tokens: 400
  - id: conversation-goal-ledger
    path: enforcement/conversation-goal-ledger.md
    role: .agent-goals/ usage and conversation goal closure
    estimated_tokens: 100

contextual_activations:
  - id: activation.document_sizing
    source: governance/document-sizing.md
    load_when:
      - creating_new_markdown
      - substantially_editing_markdown
      - markdown_file_over_150_lines
      - markdown_mixes_multiple_topics
      - rule_or_workflow_expands_into_steps_exceptions_templates_or_examples
    purpose: >
      Load the document-sizing rule only when Markdown growth or mixed-topic
      structure creates a splitting decision. Bootstrap entries should point
      here rather than duplicating document-sizing policy in tool-specific rules.
    validation_signal: >
      If activated, the agent checks whether the file should remain single-purpose
      or split into a folder with a README index and focused child files.

  - id: activation.enforcement_registry_editing
    source: enforcement/enforcement-registry.md
    load_when:
      - editing_enforcement_rule_yaml_or_md
      - editing_runtime_rule_yaml_referenced_by_registry_source_files
      - editing_governance_rule_yaml_referenced_by_registry_source_files
      - editing_enforcement_registry_yaml_itself
      - adding_new_rule_class_entry_to_registry
      - changing_rule_class_coverage_value
    purpose: >
      Load enforcement-registry.md before editing any rule yaml/md or the
      registry itself. The companion documents the Status Transition Matrix
      (Phase 4.5) + 6-bucket coverage enum + verification ladder + R1-R5
      self-governance lint behaviour. Skipping this load on a registry edit
      is the failure mode the registry was built to prevent (silent
      demotion / orphan rule / unverified promotion).
    validation_signal: >
      If activated, the agent verifies (a) any new rule yaml has a
      matching rule_class entry in enforcement-registry.yaml; (b) any
      coverage transition follows the Status Transition Matrix (e.g.
      mechanical -> behavioral_only requires adr_reference); (c)
      `ai-skill enforcement coverage` shows the expected bucket movement.

per_session_obligations:
  - id: obligation.bootstrap.receipt
    fires: first_turn_before_any_non_read_tool_or_same_session_repair
    format_template: |
      Bootstrap: rules=✓ phase=<phase-id> obligations=<n> gates=<n>
      Active per-turn obligations: <comma-separated obligation ids from per_turn_obligations>
    format_template_legacy: "Bootstrap: rules=✓ phase=<phase-id> obligations=<n> gates=<n>"
    format_backward_compat: |
      Legacy single-line Receipt (without "Active per-turn obligations:" line)
      remains accepted. Enhanced two-line form is the canonical preferred
      format from 2026-05-26 onward (Phase 5 of bootstrap-contract-yaml-migration).
    enforcement_layer: behavioral_forcing + repairable_stop_hook + read_log_gate
    forcing_function: |
      Numeric values require runtime.db query (cannot be memorized).
      Bootstrap Receipt values should come from `ai-skill runtime receipt`
      rather than ad-hoc SQLite. Active per-turn obligations list requires querying
      generated_surfaces[runtime.core_bootstrap.contract].per_turn_obligations
      via `ai-skill runtime obligations` (or equivalent SQLite JSON1 query).
    read_log_requirement: |
      The PreToolUse hook (gate.bootstrap.receipt_present) performs a
      mechanical check against the JSONL transcript: a Receipt is only
      accepted as authentic when the assistant has invoked the Read tool
      against BOTH of the following canonical file suffixes earlier in
      the same transcript:
        - CORE_BOOTSTRAP.md
        - runtime/core-bootstrap.yaml
      Implementation: scripts/ai-skill-cli/internal/app/hooks.go ::
      transcriptHasRequiredBootstrapReads + bootstrapRequiredReadSuffixes.
    no_copy_from_hook_reminder: |
      The SessionStart hook intentionally emits a Receipt TEMPLATE with
      `<placeholder>` markers rather than the resolved numbers. Prior
      practice was to inject a fully-rendered Receipt (e.g. "obligations=23
      gates=25") into the agent's first prompt; agents copied it verbatim
      without ever calling Read on the canonical files, so the gate fired
      on a fabricated Receipt. As of the read_log_requirement landing
      (2026-05-30), the SessionStart hook no longer prints concrete
      numbers and the PreToolUse gate rejects any Receipt emitted without
      the prerequisite Read events. The agent MUST query
      `ai-skill runtime receipt` or count obligations/gates after Reading
      the canonical files; values in this YAML's example_enhanced are
      illustrative only.
    numeric_field_ontology: |
      `obligations=<n>` and `gates=<n>` in the Receipt reflect the totals
      from runtime/runtime.db (`SELECT COUNT(*) FROM obligations` and
      `SELECT COUNT(*) FROM gates`), populated by the phase_machine
      projections. These are DIFFERENT counts than the obligations defined
      inline in this YAML file (which has per_session=1, per_turn=2,
      per_commit=19 = 22 total). The discrepancy is intentional: the YAML
      defines the bootstrap contract surface; runtime.db tracks the
      broader phase_machine obligation set (init_ledger, checkpoint,
      execution, finalize, push, readback, recovery, validation families).
      The Receipt's numbers come from runtime.db because the agent's
      live obligation ledger lives there. Use `ai-skill runtime receipt`
      to get authoritative values; never count by hand from this YAML.
    severity: high
    blocking_gate_id: gate.bootstrap.receipt_present
    obligation_ledger_id: obligation.bootstrap.receipt_acknowledged
    resume_exempt: false
    open_question_2_resolved: |
      List obligation IDs (names), not counts. Rationale: agent first
      turn must see the actual obligation names to internalize them; a
      count is opaque ("3 obligations" doesn't tell agent what they are).
      Token cost ≈ 50-80 tokens per Receipt, acceptable for the
      visibility gain.
    example_enhanced: |
      # ILLUSTRATIVE ONLY — do not copy these numbers.
      # The runtime.db totals drift as obligations/gates are added; resolve at
      # session start via `ai-skill runtime receipt`. As of 2026-05-30 the live
      # values were obligations=23 gates=25 with two active per-turn obligations.
      Bootstrap: rules=✓ phase=phase.bootstrap obligations=<from runtime.db> gates=<from runtime.db>
      Active per-turn obligations: obligation.cognitive.mode_report, obligation.finality.close_loop_check
    note: |
      Summary "Resume directly" does NOT exempt this obligation; resume
      sessions should emit Receipt on the first user-facing message.
      If the first response misses it but the agent has completed the required
      reads, the same-session corrected final response may repair the miss by
      outputting the canonical Receipt or explicitly naming CORE_BOOTSTRAP.md,
      runtime/core-bootstrap.yaml, and the active per-turn obligations. Stop-hook
      validation should accept that repair instead of repeatedly blocking on
      first-line placement alone.

per_turn_obligations:
  - id: obligation.cognitive.mode_report
    fires: final_user_facing_response_or_session_stop
    format_options:
      compact: "Cognitive: <e>·<c>·<g>·<m> / V:<v> / Cost:<cost> / Sig:<signal>"
      full: "### Cognitive Mode 報告 + 4-6 row markdown table"
    trigger_full_when:
      - any_dim_non_default
      - high_risk_mode (DEEP, FORENSIC, RECOVERY, STRICT, LOCKDOWN)
    enforcement_layer: commit_msg_hook + behavioral_per_turn
    severity: high
    note: |
      Commit enforcement is mechanical via validateCognitiveContractFormat.
      Chat/session enforcement applies at final close-out, not every progress
      update. Tool adapters that can observe a session stop/final-response
      event MUST install a close-out check that blocks or loops back when the
      final user-facing response lacks either compact `Cognitive:` form or full
      `### Cognitive Mode 報告`.
  - id: obligation.finality.close_loop_check
    fires: task_completion_or_session_end
    action: |
      Verify `git status` is clean and `git log origin/<branch>..HEAD`
      is empty.
    severity: critical
    blocking_gate_id: gate.linked_updates.writeback_closed
    note: |
      This obligation prevents "dirty-repo final responses". Agent must
      ensure all changes are committed and pushed (or record authorized
      pending state) before claiming task completion.
  - id: obligation.workflow.activation_evidence
    fires: non_read_tool_after_detector_locks_single_active_route
    action: |
      When the Workflow Activation Engine detector locks a SINGLE
      active_route for the current task (RuntimeContext.ActiveRoute != ""),
      the agent MUST Read that route's primary_source before other tool
      calls, so execution follows the activated workflow. The PreToolUse
      validator (validateWorkflowPrimarySourceRead / workflowPrimarySourceGate
      in scripts/ai-skill-cli/internal/app/hooks.go) scans the transcript for
      that Read event, mirroring gate.bootstrap.receipt_present.
    severity: high
    blocking_gate_id: gate.workflow.primary_source_read
    fail_open: true
    note: |
      Phase 5 of plans/active/2026-05-31-1900-workflow-activation-engine.md.
      SAFETY (must hold): this gate fires ONLY after the detector locks a
      single active_route. It NEVER blocks on a detector miss (no match) or a
      multi-route conflict (>1 activated → workflow/workflow-routing.md Stage 2
      adjudication, ActiveRoute stays empty). It also fails open when the
      routing registry is unresolvable (e.g. hook running outside the Ai-skill
      repo). It is NOT Discovery and does NOT run per-turn unconditionally —
      no lock, no block. Read tool calls are always allowed so the agent can
      comply. RuntimeContext is rebuilt from the transcript each call
      (deterministic; no SQLite — see Phase 4.0).

per_commit_obligations:
  # Enumerated 2026-05-26 (Phase 6 of bootstrap-contract-yaml-migration):
  # this list is the machine-iterable source-of-truth for commit-msg hook
  # validators. The dispatcher refactor (read this list → call validator
  # by name via Go registry map) is deferred to Phase 7 / next session;
  # currently hooks.go hardcodes the same 11 calls in runCommitMsgHook.
  - id: obligation.commit.cognitive_mode_block
    fires: every_commit
    validator: validateCognitiveContractFormat
    severity: block
    opt_out_marker: "[skip-cognitive-mode]"
    contract_source: runtime/core-bootstrap.yaml + runtime/cognitive-modes.yaml
  - id: obligation.commit.execution_mode_floors
    fires: every_commit_with_cognitive_block
    validator: validateExecutionModeFloors
    severity: block
    contract_source: runtime/cognitive-modes-phase-integration.yaml
  - id: obligation.commit.governance_mode_consistency
    fires: every_commit_with_cognitive_block
    validator: validateGovernanceModeConsistency
    severity: block
    contract_source: runtime/cognitive-modes-governance-integration.yaml
  - id: obligation.commit.memory_mode_subdir
    fires: every_commit_with_cognitive_block
    validator: validateMemoryModeSubdir
    severity: block
    contract_source: runtime/cognitive-modes-memory-integration.yaml
  - id: obligation.commit.cognitive_cost
    fires: every_commit_with_cognitive_block
    validator: validateCognitiveCost
    severity: block
    contract_source: runtime/cognitive-modes-cost-class.yaml
  - id: obligation.commit.activation_signals
    fires: every_commit_with_cognitive_block
    validator: validateActivationSignals
    severity: block
    contract_source: runtime/cognitive-modes-discovery.yaml
  - id: obligation.commit.capability_snippet
    fires: every_commit_with_cognitive_block_high_risk
    validator: validateCapabilitySnippet
    severity: block
    contract_source: runtime/cognitive-modes.yaml + runtime/cognitive-modes-*-integration.yaml
  - id: obligation.commit.plan_status_sync
    fires: every_commit
    validator: validatePlanStatusSync
    severity: block
    opt_out_marker: "[skip-plan-status-sync]"
    contract_source: runtime/plan-status-sync-enforcement.yaml
  - id: obligation.commit.token_budget
    fires: every_commit_with_cognitive_block_and_estimate
    validator: validateTokenBudget
    severity: block
    opt_out_marker: "[skip-token-budget]"
    contract_source: runtime/cognitive-modes-token-budget.yaml
  - id: obligation.commit.adaptive_triggers
    fires: every_commit_with_cognitive_block
    validator: validateAdaptiveTriggers
    severity: block
    opt_out_marker: "[skip-adaptive]"
    contract_source: runtime/cognitive-modes-adaptive.yaml
  - id: obligation.commit.bootstrap_entry_thinness
    fires: every_commit_staging_entry_files
    validator: validateBootstrapEntryThinness
    severity: block
    opt_out_marker: "[skip-bootstrap-thinness]"
    contract_source: runtime/bootstrap-entry-points.yaml
  - id: obligation.commit.cli_doc_sync
    fires: every_commit_staging_ai_skill_cli_go
    validator: validateCLIDocSync
    severity: block
    opt_out_marker: "[skip-cli-doc-sync]"
    contract_source: runtime/cli-modification-policy.yaml
  - id: obligation.commit.runtime_yaml_projects
    fires: every_commit_staging_runtime_yaml
    validator: validateRuntimeYamlProjects
    severity: block
    opt_out_marker: "[skip-runtime-yaml-projection]"
    contract_source: runtime/core-bootstrap.yaml + governance/lifecycle/system-upgrade-governance.yaml
  - id: obligation.commit.markdown_yaml_sync
    fires: every_commit_staging_md_with_sibling_yaml
    validator: validateMarkdownYamlSync
    severity: block
    opt_out_marker: "[skip-markdown-yaml-sync]"
    contract_source: runtime/core-bootstrap.yaml (enumeration); enforcement/failure-patterns/markdown-yaml-sync-drift.md (rationale)
  - id: obligation.commit.glossary_retro_own
    fires: every_commit_staging_framework_cognitive_vocabulary_surface
    validator: validateGlossaryRetroOwn
    severity: block
    opt_out_marker: "[skip-glossary-retro-own]"
    contract_source: runtime/cli-modification-policy.yaml + plans/active/2026-05-25-1000-context-language-glossary-system.md (Phase 6)
  - id: obligation.commit.plan_checkbox_sync
    fires: every_commit_referencing_plans_active_with_code_or_scenario_changes
    validator: validatePlanCheckboxSync
    severity: block
    opt_out_marker: "[skip-plan-checkbox-sync]"
    contract_source: plans/active/2026-05-28-1200-gen3-runtime-trigger-audit-and-completion.md (Phase 5)
  - id: obligation.commit.runtime_trigger_wiring
    fires: every_commit_staging_routing_registry_or_runtime_yaml
    validator: validateRuntimeTriggerWiring
    severity: block
    opt_out_marker: "[skip-runtime-trigger-wiring]"
    contract_source: governance/lifecycle/system-upgrade-governance.yaml §define_runtime_trigger_flow + plans/active/2026-05-28-1200-gen3-runtime-trigger-audit-and-completion.md (Phase 5)
  - id: obligation.commit.evidence_hierarchy
    fires: every_commit_asserting_completion_with_code_work
    validator: validateEvidenceHierarchy
    severity: block
    opt_out_marker: "[skip-evidence-hierarchy]"
    contract_source: enforcement/evidence-hierarchy.yaml (executable contract) + plans/active/2026-05-28-1200-gen3-runtime-trigger-audit-and-completion.md (Phase 4)
  - id: obligation.commit.plan_archival_audit
    fires: every_commit_moving_plan_from_active_to_archived
    validator: validatePlanArchivalAudit
    severity: block
    opt_out_marker: "[skip-plan-archival-audit]"
    contract_source: plans/active/2026-05-28-1830-plan-archival-audit-validator.md (Phase 2)
  - id: obligation.commit.enforcement_registry_transition
    fires: every_commit_staging_enforcement_registry_yaml_with_coverage_change
    validator: validateEnforcementRegistryTransition
    severity: block
    opt_out_marker: "[skip-registry-transition]"
    contract_source: plans/archived/2026-05-31-2100-mechanical-enforcement-registry.md (Phase 4.5 — Self-Governance Lint Rules R1/R2/R3) + enforcement/enforcement-registry.yaml §self_governance
  - id: obligation.commit.enforcement_rule_registry_sync
    fires: every_commit_staging_enforcement_rule_yaml_without_registry_update
    validator: validateEnforcementRuleRegistrySync
    severity: block
    opt_out_marker: "[skip-enforcement-registry-sync]"
    contract_source: plans/archived/2026-05-31-2100-mechanical-enforcement-registry.md (Phase 5 — Bootstrap Integration item 3); dual-gate companion to Phase 3 compile-time orphan_rule lint
  - id: obligation.commit.plan_tree_frontmatter
    fires: every_commit_staging_sub_or_spike_plan_md
    validator: validatePlanTreeFrontmatter
    severity: block
    opt_out_marker: "[skip-plan-tree-frontmatter]"
    contract_source: plans/active/2026-06-02-1200-plan-tree-hierarchy-governance/02-validator-implementation.md (Phase 2)
  - id: obligation.commit.plan_tree_archive_order
    fires: every_commit_staging_main_plan_md_under_plans_archived
    validator: validatePlanTreeArchiveOrder
    severity: block
    opt_out_marker: "[skip-plan-tree-archive-order]"
    contract_source: plans/active/2026-06-02-1200-plan-tree-hierarchy-governance/02-validator-implementation.md (Phase 2)
  - id: obligation.commit.plan_tree_parent_reference
    fires: every_commit_staging_sub_or_spike_plan_md
    validator: validatePlanTreeParentReference
    severity: block
    opt_out_marker: "[skip-plan-tree-parent-reference]"
    contract_source: plans/active/2026-06-02-1200-plan-tree-hierarchy-governance/02-validator-implementation.md (Phase 2)
  - id: obligation.commit.plan_tree_unique_id
    fires: every_commit_staging_plan_md_with_frontmatter_id
    validator: validatePlanTreeUniqueID
    severity: block
    opt_out_marker: "[skip-plan-tree-unique-id]"
    contract_source: plans/active/2026-06-02-1200-plan-tree-hierarchy-governance/02-validator-implementation.md (Phase 2)
  - id: obligation.commit.plan_tree_folder_convention
    fires: every_commit_staging_plan_md_in_plan_folder
    validator: validatePlanTreeFolderConvention
    severity: warning
    opt_out_marker: "[skip-plan-tree-folder-convention]"
    contract_source: plans/active/2026-06-02-1200-plan-tree-hierarchy-governance/02-validator-implementation.md (Phase 2)

per_commit_dispatcher_status:
  machine_iterable: true
  go_dispatch_refactor: deferred
  reason: |
    hooks.go runCommitMsgHook currently hardcodes 11 validator calls in
    a fixed order. Future dispatcher refactor will read per_commit_obligations
    list, look up validator by name via a Go registry map, dispatch in
    declared order. Refactor risk is non-trivial (must preserve ordering,
    opt-out semantics, error aggregation) and is deferred to Phase 7 of
    bootstrap-contract-yaml-migration or a follow-on plan.

phase_state_init:
  source: runtime/runtime.db
  required_tables:
    - phase_machine
    - phases
    - obligations
    - gates
    - language_policy
    - output_rules
    - governance_gates
    - generated_surfaces
  load_order:
    - phase_machine (current phase)
    - obligations (active per current phase)
    - gates (blocking per current phase)
    - language_policy + output_rules + governance_gates (output framing)

receipt_format_enhancement:
  status: landed_2026_05_26
  phase: bootstrap-contract-yaml-migration Phase 5
  see: per_session_obligations[obligation.bootstrap.receipt].format_template
  open_question_2_resolution: |
    List obligation IDs (names) rather than counts. Agent first-turn
    visibility outweighs the ~50-80 token cost.
  backward_compat: |
    Legacy single-line Receipt accepted; enhanced two-line form is
    canonical preferred from 2026-05-26.

companion_markdown: CORE_BOOTSTRAP.md
companion_role: |
  Human-readable rationale, full Bootstrap Receipt examples, Cognitive
  Mode format reference, lazy-load rules narrative. YAML is canonical
  for obligation enumeration; markdown is canonical for rationale.

failure_pattern_linkage:
  related:
    - enforcement/failure-patterns/bootstrap-bypass-on-resume.md
    - enforcement/failure-patterns/bootstrap-entry-bloat.md
    - enforcement/failure-patterns/cognitive-mode-resolution-bypass.md

acceptance:
  - scenario bootstrap-yaml-contract-exists-v1 PASS
  - scenario bootstrap-yaml-projected-v1 PASS
  - scenario bootstrap-obligations-enumerable-v1 PASS

source: >
  2026-05-26 session. Plan plans/archived/2026-05-25-2200-bootstrap-contract-yaml-migration.md Phase 2.
