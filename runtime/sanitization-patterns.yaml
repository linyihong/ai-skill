schema_version: 1
status: active
owner_layer: runtime
source_plan: plans/active/2026-06-06-1800-sanitization-mechanical-enforcement.md

runtime_projection:
  enabled: true
  target_key: runtime.sanitization_patterns.config

summary: >
  Conservative generic sanitization patterns used by the staged-content scanner.
  These patterns are deterministic blocking rules for shared-layer content and
  deliberately exclude the Phase 2.5 incident-score heuristic.

placeholder_allowlist:
  - <USER>
  - <PROJECT_ROOT>
  - <AI_SKILL_REPO>
  - <WORKSPACE>

pattern_families:
  - category: email
    block_or_warn: block
    patterns:
      - id: email_address
        regex: '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
        suggestion: Replace with <USER> or a role placeholder.

  - category: phone
    block_or_warn: block
    patterns:
      - id: international_phone
        regex: '\+[0-9][0-9 .()-]{7,}[0-9]'
        suggestion: Replace with <USER> or a synthetic phone placeholder.
      - id: regional_phone
        regex: '\b0[0-9]{1,3}[- )]?[0-9]{3,4}[- ]?[0-9]{3,4}\b'
        suggestion: Replace with <USER> or a synthetic phone placeholder.

  - category: os_absolute_path
    block_or_warn: block
    patterns:
      - id: macos_user_path
        regex: '/Users/[^/\s]+'
        suggestion: Replace with <PROJECT_ROOT>, <WORKSPACE>, or <AI_SKILL_REPO>.
      - id: linux_user_path
        regex: '/home/[^/\s]+'
        suggestion: Replace with <PROJECT_ROOT> or <WORKSPACE>.
      - id: windows_user_path
        regex: 'C:\\Users\\[^\\\s]+'
        suggestion: Replace with <PROJECT_ROOT> or <WORKSPACE>.
      - id: unc_path
        regex: '\\\\[^\\\s]+\\[^\\\s]+'
        suggestion: Replace with <WORKSPACE> or a private-host placeholder.

  - category: credential_pattern
    block_or_warn: block
    patterns:
      - id: openai_style_secret
        regex: 'sk-[A-Za-z0-9_-]{32,}'
        suggestion: Remove the secret and reference credential storage instead.
      - id: github_pat
        regex: 'ghp_[A-Za-z0-9]{20,}'
        suggestion: Remove the token and reference credential storage instead.
      - id: slack_token
        regex: 'xox[bpoa]-[0-9A-Za-z-]{20,}'
        suggestion: Remove the token and reference credential storage instead.
