# Runtime Activation Rules
# 定義哪些 enforcement rules 在什麼條件下 activate（lazy-load）。
# Agent 不預設讀 lazy-load rules，只在符合 when 條件時才 activate。
#
# 本檔案由 activation-engine.rb 讀取，作為程式化 activation 判斷的來源。
# 每個 rule 的 rule_id 對應 metadata/rules/<rule-name>.yaml。

activation_rules_version: v2
status: validated
owner_layer: runtime/router
description: >
  Runtime activation rules for lazy-load enforcement rules.
  Core Bootstrap rules (rule-weight, dependency-reading, conversation-goal-ledger) 永遠 preload。
  其餘 rules 依本檔定義的條件 activate。

core_bootstrap:
  - rule-weight
  - dependency-reading
  - conversation-goal-ledger

rules:
  - rule_id: enforcement.linked-updates
    description: 連動更新 — 改一處時哪些文件必須同步
    activation:
      when:
        - type: file_change
          pattern: "**/*.md"
          count: ">=2"
        - type: task_intent
          matches:
            - architecture-update
            - migration
            - refactor
            - rename
            - restructure
        - type: user_signal
          matches:
            - 連動
            - 同步更新
            - linked
            - 影響其他文件
    load:
      strategy: lazy
      priority: P1
      estimated_tokens: 800
      source: enforcement/linked-updates.md

  - rule_id: enforcement.failure-learning-system
    description: 失效學習系統 — 將重複 agent 錯誤轉成 durable prevention
    activation:
      when:
        - type: user_signal
          matches:
            - 失誤
            - 漏讀
            - 忘記
            - 錯誤
            - failure
            - miss
            - 漏做
            - 閉環不完整
        - type: validation_gap
          matches:
            - close-loop
            - commit
            - push
            - sync
            - dirty
            - ahead
            - behind
        - type: task_intent
          matches:
            - debug
            - troubleshoot
            - fix-error
    load:
      strategy: lazy
      priority: P1
      estimated_tokens: 1200
      source: enforcement/failure-learning-system.md

  - rule_id: enforcement.decision-efficiency
    description: 決策效率 — 以最高收益路線做決策
    activation:
      when:
        - type: task_complexity
          routes: ">=3"
        - type: user_signal
          matches:
            - 選擇
            - 路線
            - priority
            - 先做哪個
            - 哪條路
            - 比較
        - type: task_intent
          matches:
            - route-selection
            - cost-benefit
            - trade-off
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 600
      source: enforcement/decision-efficiency.md

  - rule_id: enforcement.tool-neutral-documentation
    description: 工具中立文件 — 可重用文件保持工具中立
    activation:
      when:
        - type: task_intent
          matches:
            - write-documentation
            - create-template
            - update-readme
            - create-shared-rule
        - type: file_change
          pattern: "enforcement/**"
        - type: file_change
          pattern: "skills/**/SKILL.md"
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 500
      source: enforcement/tool-neutral-documentation.md

  - rule_id: enforcement.document-todo-list
    description: 文件 TODO 表 — 文件前段 TODO 與 goal/章節連結
    activation:
      when:
        - type: task_intent
          matches:
            - update-document
            - complete-document
            - review-document
        - type: file_has_todo
          pattern: "**/*.md"
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 300
      source: enforcement/document-todo-list.md

  - rule_id: enforcement.goal-action-validation
    description: 目標、執行、驗證 — 重要工作單元的驗證流程
    activation:
      when:
        - type: task_intent
          matches:
            - critical-change
            - destructive-action
            - production-deploy
            - security-review
        - type: user_signal
          matches:
            - 驗證
            - validate
            - 確認
            - confirm
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 500
      source: enforcement/goal-action-validation.md

  - rule_id: enforcement.neutral-language
    description: 中性低爭議用語 — 文件語言一致性
    activation:
      when:
        - type: task_intent
          matches:
            - write-documentation
            - review-documentation
            - translate
        - type: file_change
          pattern: "enforcement/**"
        - type: file_change
          pattern: "skills/**/README.md"
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 300
      source: enforcement/neutral-language.md

  - rule_id: enforcement.sanitization
    description: 去敏與占位符 — 什麼不可寫進可重用文件
    activation:
      when:
        - type: task_intent
          matches:
            - write-feedback
            - create-lesson
            - write-feedback-history
        - type: file_change
          pattern: "**/feedback_history/**"
    load:
      strategy: lazy
      priority: P1
      estimated_tokens: 400
      source: enforcement/sanitization.md

  - rule_id: enforcement.authorization-scope
    description: 授權與範圍 — 僅在授權範圍內分析
    activation:
      when:
        - type: task_intent
          matches:
            - security-analysis
            - penetration-test
            - vulnerability-scan
            - external-system-access
        - type: user_signal
          matches:
            - 授權
            - authorization
            - scope
            - 邊界
    load:
      strategy: lazy
      priority: P0
      estimated_tokens: 300
      source: enforcement/authorization-scope.md

  - rule_id: enforcement.cross-skill-references
    description: Cross-skill references — 一個 skill 引用另一個 skill 的規範
    activation:
      when:
        - type: task_intent
          matches:
            - cross-skill
            - multi-skill
            - skill-integration
        - type: file_change
          pattern: "skills/**"
          count: ">=2"
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 400
      source: enforcement/cross-skill-references.md

  - rule_id: enforcement.feedback-lessons
    description: Feedback 與技巧條目 — 檔名規則、模板、agent 行為
    activation:
      when:
        - type: task_intent
          matches:
            - write-feedback
            - create-lesson
            - promote-lesson
            - review-feedback
        - type: file_change
          pattern: "**/feedback_history/**"
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 600
      source: enforcement/feedback-lessons.md

  - rule_id: enforcement.content-layering
    description: 內容分層 — 共用規則／技巧／業務專案各自放哪
    activation:
      when:
        - type: task_intent
          matches:
            - migration
            - restructure
            - content-organization
        - type: file_change
          pattern: "**/README.md"
          count: ">=3"
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 300
      source: enforcement/content-layering.md

  - rule_id: enforcement.reusable-guidance-boundary
    description: 可重用規則與專案證據邊界
    activation:
      when:
        - type: task_intent
          matches:
            - write-feedback
            - create-lesson
            - promote-to-shared-rule
        - type: user_signal
          matches:
            - 泛化
            - 可重用
            - reusable
            - 抽象化
    load:
      strategy: lazy
      priority: P2
      estimated_tokens: 400
      source: enforcement/reusable-guidance-boundary.md
