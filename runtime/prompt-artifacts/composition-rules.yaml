# Prompt Artifact Composition Rules
# 定義如何從各層動態組合 prompt artifact 的規則。
# Agent 在組裝 artifact 時，依 composition_rule 找到對應規則，
# 根據 task context 決定哪些內容需要嵌入。
#
# 規則類型：
#   - workflow-steps: 從 workflow/ 選擇執行步驟
#   - intelligence-atoms: 從 intelligence/ 選擇 atoms
#   - analysis-methods: 從 analysis/ 選擇方法
#   - knowledge-summary: 從 knowledge/summaries/ 選擇摘要

prompt_composition_rules_version: v1
status: candidate
owner_layer: runtime/prompt-artifacts
description: >
  Composition rules for prompt artifact generation. 定義如何從各層動態選擇
  內容嵌入 prompt artifact。每個規則包含 selection criteria、priority order、
  token budget 與 conflict resolution。

rules:
  # ──────────────────────────────────────────────
  # Workflow Steps Composition
  # ──────────────────────────────────────────────
  - rule_id: workflow-steps
    name: Workflow Steps Selector
    description: >
      根據 task type 從 workflow/ 選擇對應的執行步驟。
      每個 task type 對應一個 workflow 子目錄。
    selection:
      method: task_type_mapping
      mapping:
        apk-analysis: workflow/apk-analysis/
        app-development-guidance: workflow/software-delivery/
        repo-analysis: workflow/repo-analysis/
        travel-planning: workflow/travel-planning/
        repo-governance: governance/
        feedback-promotion: feedback/promotion/
      fallback: workflow/README.md
    loading:
      strategy: read_summary_first
      summary_source: "{workflow_dir}/README.md"
      full_source: "{workflow_dir}/{execution-flow}.md"
      expand_condition: "summary_insufficient == true"
    estimated_tokens:
      summary: 400
      full: 1200
    priority: P1

  # ──────────────────────────────────────────────
  # Intelligence Atoms Composition
  # ──────────────────────────────────────────────
  - rule_id: intelligence-atoms
    name: Intelligence Atoms Selector
    description: >
      根據 task type 與 task context 從 intelligence/ 選擇相關 atoms。
      使用 keyword matching 與 domain mapping 決定哪些 atoms 需要嵌入。
    selection:
      method: keyword_and_domain_matching
      domain_mapping:
        apk-analysis:
          primary_domain: engineering/apk-analysis
          secondary_domains:
            - engineering/heuristics
            - engineering/failure
          keywords:
            - traffic-analysis
            - reverse-engineering
            - flutter
            - mitm
        app-development-guidance:
          primary_domain: engineering
          secondary_domains:
            - engineering/architecture
            - engineering/tradeoffs
            - engineering/anti-patterns
            - engineering/domain
          keywords:
            - architecture
            - api-design
            - security
            - mobile
        repo-analysis:
          primary_domain: engineering/architecture
          secondary_domains:
            - engineering/domain
            - engineering/anti-patterns
          keywords:
            - architecture
            - code-quality
            - tech-debt
        travel-planning:
          primary_domain: travel
          secondary_domains: []
          keywords:
            - itinerary
            - transportation
            - accommodation
        repo-governance:
          primary_domain: engineering
          secondary_domains:
            - engineering/architecture
            - engineering/tradeoffs
          keywords:
            - architecture
            - migration
            - lifecycle
        feedback-promotion:
          primary_domain: engineering/heuristics
          secondary_domains:
            - engineering/failure
          keywords:
            - learning
            - pattern
            - heuristic
      max_atoms: 3
      min_relevance_score: 0.5
    loading:
      strategy: inline_summary
      format: |
        ### Relevant Intelligence Atoms
        {atom_list}
        Each atom: principle (1 sentence) → when to apply → when not to apply
      expand_condition: "atom_detail_needed == true"
    estimated_tokens:
      summary_per_atom: 200
      full_per_atom: 600
    priority: P2

  # ──────────────────────────────────────────────
  # Analysis Methods Composition
  # ──────────────────────────────────────────────
  - rule_id: analysis-methods
    name: Analysis Methods Selector
    description: >
      根據 task type 從 analysis/ 選擇相關的分析方法。
      僅在需要深入技術細節時載入。
    selection:
      method: task_type_mapping
      mapping:
        apk-analysis: analysis/apk/
        repo-analysis: analysis/repo/
        app-development-guidance: analysis/repo/
      fallback: analysis/README.md
    loading:
      strategy: read_summary_first
      summary_source: "{analysis_dir}/README.md"
      full_source: "{analysis_dir}/{method-file}.md"
      expand_condition: "technique_detail_needed == true"
    estimated_tokens:
      summary: 300
      full: 800
    priority: P3
    load_condition: "deep_technical_work == true"

  # ──────────────────────────────────────────────
  # Knowledge Summary Composition
  # ──────────────────────────────────────────────
  - rule_id: knowledge-summary
    name: Knowledge Summary Selector
    description: >
      根據 skill_id 從 knowledge/summaries/ 選擇對應的知識摘要。
      在 navigation 與 routing 場景中使用。
    selection:
      method: skill_id_mapping
      mapping:
        apk-analysis: knowledge/summaries/apk-analysis-pilot.md
        app-development-guidance: knowledge/summaries/development-guidance.md
        travel-planning: knowledge/summaries/travel-planning.md
        repo-governance: knowledge/summaries/repo-governance.md
        knowledge-navigation: knowledge/summaries/knowledge-navigation.md
        feedback-promotion: knowledge/summaries/feedback-promotion.md
      fallback: knowledge/summaries/README.md
    loading:
      strategy: inline_full
      format: |
        ### Knowledge Summary
        {summary_content}
    estimated_tokens: 500
    priority: P2

# ──────────────────────────────────────────────
# Section Ordering Rules
# ──────────────────────────────────────────────
section_ordering:
  description: >
    定義 artifact sections 的預設順序與相依關係。
    某些 sections 必須在其他 sections 之前載入。
  default_order:
    - task-context
    - workflow-steps
    - intelligence-atoms
    - analysis-methods
    - artifact-gates
    - output-format
  dependencies:
    intelligence-atoms:
      depends_on: task-context
      reason: "需要 task context 來決定哪些 atoms 相關"
    analysis-methods:
      depends_on: workflow-steps
      reason: "需要 workflow steps 來決定哪些方法需要"
    artifact-gates:
      depends_on: workflow-steps
      reason: "需要 workflow steps 來決定哪些 gates 適用"

# ──────────────────────────────────────────────
# Token Budget Allocation
# ──────────────────────────────────────────────
token_budget_rules:
  description: >
    每個 section 的 token budget 分配規則。
    如果總 token 超過 hard_stop，依 priority 降序裁減。
  allocation_strategy: priority_based_culling
  culling_order:
    - analysis-methods      # P3: 最先裁減
    - intelligence-atoms    # P2: 其次裁減
    - knowledge-summary     # P2: 其次裁減
    - artifact-gates        # P1: 保留
    - workflow-steps        # P1: 保留
    - task-context          # 必保留
    - output-format         # 必保留
  culling_method: switch_to_summary
  culling_description: >
    裁減時不直接移除 section，而是從 full source 切換到 summary 模式。
    只有當 summary 模式仍超過 budget 時才移除 section。

# ──────────────────────────────────────────────
# Conflict Resolution
# ──────────────────────────────────────────────
conflict_resolution:
  description: >
    當多個 composition rules 指向同一個檔案或內容時的處理規則。
  conflict_rules:
    - scenario: "同一檔案被多個 sections 引用"
      action: "只載入一次，共享內容"
    - scenario: "intelligence atom 同時被多個 rules 選中"
      action: "只嵌入一次，在第一次出現的 section 中"
    - scenario: "workflow step 與 analysis method 內容重疊"
      action: "workflow step 優先（P1），analysis method 引用 workflow 中的內容"
