      - id: output-format
        description: >
          規劃結果輸出格式。
        source: inline
        content: |
          ## Output Format
          - Daily Itinerary: [day-by-day plan with time slots]
          - Transportation: [routes / costs / alternatives]
          - Accommodation: [options with pros/cons]
          - Budget Breakdown: [estimated costs by category]
          - Backup Plans: [alternatives for key items]
          - Preparation Checklist: [packing / documents / bookings]
        estimated_tokens: 400
        required: true

  # ──────────────────────────────────────────────
  # Repository Governance
  # ──────────────────────────────────────────────
