      - id: validation-gates
        description: >
          驗證閘門定義。引用 governance/validation/。
        source: governance/validation/
        estimated_tokens: 600
        required: true

      - id: output-format
        description: >
          治理結果輸出格式。
        source: inline
        content: |
          ## Output Format
          - Changes Made: [list of changes with file paths]
          - Validation Results: [pass / fail per gate]
          - Migration Status: [completed / pending / blocked]
          - Linked Updates Required: [files that need sync]
          - Open Issues: [unresolved items]
        estimated_tokens: 300
        required: true

