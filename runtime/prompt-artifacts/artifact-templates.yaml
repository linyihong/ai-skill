    skill_id: repo-governance
    triggers:
      - governance
      - migration
      - architecture-upgrade
      - repo-maintenance
      - cleanup
      - deprecation
      - lifecycle
      - validation
      - metadata
      - schema
    estimated_total_tokens: 3000
    token_budget:
      warning_at: 2400
      hard_stop_at: 2700
    sections:
      - id: task-context
        description: >
          治理任務上下文。包含治理類型、範圍與目標。
        source: inline
