# Extraction artifact — ADR-004 Completion Plan, Phase 4A.
#
# This is NOT a schema and NOT runtime config. It EXTRACTS and EXPLAINS an
# authority relationship that already exists in system behaviour (the
# route-ownership family; this is its first named instance). It explains the
# system; it does not drive it:
#   - delete this artifact  -> runtime reasoning is unchanged
#   - modify this artifact  -> runtime is unchanged
#   - modify the registry   -> this artifact is stale (re-materialize from registry)
# Materialization direction: registry -> materialize(contract) -> explain(runtime).
# The reverse (contract -> configure(runtime)) is forbidden and would mean the
# extraction failed.
#
# Holds only three sentence kinds: Ownership / Derivation / Invalidation.
id: contract.feedback.location
kind: extraction-artifact
status: active
materialized_from: knowledge/runtime/routing-registry.yaml#route.feedback.history

ownership:
  owner: >
    The single authority_of_location for feedback lessons is the registry route
    route.feedback.history, via its primary_source. The registry is the
    operational authority; this artifact only explains it.
  not_owner:
    - who: constitution/ADR-004-feedback-promotion-pipeline.md
      why: apex intent that the registry materializes FROM; not a mutable owner.
    - who: plans/active/2026-06-23-1500-adr-004-migration-drift-diagnosis.md
      why: frozen historical evidence, not a live owner.
    - who: route.feedback.promotion-pipeline
      why: a different sink (feedback/promotion/); outside this location's ownership.
    - who: enforcement/feedback-lessons.md
      why: authority_of_permission only (filename / schema / promotion); declares no location.

derivation:
  resolve: >
    Consumers obtain the sink from the registry route's primary_source directory.
    The reference resolver is feedbackCanonicalSink — this artifact names where
    resolution happens; it does not define the resolver's behaviour.
  projection_surfaces: >
    The runtime index, runtime query, the generated views (runtime-report.md,
    model-checklists.md) and the operational-workflow path renderings are all
    DERIVED projections of the registry sink — non-authoritative. They display
    the resolution; they do not own it.

invalidation:
  on_owner_change: >
    If route.feedback.history.primary_source changes or is removed, every derived
    projection is stale and must re-resolve from the registry.
  re_resolve: >
    Re-resolution reads the registry route again; no value is carried in this
    artifact as truth. A hardcoded location path anywhere is, by definition,
    drift (Canonical-Path Derivation Invariant).

# Examples — NON-AUTHORITATIVE. A snapshot of the current resolution, kept only to
# make the artifact readable; stale-on-registry-change by design.
examples:
  current_resolution: feedback/history/                                  # derived, example only
  lesson_path_shape: feedback/history/<domain>/<category>/<file>.md      # derived, example only

# Explicitly NOT in this artifact (separate authority dimensions; do not fold in):
#   - activation: route.feedback.history.source_of_truth_gate answers "is it
#     live?", not "where?" — a separate (future) activation contract.
#   - lifecycle / promotion / enforcement / runtime algorithm.
