    required_dependencies:
      - runtime/runtime.db
    candidate_sources:
      - runtime/runtime.db
      - enforcement/conversation-goal-ledger.md
    source_of_truth_gate: runtime-obligation-ledger-active
    ranking_reason: Obligation Ledger 定義 15 個 atomic duties 分散在 9 個 phase，每個 phase 有對應的 obligations 需在 phase entry 時檢查。
    validation_signal: 本 phase 的 obligations 已確認，pending obligations 已記錄，blocking gates 已檢查。
    metadata:
      priority: P0
      confidence: high
      context_cost:
        estimated_tokens: 600
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: source-backed
      reason: Obligation Ledger 是執行階段的義務檢查清單，每個 phase entry 時必須載入。

  - id: route.runtime.blocking-gates
    task_intent: 載入本 phase 的阻斷閘門，確認 phase transition 是否被允許
    primary_source: runtime/runtime.db
    required_dependencies:
      - runtime/runtime.db
      - runtime/runtime.db
    candidate_sources:
