registry_version: knowledge-routing/v2
status: candidate
owner_layer: knowledge/runtime
source_of_truth_policy: old-entrypoint-active
description: >
  第二版 machine-readable routing registry。新增 context_cost metadata、
  load_strategy、ttl 與 skills-index 路由。此檔只描述 routing，不取代
  shared-rules、skills 或其他 canonical source。Agent 仍需依 required_dependencies
  讀取必要入口與驗證規則。
refresh_policy: knowledge/runtime/refresh-policy.yaml

records:
  - id: route.bootstrap.ai-skill
    task_intent: 啟動或接手 Ai-skill work
    primary_source: CORE_BOOTSTRAP.md
    required_dependencies:
      - README.md
      - shared-rules/README.md
    candidate_sources:
      - skills-index.yaml
      - knowledge/indexes/README.md
      - runtime/router/activation-rules.yaml
      - knowledge/summaries/root-bootstrap.md
      - knowledge/graphs/metadata-navigation.yaml
    source_of_truth_gate: core-bootstrap-and-readme-active
    ranking_reason: CORE_BOOTSTRAP.md 是每個 session 的最小啟動集合（3 rules, ~800 tokens）。
    validation_signal: Core Bootstrap 3 rules 已讀，skills-index.yaml 已查詢，git status 已檢查。
    metadata:
      priority: P1
      confidence: high
      context_cost:
        estimated_tokens: 800
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: old-entrypoint-active
    model:
      profile: small
      compression_level: summary-first
      reason: Bootstrap 階段只需要 Core Bootstrap 3 rules 與 OS layout，不需要完整 source。

  - id: route.skill.discovery
    task_intent: 根據 task intent 找到對應 skill
    primary_source: skills-index.yaml
    required_dependencies:
      - CORE_BOOTSTRAP.md
    candidate_sources:
      - knowledge/indexes/README.md
      - knowledge/summaries/README.md
    source_of_truth_gate: skills-index-active
    ranking_reason: skills-index.yaml 提供結構化 skill routing，Agent 先比對 task intent 與 triggers，不掃描整個 skills/ 目錄。
    validation_signal: Task intent 已對應到 skills-index.yaml 的 triggers，entrypoint 與 summary path 可解析。
    metadata:
      priority: P1
      confidence: high
      context_cost:
        estimated_tokens: 300
        load_strategy: preload
        cacheable: true
        ttl:
          conversation: true
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: index-only
      reason: Skills index 輕量（~300 tokens），可在整個對話中 cache。

  - id: route.runtime.activation-rules
    task_intent: 決定哪些 lazy-load rules 需要 activate
    primary_source: runtime/router/activation-rules.yaml
    required_dependencies:
      - CORE_BOOTSTRAP.md
      - skills-index.yaml
    candidate_sources:
      - runtime/context/ttl-policy.yaml
      - knowledge/runtime/README.md
    source_of_truth_gate: activation-rules-active
    ranking_reason: Activation rules 定義每個 lazy-load rule 的觸發條件，Agent 依目前 task 比對後決定載入哪些規則。
    validation_signal: 目前 task 已比對 activation-rules.yaml，符合條件的 rules 已載入，不符合的已 deferred。
    metadata:
      priority: P1
      confidence: medium
      context_cost:
        estimated_tokens: 500
        load_strategy: preload
        cacheable: true
        ttl:
          conversation: true
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: index-only
      reason: Activation rules 輕量（~500 tokens），可在整個對話中 cache。

  - id: route.runtime.context-ttl
    task_intent: 管理 context 生命週期，防止 token 膨脹
    primary_source: runtime/context/ttl-policy.yaml
    required_dependencies:
      - runtime/router/activation-rules.yaml
    candidate_sources:
      - knowledge/runtime/README.md
      - knowledge/runtime/routing-registry.yaml
    source_of_truth_gate: design-layer-only
    ranking_reason: TTL policy 定義每條 context 的存活時間，Agent 依此 prune 過期 context。
    validation_signal: Context TTL 已套用，過期 context 已 prune，token 使用率在預算內。
    metadata:
      priority: P2
      confidence: medium
      context_cost:
        estimated_tokens: 400
        load_strategy: lazy
        cacheable: true
        ttl:
          conversation: true
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: index-only
      reason: TTL policy 輕量，需要 prune 時才讀。

  - id: route.governance.durable-goal-boundary
    task_intent: 維護 active goal 與 durable roadmap goal 邊界
    primary_source: shared-rules/conversation-goal-ledger.md
    required_dependencies:
      - shared-rules/content-layering.md
      - governance/lifecycle/README.md
    candidate_sources:
      - scripts/README.md
      - ai-tools/cursor.md
      - ai-tools/claude.md
      - knowledge/summaries/goal-ledger-boundary.md
      - knowledge/graphs/source-boundary.yaml
    source_of_truth_gate: shared-rule-active
    ranking_reason: active goal 刪除條件與 durable follow-up gate 由 conversation-goal-ledger 定義。
    validation_signal: 長期狀態已落到 durable planning 文件，且 active goal 完成後才刪除。
    metadata:
      priority: P1
      confidence: high
      context_cost:
        estimated_tokens: 600
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: old-entrypoint-active
    model:
      profile: large
      compression_level: source-backed
      reason: Goal 刪除與 durable planning gate 會影響 long-term state，需讀 shared rule source。

  - id: route.runtime.context-loading
    task_intent: 決定 runtime context loading 路線
    primary_source: runtime/routing/README.md
    required_dependencies:
      - knowledge/indexes/README.md
      - metadata/ranking/README.md
      - metadata/confidence/README.md
      - metadata/compatibility/README.md
    candidate_sources:
      - knowledge/runtime/README.md
      - knowledge/summaries/README.md
      - knowledge/graphs/metadata-navigation.yaml
    source_of_truth_gate: design-layer-only
    ranking_reason: runtime/routing 描述 task intent 到 primary source 的載入流程，metadata 子規則決定排序、信心與相容性。
    validation_signal: Primary source、deferred sources、source-of-truth gate 與 validation signal 已可被記錄。
    metadata:
      priority: P1
      confidence: medium
      context_cost:
        estimated_tokens: 400
        load_strategy: lazy
        cacheable: true
        ttl:
          conversation: true
      compatibility_state: dual-reference
    model:
      profile: small
      compression_level: summary-first
      reason: routing decision 可先用 registry、index、summary；修改 source 時再升級。

  - id: route.metadata.knowledge-atom-schema
    task_intent: 設計或評估 Knowledge Atom metadata
    primary_source: metadata/schema.md
    required_dependencies:
      - metadata/rules/README.md
      - metadata/ranking/README.md
      - metadata/confidence/README.md
      - metadata/compatibility/README.md
    candidate_sources:
      - knowledge/runtime/README.md
      - knowledge/summaries/README.md
      - knowledge/graphs/README.md
      - knowledge/summaries/metadata-schema.md
      - knowledge/graphs/metadata-navigation.yaml
    source_of_truth_gate: metadata-schema-active
    ranking_reason: metadata/schema.md 定義 atom 必填欄位與 YAML 範本，子規則定義欄位如何用於 runtime routing。
    validation_signal: 欄位可套用到第一批 atom candidates，且 Markdown links 可解析。
    metadata:
      priority: P2
      confidence: high
      context_cost:
        estimated_tokens: 1200
        load_strategy: lazy
        cacheable: true
        ttl:
          conversation: true
      compatibility_state: new-layer-promoted
    model:
      profile: large
      compression_level: source-backed
      reason: 建立或修改 atom metadata 時需讀 schema 與子規則全文。

  - id: route.skill.apk-analysis
    task_intent: 執行授權 APK analysis 能力
    primary_source: skills/apk-analysis/SKILL.md
    required_dependencies:
      - skills/apk-analysis/README.md
      - skills/apk-analysis/WORKFLOW.md
      - shared-rules/README.md
      - shared-rules/dependency-reading.md
    candidate_sources:
      - architecture/apk-analysis-pilot-migration.md
      - analysis/apk/README.md
      - workflow/apk-analysis/README.md
      - intelligence/engineering/apk-analysis/README.md
      - knowledge/summaries/apk-analysis-pilot.md
      - knowledge/graphs/apk-analysis-pilot.yaml
    source_of_truth_gate: old-skill-entrypoint-active
    ranking_reason: apk-analysis 仍以 skill entrypoint 作為工具觸發與授權邊界；新分層目前只作候選目的地與 mapping。
    validation_signal: 舊入口仍可讀，新 reference-first paths 可找到，且未 bulk migrate skill content。
    metadata:
      priority: P2
      confidence: medium
      context_cost:
        estimated_tokens: 4500
        load_strategy: lazy
        cacheable: true
        ttl:
          task: 1
      compatibility_state: old-entrypoint-active
    model:
      profile: specialized
      compression_level: source-backed
      reason: APK analysis 需要 skill entrypoint、workflow 與 domain-specific technique routing。

  - id: route.intelligence.apk-highest-leverage-path
    task_intent: 選擇 APK 分析最高收益路線
    primary_source: intelligence/engineering/apk-analysis/highest-leverage-analysis-path.md
    required_dependencies:
      - skills/apk-analysis/SKILL.md
      - skills/apk-analysis/WORKFLOW.md
      - skills/apk-analysis/feedback_history/common/2026-05-07_131000-highest-leverage-analysis-path.md
    candidate_sources:
      - knowledge/summaries/apk-highest-leverage-analysis.md
      - knowledge/graphs/apk-highest-leverage-analysis.yaml
      - runtime/routing/README.md
      - shared-rules/decision-efficiency.md
    source_of_truth_gate: old-skill-entrypoint-active
    ranking_reason: 此 intelligence atom 抽象化已進入 WORKFLOW 的 route selection judgment，但 APK 分析授權與完整 workflow 仍由 skill entrypoint 管理。
    validation_signal: 已比較可用 routes、選定 evidence-to-cost ratio 最高路線、記錄 fallback 與 attribution 回補條件。
    metadata:
      priority: P1
      confidence: medium
      context_cost:
        estimated_tokens: 2000
        load_strategy: lazy
        cacheable: true
        ttl:
          task: 1
      compatibility_state: dual-reference
    model:
      profile: specialized
      compression_level: source-backed
      reason: APK route selection 需要 domain workflow、feedback source 與 intelligence judgment 一起判斷。

  - id: route.feedback.promotion-pipeline
    task_intent: 規劃 feedback lesson promotion 或 downgrade
    primary_source: feedback/promotion/README.md
    required_dependencies:
      - shared-rules/feedback-lessons.md
      - shared-rules/reusable-guidance-boundary.md
      - shared-rules/sanitization.md
      - shared-rules/failure-learning-system.md
      - governance/lifecycle/README.md
      - governance/validation/README.md
    candidate_sources:
      - knowledge/summaries/feedback-promotion-pipeline.md
      - knowledge/graphs/feedback-promotion-pipeline.yaml
      - feedback/README.md
      - knowledge/runtime/refresh-policy.yaml
    source_of_truth_gate: shared-rule-active
    ranking_reason: feedback/promotion 描述 lesson promotion 的 durable target selection；可執行 lesson 寫作規則仍由 shared-rules/feedback-lessons.md 管理。
    validation_signal: 原 lesson source 保留、promotion target 明確、runtime surfaces 與 close-loop validation 已同步。
    metadata:
      priority: P1
      confidence: medium
      context_cost:
        estimated_tokens: 1800
        load_strategy: lazy
        cacheable: false
        ttl:
          task: 1
      compatibility_state: dual-reference
    model:
      profile: large
      compression_level: source-backed
      reason: Promotion / downgrade 會影響 shared rules、skill history、intelligence 與 runtime surfaces，需要讀 full source 與 validation gates。

  - id: route.models.model-aware-routing
    task_intent: 建立或使用 model-aware routing / compression strategy
    primary_source: models/profiles/README.md
    required_dependencies:
      - models/compression/README.md
      - runtime/routing/README.md
      - metadata/ranking/README.md
      - knowledge/summaries/README.md
    candidate_sources:
      - knowledge/runtime/README.md
      - metadata/schema.md
    source_of_truth_gate: design-layer-only
    ranking_reason: models/profiles 定義 small / large / specialized 的 context loading 深度，models/compression 定義 compression levels 與 escalation rules。
    validation_signal: Profile、compression level、primary source、deferred sources 與 validation signal 可被記錄。
    metadata:
      priority: P2
      confidence: medium
      context_cost:
        estimated_tokens: 1200
        load_strategy: lazy
        cacheable: true
        ttl:
          conversation: true
      compatibility_state: dual-reference
    model:
      profile: large
      compression_level: source-backed
      reason: 修改 model strategy 會影響 runtime routing，需讀 profiles、compression 與 routing source。
