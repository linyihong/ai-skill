      - enforcement/failure-learning-system.md
    source_of_truth_gate: runtime-blocking-gates-active
    ranking_reason: Blocking Gates 定義 18 個 gates 分散在 9 個 phase，severity 分 critical/high/medium，critical 與 high 會 blocking phase transition。
    validation_signal: 本 phase 的 blocking gates 已檢查，無未通過的 critical/high gates，phase transition 可進行。
    metadata:
      priority: P0
      confidence: high
      context_cost:
        estimated_tokens: 500
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
