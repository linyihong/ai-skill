registry_version: knowledge-routing/v2
status: candidate
owner_layer: knowledge/runtime
source_of_truth_policy: old-entrypoint-active
description: >
  第二版 machine-readable routing registry。新增 context_cost metadata、
  load_strategy、ttl 與 skills-index 路由。此檔只描述 routing，不取代
  shared-rules、skills 或其他 canonical source。Agent 仍需依 required_dependencies
  讀取必要入口與驗證規則。
refresh_policy: knowledge/runtime/refresh-policy.yaml

records:
  - id: route.bootstrap.ai-skill
    task_intent: 啟動或接手 Ai-skill work
    primary_source: CORE_BOOTSTRAP.md
    required_dependencies:
      - README.md
      - enforcement/README.md
    candidate_sources:
      - skills-index.yaml
      - knowledge/indexes/README.md
      - runtime/router/activation-rules.yaml
      - knowledge/summaries/root-bootstrap.md
      - knowledge/graphs/metadata-navigation.yaml
    source_of_truth_gate: core-bootstrap-and-readme-active
    ranking_reason: CORE_BOOTSTRAP.md 是每個 session 的最小啟動集合（3 rules, ~800 tokens）。
    validation_signal: Core Bootstrap 3 rules 已讀，skills-index.yaml 已查詢，git status 已檢查。
    metadata:
      priority: P1
      confidence: high
      context_cost:
        estimated_tokens: 800
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: old-entrypoint-active
    model:
      profile: small
      compression_level: summary-first
      reason: Bootstrap 階段只需要 Core Bootstrap 3 rules 與 OS layout，不需要完整 source。

  - id: route.runtime.phase-machine
    task_intent: 載入目前 phase 狀態、allowed/forbidden actions、phase transition rules
    primary_source: runtime/phases/phase-machine.yaml
    required_dependencies:
      - CORE_BOOTSTRAP.md
      - README.md
    candidate_sources:
      - runtime/obligations/obligation-ledger.yaml
      - runtime/gates/blocking-gates.yaml
    source_of_truth_gate: runtime-phase-machine-active
    ranking_reason: Phase Machine 定義 9 個 phase（bootstrap→checkpoint→execution→validation→commit→push→readback→finalize→recovery），每個 session 啟動後必須載入目前 phase 才能決定 allowed_actions 與 blocking gates。
    validation_signal: 目前 phase 已確認，allowed_actions 與 forbidden_actions 已載入，phase transition rules 已檢查。
    metadata:
      priority: P0
      confidence: high
      context_cost:
        estimated_tokens: 800
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: source-backed
      reason: Phase Machine 是執行階段的核心狀態機，每個 session 啟動後必須載入。

  - id: route.runtime.obligation-ledger
    task_intent: 載入本 phase 的未完成義務清單，確認執行前義務已滿足
    primary_source: runtime/obligations/obligation-ledger.yaml
    required_dependencies:
      - runtime/phases/phase-machine.yaml
    candidate_sources:
      - runtime/gates/blocking-gates.yaml
      - enforcement/conversation-goal-ledger.md
    source_of_truth_gate: runtime-obligation-ledger-active
    ranking_reason: Obligation Ledger 定義 15 個 atomic duties 分散在 9 個 phase，每個 phase 有對應的 obligations 需在 phase entry 時檢查。
    validation_signal: 本 phase 的 obligations 已確認，pending obligations 已記錄，blocking gates 已檢查。
    metadata:
      priority: P0
      confidence: high
      context_cost:
        estimated_tokens: 600
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: source-backed
      reason: Obligation Ledger 是執行階段的義務檢查清單，每個 phase entry 時必須載入。

  - id: route.runtime.blocking-gates
    task_intent: 載入本 phase 的阻斷閘門，確認 phase transition 是否被允許
    primary_source: runtime/gates/blocking-gates.yaml
    required_dependencies:
      - runtime/phases/phase-machine.yaml
      - runtime/obligations/obligation-ledger.yaml
    candidate_sources:
      - enforcement/goal-action-validation.md
      - enforcement/failure-learning-system.md
    source_of_truth_gate: runtime-blocking-gates-active
    ranking_reason: Blocking Gates 定義 18 個 gates 分散在 9 個 phase，severity 分 critical/high/medium，critical 與 high 會 blocking phase transition。
    validation_signal: 本 phase 的 blocking gates 已檢查，無未通過的 critical/high gates，phase transition 可進行。
    metadata:
      priority: P0
      confidence: high
      context_cost:
        estimated_tokens: 500
        load_strategy: preload
        cacheable: false
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: source-backed
      reason: Blocking Gates 是執行階段的阻斷檢查，每個 phase transition 前必須載入。

  - id: route.runtime.recovery
    task_intent: 載入 phase 修復策略，處理 blocking gate 阻斷或 phase state 損毀
    primary_source: runtime/recovery/recovery-strategies.yaml
    required_dependencies:
      - runtime/phases/phase-machine.yaml
      - runtime/gates/blocking-gates.yaml
    candidate_sources:
      - runtime/recovery/state-repair.yaml
      - runtime/recovery/obligation-rebuild.yaml
      - runtime/recovery/phase-reconciliation.yaml
      - enforcement/failure-learning-system.md
      - enforcement/failure-patterns/README.md
    source_of_truth_gate: runtime-recovery-active
    ranking_reason: State Repair System 定義 6 種 recovery strategies、5 種 state repair procedures、3 種 obligation rebuild 程序、4 種 phase reconciliation 程序，是 blocking gate 阻斷後的第一道防線。
    validation_signal: 阻斷 gate 已對應到 strategy，repair steps 已執行，verify steps 已通過。
    metadata:
      priority: P1
      confidence: high
      context_cost:
        estimated_tokens: 1200
        load_strategy: lazy
        cacheable: true
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: source-backed
      reason: State Repair System 在 blocking gate 阻斷時才需要載入，不佔用 bootstrap 預算。

  - id: route.runtime.scheduler
    task_intent: 載入 execution queue 排程規則，決定 obligations/gates 的執行順序
    primary_source: runtime/scheduler/priority-scheduler.yaml
    required_dependencies:
      - runtime/phases/phase-machine.yaml
      - runtime/obligations/obligation-ledger.yaml
      - runtime/gates/blocking-gates.yaml
    candidate_sources:
      - runtime/scheduler/execution-queue.yaml
      - runtime/budget/token-budget.yaml
    source_of_truth_gate: runtime-scheduler-active
    ranking_reason: Priority Scheduler 定義 4 級 priority（P0-P3）、6 條 scheduling rules、2 個 scheduling examples，解決注意力漂移問題。Execution Queue 定義 queue 結構、7 條管理規則、3 個 phase queue examples。
    validation_signal: Queue 已依 priority 排序，blocking gates 優先於 obligations，dependencies 已解析。
    metadata:
      priority: P1
      confidence: high
      context_cost:
        estimated_tokens: 1000
        load_strategy: lazy
        cacheable: true
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: source-backed
      reason: Scheduler 在 phase entry 時載入，決定 execution queue 的優先順序。

  - id: route.runtime.transactions
    task_intent: 管理 Ai-skill writeback transaction 的生命週期
    primary_source: runtime/transactions/transaction-machine.yaml
    required_dependencies:
      - runtime/phases/phase-machine.yaml
      - enforcement/dependency-reading.md
    candidate_sources:
      - runtime/transactions/transaction-templates.yaml
      - enforcement/sanitization.md
      - enforcement/linked-updates.md
    source_of_truth_gate: runtime-transactions-active
    ranking_reason: Transaction Machine 定義 7 個 transaction states（closed→open→staging→commit_ready→committed→pushed→verified）、6 條 transaction rules、3 個 templates，將 procedural writeback 升級為 declarative state machine。
    validation_signal: Transaction state 正確，所有 rules 已檢查，templates 已套用。
    metadata:
      priority: P1
      confidence: high
      context_cost:
        estimated_tokens: 800
        load_strategy: lazy
        cacheable: true
        ttl:
          session: 1
      compatibility_state: new-layer-promoted
    model:
      profile: small
      compression_level: source-backed
      reason: Transaction Runtime 在需要寫入 Ai-skill 檔案時才載入，不佔用 bootstrap 預算。

  - id: route.skill.discovery
