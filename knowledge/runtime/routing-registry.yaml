      - metadata/recovery/escalation-levels.yaml
      - metadata/recovery/domain-policies.yaml
      - enforcement/failure-learning-system.md
      - enforcement/failure-patterns/README.md
    source_of_truth_gate: runtime-recovery-active
    ranking_reason: State Repair System 定義 recovery strategies、state repair、obligation rebuild、phase reconciliation；recovery-retry-governance 將 failure-recovery/cognitive-boundaries intelligence 轉成 retry limit、strategy change、source reload 與 validation gate；metadata/recovery 補充 domain-specific reload set。
    validation_signal: 阻斷 gate 已對應到 strategy；retry limit、strategy change、domain policy、required reload set、execution graph rebuild 與 recovery validation 已檢查。
    metadata:
      priority: P1
