policy_version: knowledge-refresh/v1
status: candidate
owner_layer: knowledge/runtime
description: >
  定義 generated summaries、graph records 與 routing registry records 的 refresh /
  revalidate / downgrade 規則。此政策不自動修改 source，只提供 agent close-loop
  時的判斷與驗證格式。

surfaces:
  summaries:
    path: knowledge/summaries/
    refresh_when:
      - canonical source 的責任邊界、觸發條件或 validation signal 改變
      - summary 指向的 source path 改名、移動或 deprecated
      - metadata confidence / lifecycle 狀態改變
    revalidate_when:
      - source 只有措辭修正，summary meaning 未改變
      - links、metadata 或 roadmap 狀態更新但 source 行為不變
    downgrade_when:
      - source 變更後 summary 尚未重讀
      - summary 與 source-of-truth entrypoint 出現不一致
      - validation signal 不再可重現

  graphs:
    path: knowledge/graphs/
    refresh_when:
      - source / target path 新增、移除、改名或 lifecycle state 改變
      - dependency、related、conflict、promotion 或 compatibility 關係改變
      - graph edge type 需要從 candidate map 升級或降級
    revalidate_when:
      - graph target 內容更新但關係未改變
      - routing registry 或 summary 新增 reference，但 graph 主關係仍成立
    downgrade_when:
      - old entrypoint 不再可讀
      - graph 使用 replacement semantics 但 promotion gate 未通過
      - edge validation 失敗或 target path 失效

  routing_registry:
    path: knowledge/runtime/routing-registry.yaml
    refresh_when:
      - knowledge/indexes/README.md 新增或修改 routing row
      - primary source、required dependencies、candidate sources 或 source_of_truth_gate 改變
      - model profile 或 compression strategy 改變
    revalidate_when:
      - candidate source 新增 summary 或 graph，但 primary source 不變
      - roadmap status 改變但 routing decision 不變
    downgrade_when:
      - registry 指向 stale summary / graph
      - required dependency 不存在或未讀
      - YAML parse 或 schema validation 失敗

  runtime_report:
    path: knowledge/runtime/runtime-report.md
    refresh_when:
      - routing registry records 新增、刪除或內容改變
      - summary 或 graph records 新增、刪除或 lifecycle / status 改變
      - refresh policy decision values 改變
    revalidate_when:
      - source 只有措辭或 link 修正，report count 與 routing decision 未改變
      - generator script 未改變但 touched docs 需要重新檢查 links
    downgrade_when:
      - runtime report 未由 current generator 重新產生
      - runtime report links 失效
      - report count 與 registry / summaries / graphs 不一致

  model_context_report:
    path: knowledge/runtime/model-context-report.md
    refresh_when:
      - routing registry 的 model.profile、compression_level 或 reason 改變
      - models/profiles/README.md 或 models/compression/README.md 改變
      - 新增、刪除或改名 routing registry records
    revalidate_when:
      - routing registry 只有非 model 欄位措辭修正
      - report links 需要重新檢查但 profile / compression 分組未改變
    downgrade_when:
      - model context report 未由 current generator 重新產生
      - report links 失效
      - report profile / compression 分組與 registry 不一致

  model_checklists:
    path: knowledge/runtime/model-checklists.md
    refresh_when:
      - routing registry 的 model.profile、compression_level、required_dependencies 或 validation_signal 改變
      - models/profiles/README.md 或 models/compression/README.md 改變
    revalidate_when:
      - routing registry 只有非 model / dependency 欄位措辭修正
      - checklist links 需要重新檢查但 profile / route 分組未改變
    downgrade_when:
      - model checklist 未由 current generator 重新產生
      - checklist links 失效
      - checklist required dependencies 與 registry 不一致

  sqlite_runtime_index:
    path: knowledge/runtime/sqlite/
    refresh_when:
      - summaries、graphs、routing registry 或 feedback lesson indexes 改變
      - metadata/schema.md 的索引欄位語意改變
      - source_path、tags、priority、confidence、context_cost 或 validation signal 改變
    revalidate_when:
      - docs wording 改變但 source_path / metadata / summary meaning 未改變
      - SQLite generator 未改變但需要確認 DB 可由 clean checkout 重建
    downgrade_when:
      - SQLite DB 是 stale generated cache
      - DB row count、source path、checksum 或 FTS query result 與 canonical sources 不一致
      - Agent 嘗試把 SQLite row 當成 canonical source

decision_values:
  - refresh_now
  - revalidate_only
  - downgrade_confidence
  - no_update_needed

validation:
  required_checks:
    - Knowledge runtime refresh orchestrator when generated surfaces may be stale
    - Runtime report generation when generated surfaces change
    - Model context report generation when routing model fields change
    - Model checklist generation when routing model fields or dependencies change
    - SQLite runtime index regeneration when cache tooling exists
    - YAML parse for generated YAML surfaces
    - Knowledge runtime validation helper for registry, summaries and graph records
    - Markdown link check for touched docs
    - canonical source path check
    - old entrypoint reachability check when compatibility state is old-entrypoint-active
    - roadmap or durable status update when lifecycle state changes
  close_loop:
    - diff review
    - close-loop dry run
    - commit
    - push
    - readback
    - clean git status

output_shape:
  changed_source:
  affected_summaries: []
  affected_graphs: []
  affected_registry_records: []
  decision:
  validation_signal:
  deferred_items: []
