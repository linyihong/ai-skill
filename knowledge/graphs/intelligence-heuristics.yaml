id: graph.intelligence-heuristics
source: intelligence/engineering/heuristics/README.md
status: candidate
summary: >
   連接 engineering heuristics 層的所有 atoms：premature-optimization、abstraction-threshold、
   retry-smell、single-responsibility-heuristic、test-driven-heuristic、
   field-confidence-judgment、magic-bytes-reference、document-priority-hierarchy。
   每個 atom 是獨立 intelligence，但共享 heuristics 目錄的 README 索引與技能路由。
edges:
  - type: depends_on
    target: intelligence/engineering/heuristics/README.md
    reason: Heuristics README 提供目錄索引、atom 清單與各 atom 的簡要說明。
    validation: README 列出所有 8 個 atoms 及其核心原則。
  - type: related_to
    target: intelligence/engineering/heuristics/premature-optimization.md
    reason: 過早最佳化經驗法則 — 除非有數據證明瓶頸，否則不最佳化。
    validation: atom 定義 principle、decision flow 與 common misuse table。
  - type: related_to
    target: intelligence/engineering/heuristics/abstraction-threshold.md
    reason: 抽象化門檻經驗法則 — 第三次重複才抽象化。
    validation: atom 定義 3 次重複規則與 premature abstraction 的風險。
  - type: related_to
    target: intelligence/engineering/heuristics/retry-smell.md
    reason: 重試壞味道經驗法則 — 重試是症狀不是解決方案。
    validation: atom 定義 retry 的正確使用時機與常見誤用。
  - type: related_to
    target: intelligence/engineering/heuristics/single-responsibility-heuristic.md
    reason: 單一職責經驗法則 — 模組只有一個改變的理由。
    validation: atom 定義 SRP 的判斷方法與常見誤解。
  - type: related_to
    target: intelligence/engineering/heuristics/test-driven-heuristic.md
    reason: 測試驅動經驗法則 — 測試是設計工具不是驗證工具。
    validation: atom 定義 TDD 的正確心態與常見誤用。
  - type: related_to
    target: intelligence/engineering/heuristics/field-confidence-judgment.md
    reason: 欄位信心判斷經驗法則 — 在不確定時使用明確標記，不要 invent 不存在的資訊。
    validation: atom 定義 8 種信心狀態（confirmed/candidate/needs capture/meaning unknown 等）與判斷流程。
  - type: related_to
    target: intelligence/engineering/heuristics/magic-bytes-reference.md
    reason: Magic Bytes 參考表 — 檔案 extension 不可信，magic bytes 是判斷容器類型的最可靠方式。
    validation: atom 定義 9 種格式的 magic bytes、靜態 vs 動畫判斷、ffprobe 指令。
  - type: related_to
    target: intelligence/engineering/heuristics/document-priority-hierarchy.md
    reason: 文件優先順序階層經驗法則 — 文件衝突時更新管轄文件，而不是默默地只修正其中一個來源。
    validation: atom 定義 6 層優先順序階層、衝突分類流程與常見誤用表。
  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: Registry 應提供 route.intelligence.heuristics record。
    validation: registry record 的 primary_source 指向 intelligence/engineering/heuristics/README.md。
metadata:
  priority: P2
  confidence: medium
  compatibility_state: new-layer-promoted
  last_checked: 2026-05-12
