id: graph.workflow-layers
source: workflow/README.md
status: candidate
summary: >
  連接 workflow 層的所有子目錄：apk-analysis、software-delivery、
  repo-analysis、travel-planning、documentation，以及相關的 intelligence、analysis、skills 層。
edges:
  - type: depends_on
    target: workflow/README.md
    reason: Workflow README 提供層的定義、scope 與各子目錄的關係。
    validation: README 說明 workflow 層的放什麼/不放什麼。
  - type: related_to
    target: workflow/apk-analysis/README.md
    reason: APK analysis workflow — 授權 APK 分析的執行流程。
    validation: README 定義 scope、current source references 與 workflow shape。
  - type: related_to
    target: workflow/apk-analysis/execution-flow.md
    reason: APK analysis 的具體執行步驟與輸出定義。
    validation: execution-flow.md 定義開始前確認、quick start、分析結束定義。
  - type: related_to
    target: workflow/apk-analysis/artifact-gates.md
    reason: APK analysis 的產出閘門定義。
    validation: artifact-gates.md 定義 UI map、API catalog、runtime baseline 等閘門。
  - type: related_to
    target: workflow/software-delivery/README.md
    reason: App 開發審查與指引的執行流程。
    validation: README 定義 scope、核心原則、與既有層的關係。
  - type: related_to
    target: workflow/software-delivery/execution-flow.md
    reason: App development guidance 的具體執行步驟（9 個 workflow sections，§9 Surgical Changes Rules 為新增）。
    validation: execution-flow.md 從 skills/app-development-guidance/WORKFLOW.md（已刪除）提取。
  - type: related_to
    target: workflow/software-delivery/artifact-gates.md
    reason: App development guidance 的產出閘門定義（6 個 artifact sections）。
    validation: artifact-gates.md 從 skills/app-development-guidance/DOCUMENTATION.md（已刪除）提取。
  - type: related_to
    target: workflow/software-delivery/architecture/README.md
    reason: Software-delivery architecture workflow 負責 architecture fit analysis、DDD adoption 與 overengineering detection。
    validation: README 定義何時使用、流程與輸出。
  - type: related_to
    target: workflow/repo-analysis/README.md
    reason: Repository 分析的執行流程。
    validation: README 定義 onboarding/deep-analysis/migration-impact/tech-debt/security-audit flows。
  - type: related_to
    target: workflow/travel-planning/README.md
    reason: 旅遊規劃的執行流程。
    validation: README 定義 scope、核心原則、與既有層的關係。
  - type: related_to
    target: workflow/travel-planning/execution-flow.md
    reason: Travel planning 的具體執行步驟（17 個 workflow sections）。
    validation: execution-flow.md 從 skills/travel-planning/WORKFLOW.md 提取。
  - type: related_to
    target: workflow/travel-planning/artifact-gates.md
    reason: Travel planning 的產出閘門定義（14 個 output templates）。
    validation: artifact-gates.md 從 skills/travel-planning/DOCUMENTATION.md 提取。
  - type: related_to
    target: workflow/documentation/README.md
    reason: Agent-friendly documentation — 跨專案文件撰寫、分類與 index-first 以降低 token。
    validation: README 定義 scope、與 enforcement/governance 的關係與 inbound route id。
  - type: related_to
    target: workflow/documentation/execution-flow.md
    reason: 文件撰寫的具體步驟、分類維度表與完成訊號。
    validation: execution-flow.md 含步驟 0–6 與自查 checklist。
  - type: related_to
    target: workflow/software-delivery/development-process.md
    reason: Contract-first 開發流程 — Default Flow、Required Contracts、Product Brief Validation Gate、Change Intake Gate、Contract Governance Gate、Test Strategy Gate、Definition of Ready/Done。
    validation: development-process.md 從 skills/app-development-guidance/process/README.md（已刪除）提取。

  - type: related_to
    target: workflow/software-delivery/review-checklist.md
    reason: 審查檢查清單 — 15 個審查類別（Change Intake、Test Strategy、Performance Test、Product To Contract、Documentation Backfill、Contract Governance、Embedded/Hardware Review、API And Transport、Auth/Tokens/Sessions、Local Storage、Flutter/Android Build、Logging/Telemetry、Anti-Tamper/Risk、Release Gate）。
    validation: review-checklist.md 從 skills/app-development-guidance/CHECKLIST.md（已刪除）提取。
  - type: related_to
    target: workflow/software-delivery/examples/EXAMPLES.md
    reason: Simplicity First、Surgical Changes、Think Before Coding、Goal-Driven Execution 的行為範例與 anti-patterns 對照。
    validation: EXAMPLES.md 提供 4 個原則的具體 code diff 範例，展示「常見錯誤」vs「正確做法」。
  - type: related_to
    target: analysis/apk/README.md
    reason: Workflow 引用 analysis/ 的技術方法，不重複技術細節。
    validation: workflow/apk-analysis/README.md 說明 reference analysis/apk/。
  - type: related_to
    target: intelligence/engineering/analytical-reasoning/README.md
    reason: Workflow 引用 intelligence/ 的工程智慧輔助判斷。
    validation: workflow/apk-analysis/README.md 說明 reference intelligence/。
  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: Registry 應提供 route.workflow.layers record。
    validation: registry record 的 primary_source 指向 workflow/README.md。
metadata:
  priority: P2
