id: graph.intelligence-anti-patterns
source: intelligence/engineering/anti-patterns/generic-repository-overuse.md
status: candidate
summary: >
  連接 anti-patterns intelligence atoms（generic-repository-overuse、cargo-cult-ddd、
  session-scoped-implicit-state 等）與相關的 architecture、domain、agent-architecture、
  根目錄 anti-patterns 層，以及 runtime routing。
edges:
  - type: depends_on
    target: intelligence/engineering/anti-patterns/README.md
    reason: Anti-patterns README 提供目錄索引、scope 定義與根目錄 anti-patterns 的邊界說明。
    validation: README 說明 intelligence/engineering/anti-patterns/ 與根目錄 anti-patterns/ 的差異。
  - type: related_to
    target: anti-patterns/README.md
    reason: 根目錄 anti-patterns/ 保存 Agent 操作層的 anti-patterns（context explosion、recursive tool loop 等）。
    validation: 根目錄 anti-patterns/README.md 定義 Agent 操作層的 anti-patterns。
  - type: related_to
    target: intelligence/engineering/domain/aggregate-boundary-heuristics.md
    reason: 泛型 Repository 常導致 aggregate 邊界模糊。
    validation: aggregate-boundary-heuristics atom 討論正確的 aggregate 邊界設計。
  - type: related_to
    target: intelligence/engineering/architecture/modular-monolith-vs-microservices.md
    reason: 泛型 Repository 在 modular monolith 中可能導致不必要的抽象層。
    validation: architecture atom 討論 modular monolith 的正確抽象層級。
  - type: related_to
    target: intelligence/engineering/anti-patterns/architecture-absolutism.md
    reason: DDD integration 新增 architecture absolutism，防止 agent 把單一架構當 universal default。
    validation: anti-pattern 定義 rejected alternatives 與 fit evidence 要求。
  - type: related_to
    target: intelligence/engineering/anti-patterns/cargo-cult-ddd.md
    reason: Cargo-cult DDD 是 software-delivery architecture governance 要阻止的核心反模式。
    validation: anti-pattern 要求回到 architecture fit analysis。
  - type: related_to
    target: intelligence/engineering/anti-patterns/session-scoped-implicit-state.md
    reason: 將執行上下文塞進 session-scoped service 或 ambient context，對 agent runtime / replay / 並發是隱形依賴災難。
    validation: anti-pattern 定義何時必須升級為 explicit context，與對 SQLite-as-canonical governance runtime 的應用守則。
  - type: related_to
    target: intelligence/engineering/agent-architecture/README.md
    reason: session-scoped implicit state 直接影響 agent runtime 的 replay / fork / 並發行為。
    validation: agent-architecture atoms 與本 anti-pattern 共同定義 explicit context 設計原則。
  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: Registry 應提供 route.intelligence.anti-patterns record。
    validation: registry record 的 primary_source 指向 anti-patterns atom。
metadata:
  priority: P2
  confidence: medium
