id: graph.governance-layers
source: governance/README.md
status: candidate
summary: >
  連接 governance 層的所有子目錄：lifecycle、validation、cleanup、dependency，
  以及相關的 feedback、runtime 層。
edges:
  - type: depends_on
    target: governance/README.md
    reason: Governance README 提供層的定義、scope 與各子目錄的關係。
    validation: README 說明 governance 層的放什麼/不放什麼。
  - type: depends_on
    target: governance/lifecycle/README.md
    reason: Knowledge lifecycle 定義 candidate → validated → promoted → deprecated 狀態與 promotion gates。
    validation: lifecycle README 定義 lifecycle states、promotion gates 與 deletion rules。
  - type: depends_on
    target: governance/validation/README.md
    reason: Validation gates 定義 knowledge atom 的驗證規則與 migration checklist。
    validation: validation README 定義必要 gates、migration checklist 與 pass/block rules。
  - type: related_to
    target: governance/cleanup/README.md
    reason: Cleanup 規則定義 deprecated atoms 的清理策略。
    validation: cleanup README 定義 cleanup 的觸發條件與執行規則。
  - type: related_to
    target: governance/dependency/README.md
    reason: Dependency 規則定義 atoms 之間的依賴管理。
    validation: dependency README 定義 dependency 的宣告與驗證規則。
  - type: related_to
    target: feedback/promotion/README.md
    reason: Feedback promotion pipeline 使用 governance lifecycle 的 promotion gates。
    validation: feedback/promotion/README.md 說明 promotion 需要 lifecycle states。
  - type: related_to
    target: knowledge/graphs/feedback-promotion-pipeline.yaml
    reason: Feedback promotion graph 也引用 governance lifecycle 與 validation。
    validation: feedback-promotion-pipeline.yaml 的 edges 包含 governance/lifecycle 與 governance/validation。
  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: Registry 應提供 route.governance.layers record。
    validation: registry record 的 primary_source 指向 governance/README.md。
  - type: depends_on
    target: governance/lifecycle/system-upgrade-governance.md
    reason: >
      系統升級治理要則定義大型系統升級的條件、檢查清單與強制規則。
      所有 governance 層的升級都必須遵循此要則。
    validation: system-upgrade-governance.md 的 §1 定義 5 種升級條件、§2 定義 8 類檢查清單。
  - type: related_to
    target: runtime/runtime.db
    reason: >
      System upgrade governance 的 generated SQLite surface（generated_surfaces 表），由 compiler 從 prose 編譯。
      提供快速路徑給 agent 查詢升級治理定義。
    validation: runtime.db 的 generated_surfaces 表包含 upgrade_conditions、checklist_categories、forced_rules。
  - type: related_to
    target: governance/lifecycle/capability-discovery-philosophy.md
    reason: >
      Capability discovery philosophy 解釋 Capability Discovery Problem 與
      discovery checkpoints 的設計原理。現行 structured source 已 embedded 到
      runtime/runtime.db 並編譯進 runtime.db；概念說明歸 governance 層。
    validation: capability-discovery-philosophy.md 說明問題、解決方案、與 activation rules 的互補關係。
  - type: related_to
    target: runtime/runtime.db
    reason: >
      Capability discovery checkpoints 使用 governance graphs 作為搜尋索引，
      在 checkpoint phase 搜尋與任務相關的治理規則。
    validation: runtime.db / runtime/runtime.db 的 checkpoint phase discovery_targets 包含 governance 類型。
  - type: related_to
    target: governance/lifecycle/compiler-philosophy.md
    reason: >
      Compiler philosophy 解釋 prose-to-YAML compiler 的設計原則與核心約束。
      runtime/compiler/ 只存放 engine 與 rules，概念說明歸 governance 層。
    validation: compiler-philosophy.md 說明為什麼需要 compiler、核心原則、source-target mapping。
  - type: related_to
    target: governance/lifecycle/context-ttl-philosophy.md
    reason: >
      Context TTL philosophy 解釋 context 生命週期管理與 prune 策略的設計原理。
      runtime/context/ 只存放 ttl-policy.yaml，概念說明歸 governance 層。
    validation: context-ttl-philosophy.md 說明核心原則、TTL 類型、prune 策略。
  - type: related_to
    target: governance/lifecycle/distributed-runtime-philosophy.md
    reason: >
      Distributed runtime philosophy 解釋多 agent 協調、分散式鎖、async job 的設計原理。
      runtime/distributed/ 只存放 structured YAML，概念說明歸 governance 層。
    validation: distributed-runtime-philosophy.md 說明目的、設計原則、與 transaction runtime 的關係。
  - type: related_to
    target: governance/lifecycle/runtime-guards-philosophy.md
    reason: >
      Runtime guards philosophy 解釋 circuit breaker 與 context pollution detection 的設計原理。
      runtime/guards/ 只存放 structured YAML，概念說明歸 governance 層。
    validation: runtime-guards-philosophy.md 說明 guards 的目的、目前 guards 的設計。
  - type: related_to
    target: governance/lifecycle/intelligence-routing-philosophy.md
    reason: >
      Intelligence routing philosophy 解釋 intelligence domain 對應與 routing 流程的設計原理。
      runtime/intelligence/ 只存放 intelligence-routing.yaml，概念說明歸 governance 層。
    validation: intelligence-routing-philosophy.md 說明設計原則、domain 對照表、routing 流程。
  - type: related_to
    target: governance/lifecycle/output-governance-philosophy.md
    reason: >
      Output governance philosophy 解釋語言政策、輸出規則、governance gates 的設計原理。
      runtime/output-governance/ 只存放 structured YAML，概念說明歸 governance 層。
    validation: output-governance-philosophy.md 說明目的、設計原則、與 compiler 的整合。
  - type: related_to
    target: governance/lifecycle/pipeline-philosophy.md
    reason: >
      Pipeline philosophy 解釋 context flow、guard chain、relevance engine 的設計原理。
      runtime/pipeline/ 只存放 structured YAML，概念說明歸 governance 層。
    validation: pipeline-philosophy.md 說明為什麼需要 pipeline、架構、元件間通訊。
  - type: related_to
    target: governance/lifecycle/prompt-artifacts-philosophy.md
    reason: >
      Prompt artifacts philosophy 解釋 artifact 組合式 prompt 結構的設計原理。
      runtime/prompt-artifacts/ 只存放 templates 與 composition rules，概念說明歸 governance 層。
    validation: prompt-artifacts-philosophy.md 說明為什麼需要、核心概念、與既有層的關係。
  - type: related_to
    target: governance/lifecycle/router-philosophy.md
    reason: >
      Router philosophy 解釋 activation rules 與路由決策的設計原理。
      runtime/router/ 只存放 rules 與 table，概念說明歸 governance 層。
    validation: router-philosophy.md 說明路由流程、決策表、activation rules 使用方式。
  - type: related_to
    target: governance/lifecycle/routing-philosophy.md
    reason: >
      Routing philosophy 解釋 task intent → knowledge index → metadata → gate 的 routing pipeline 設計原理。
      runtime/routing/ 只存放 navigation README，概念說明歸 governance 層。
    validation: routing-philosophy.md 說明 routing pipeline 各步驟、output shape、stop conditions。
metadata:
  priority: P1
  confidence: medium
  compatibility_state: new-layer-promoted
  last_checked: 2026-05-17
