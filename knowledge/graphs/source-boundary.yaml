id: graph.source-boundary
source: governance/lifecycle/README.md
status: candidate
summary: >
  描述 active conversation goals、durable roadmap goals、content layering、
  validation gates 與 tool-facing reminders 之間的關係。
edges:
  - type: depends_on
    target: shared-rules/conversation-goal-ledger.md
    reason: active goal 完成、刪除與 durable follow-up gate 的 source-of-truth。
    validation: shared-rules/conversation-goal-ledger.md 定義 Goal 層級邊界與完成刪除條件。
  - type: depends_on
    target: shared-rules/content-layering.md
    reason: 定義長期目標、active implementation task 與 durable planning 文件的放置位置。
    validation: content-layering 表格包含 durable planning 與 .agent-goals 邊界。
  - type: related_to
    target: scripts/README.md
    reason: helper usage 說明 complete --validated 前需回寫 durable planning。
    validation: scripts/README.md 的安全條件包含 durable goal completion gate。
  - type: related_to
    target: ai-tools/cursor.md
    reason: Cursor tool guidance 需要提醒 agent 不把 completed row 當長期記憶。
    validation: Cursor goal ledger section 包含 durable planning handoff rule。
  - type: related_to
    target: ai-tools/claude.md
    reason: Claude tool guidance 需要相同 durable planning handoff reminder。
    validation: Claude 操作注意包含 completed goal row 不作長期記憶。
  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: routing registry 提供 route.governance.durable-goal-boundary record。
    validation: registry record 指向 shared-rules/conversation-goal-ledger.md。
metadata:
  priority: P1
  confidence: high
  compatibility_state: old-entrypoint-active
  last_checked: 2026-05-11
