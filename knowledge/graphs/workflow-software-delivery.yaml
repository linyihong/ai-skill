id: graph.workflow-app-development-guidance
source: workflow/software-delivery/README.md
status: candidate
summary: >
  連接 app-development-guidance workflow 的所有檔案：execution-flow、
  artifact-gates，以及相關的 analysis、skills、intelligence 層。
edges:
  - type: depends_on
    target: workflow/software-delivery/README.md
    reason: Workflow README 提供 scope、核心原則、與既有層的關係。
    validation: README 定義 workflow 的 scope 與 extracted content 表。

  - type: related_to
    target: workflow/software-delivery/execution-flow.md
    reason: Software-delivery execution-order thin index；保留 SDK defect closure 與 same-session implementation core，並路由到 focused loading surfaces。
    validation: execution-flow.md 定義 software-delivery cognitive phase navigation；intake / test-strategy / validation / closure / surgical caveats 已抽出為 focused surfaces。

  - type: related_to
    target: workflow/software-delivery/intake.md
    reason: 需求接收、Change Intake、Pre-build Interrogation、Requirements Cognition、Parity Gate、Product Brief Validation、Missing Information 與既有專案 backfill 的 focused execution surface。
    validation: intake.md 由 execution-flow.md §1/§6 與 development-process.md 對應 gates 跨檔同批抽出；來源段落保留 redirect stub。

  - type: related_to
    target: workflow/software-delivery/contracts.md
    reason: Contract governance、traceability、required contracts 與 contract-first discipline 的 focused execution surface。
    validation: contracts.md 由 development-process.md 的 Required Contracts、Contract Governance、Traceability 與 Contract-First Rules 抽出；來源段落保留 redirect stub。

  - type: related_to
    target: workflow/software-delivery/ui-contracts.md
    reason: Consumer Contract、UI Behavior Contract、Screen Contract、Frontend ViewModel Contract 與 Accessibility Contract 的 focused execution surface。
    validation: ui-contracts.md 補足 development-process.md 的 frontend / consumer contract-first surface，並由 routing registry loading surface 載入。

  - type: related_to
    target: workflow/software-delivery/test-strategy.md
    reason: Docs-first BDD closure、test strategy、mutation testing 與 test-first ordering 的 focused execution surface。
    validation: test-strategy.md 由 execution-flow.md §2/§4 子節與 development-process.md BDD/Test Strategy gates 跨檔同批抽出；來源段落保留 redirect stub。

  - type: related_to
    target: workflow/software-delivery/validation.md
    reason: Validation、performance gate、old/new behavior proof 與 completion evidence 的 focused execution surface。
    validation: validation.md 由 execution-flow.md §5/§7 抽出；來源段落保留 redirect stub。

  - type: related_to
    target: workflow/software-delivery/closure.md
    reason: Definition of Ready/Done、handoff、close-loop 與 reusable lesson feedback 的 focused execution surface。
    validation: closure.md 由 execution-flow.md §8 與 development-process.md DoR/DoD 跨檔同批抽出；來源段落保留 redirect stub。

  - type: related_to
    target: workflow/software-delivery/surgical-changes.md
    reason: Surgical change discipline、diff purity 與 orphan cleanup boundary 的 focused failure surface。
    validation: surgical-changes.md 由 execution-flow.md §9 抽出；examples remain suppressed unless explicitly requested.

  - type: related_to
    target: workflow/software-delivery/artifact-gates.md
    reason: App development guidance 的產出閘門定義 — Reusable Note Structure、Keep Separate、Guidance Boundary、Linked Update Statement、Good Guidance、Avoid。
    validation: artifact-gates.md 定義 6 個 artifact sections，從 skills/app-development-guidance/DOCUMENTATION.md（已刪除）提取。

  - type: related_to
    target: workflow/software-delivery/requirements/pre-build-interrogation.md
    reason: Pre-build interrogation gate 在 plan / implementation 前要求 goal、scope、non-goals、acceptance、framework source-of-truth、duplication risk 與 unknown disposition。
    validation: pre-build-interrogation.md 定義 blocking questions、framework discovery、duplication risk 和 ready gate；companion YAML contract 可投影到 runtime generated_surfaces。

  - type: related_to
    target: workflow/software-delivery/development-process.md
    reason: Contract-first 開發流程 index；保留 Default Flow、embedded/hardware flow、producer/consumer fallback 與仍未獨立拆出的 implementation core。
    validation: development-process.md 的 intake / contracts / test-strategy / closure 內容已改為 focused surface redirects，避免 dual source-of-truth。

  - type: related_to
    target: workflow/software-delivery/review-checklist.md
    reason: 審查檢查清單 — Change Intake、Test Strategy、Performance Test、Product To Contract、Documentation Backfill、Contract Governance、Embedded/Hardware Review、API And Transport、Auth/Tokens/Sessions、Local Storage、Flutter/Android Build、Logging/Telemetry、Anti-Tamper/Risk、Release Gate。
    validation: review-checklist.md 定義 15 個審查類別，從 skills/app-development-guidance/CHECKLIST.md（已刪除）提取。

  - type: related_to
    target: workflow/software-delivery/architecture/README.md
    reason: Architecture workflow 補上 architecture fit analysis、DDD adoption、bounded context、minimality 與 overengineering detection。
    validation: architecture README 定義觸發條件、流程與輸出要求。

  - type: related_to
    target: governance/ai-runtime-governance/software-delivery-architecture-governance.md
    reason: Software-delivery architecture governance 定義 fit analysis、minimality、rejected alternatives、overengineering review 與 runtime boundary gate。
    validation: governance 文件明確不把 DDD promotion 成 runtime invariant。

  - type: related_to
    target: workflow/software-delivery/examples/EXAMPLES.md
    reason: Simplicity First、Surgical Changes、Think Before Coding、Goal-Driven Execution 的行為範例與 anti-patterns 對照。
    validation: EXAMPLES.md 提供 4 個原則的具體 code diff 範例，展示「常見錯誤」vs「正確做法」。

  - type: related_to
    target: analysis/development-guidance/README.md
    reason: Analysis 層提供 risk translation、owner layer selection、control definition 等方法，workflow 引用這些方法。
    validation: analysis/development-guidance/README.md 定義 scope 與 4 個 analysis methods。

  - type: related_to
    target: analysis/development-guidance/risk-translation.md
    reason: Risk translation 方法 — Translate To Risk、Choose Owner Layer、Define Controls、File Guidance、Apply Linked Updates。
    validation: risk-translation.md 定義 5 個 analysis methods，從 skills/app-development-guidance/WORKFLOW.md（已刪除）§2-5 提取。

  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: Registry 提供 route.workflow.software-delivery record 與同一 hierarchical route 下的 focused loading surfaces。
    validation: registry record 的 primary_source 指向 workflow/software-delivery/execution-flow.md；loading_surfaces 指向 focused software-delivery surfaces，未新增 flat leaf routes。

