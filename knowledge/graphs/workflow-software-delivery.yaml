id: graph.workflow-app-development-guidance
source: workflow/software-delivery/README.md
status: candidate
summary: >
  連接 app-development-guidance workflow 的所有檔案：execution-flow、
  artifact-gates，以及相關的 analysis、skills、intelligence 層。
edges:
  - type: depends_on
    target: workflow/software-delivery/README.md
    reason: Workflow README 提供 scope、核心原則、與既有層的關係。
    validation: README 定義 workflow 的 scope 與 extracted content 表。

  - type: related_to
    target: workflow/software-delivery/execution-flow.md
    reason: App development guidance 的具體執行步驟 — Start From Evidence、Change Intake、Docs-first BDD closure loop、SDK defect closure loop、Same-session closure、Performance test gate、Backfill rules、Validate、Feed Back、Surgical Changes Rules。
    validation: execution-flow.md 定義 9 個 workflow sections（§9 Surgical Changes Rules 為新增），從 skills/app-development-guidance/WORKFLOW.md（已刪除）提取。

  - type: related_to
    target: workflow/software-delivery/artifact-gates.md
    reason: App development guidance 的產出閘門定義 — Reusable Note Structure、Keep Separate、Guidance Boundary、Linked Update Statement、Good Guidance、Avoid。
    validation: artifact-gates.md 定義 6 個 artifact sections，從 skills/app-development-guidance/DOCUMENTATION.md（已刪除）提取。

  - type: related_to
    target: workflow/software-delivery/development-process.md
    reason: Contract-first 開發流程 — Default Flow、Required Contracts、Product Brief Validation Gate、Change Intake Gate、Contract Governance Gate、Test Strategy Gate、Definition of Ready/Done。
    validation: development-process.md 定義 14 個流程階段，從 skills/app-development-guidance/process/README.md（已刪除）提取。

  - type: related_to
    target: workflow/software-delivery/review-checklist.md
    reason: 審查檢查清單 — Change Intake、Test Strategy、Performance Test、Product To Contract、Documentation Backfill、Contract Governance、Embedded/Hardware Review、API And Transport、Auth/Tokens/Sessions、Local Storage、Flutter/Android Build、Logging/Telemetry、Anti-Tamper/Risk、Release Gate。
    validation: review-checklist.md 定義 15 個審查類別，從 skills/app-development-guidance/CHECKLIST.md（已刪除）提取。

  - type: related_to
    target: workflow/software-delivery/architecture/README.md
    reason: Architecture workflow 補上 architecture fit analysis、DDD adoption、bounded context、minimality 與 overengineering detection。
    validation: architecture README 定義觸發條件、流程與輸出要求。

  - type: related_to
    target: governance/ai-runtime-governance/software-delivery-architecture-governance.md
    reason: Software-delivery architecture governance 定義 fit analysis、minimality、rejected alternatives、overengineering review 與 runtime boundary gate。
    validation: governance 文件明確不把 DDD promotion 成 runtime invariant。

  - type: related_to
    target: workflow/software-delivery/examples/EXAMPLES.md
    reason: Simplicity First、Surgical Changes、Think Before Coding、Goal-Driven Execution 的行為範例與 anti-patterns 對照。
    validation: EXAMPLES.md 提供 4 個原則的具體 code diff 範例，展示「常見錯誤」vs「正確做法」。

  - type: related_to
    target: analysis/development-guidance/README.md
    reason: Analysis 層提供 risk translation、owner layer selection、control definition 等方法，workflow 引用這些方法。
    validation: analysis/development-guidance/README.md 定義 scope 與 4 個 analysis methods。

  - type: related_to
    target: analysis/development-guidance/risk-translation.md
    reason: Risk translation 方法 — Translate To Risk、Choose Owner Layer、Define Controls、File Guidance、Apply Linked Updates。
    validation: risk-translation.md 定義 5 個 analysis methods，從 skills/app-development-guidance/WORKFLOW.md（已刪除）§2-5 提取。

  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: Registry 應提供 route.workflow.app-development-guidance record。
    validation: registry record 的 primary_source 指向 workflow/software-delivery/README.md。

metadata:
  priority: P2
  confidence: medium
