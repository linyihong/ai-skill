id: graph.workflow-travel-planning
source: workflow/travel-planning/README.md
status: candidate
summary: >
  連接 travel-planning workflow 的所有檔案：execution-flow、
  artifact-gates，以及相關的 skills、intelligence 層。
edges:
  - type: depends_on
    target: workflow/travel-planning/README.md
    reason: Workflow README 提供 scope、核心原則、與既有層的關係。
    validation: README 定義 workflow 的 scope 與 extracted content 表。

  - type: related_to
    target: workflow/travel-planning/execution-flow.md
    reason: Travel planning 的具體執行步驟 — Intake、Source Triage、Agency Benchmark、Location Verification、Stop Planning、Weather、Transport、Lodging、Route Shape、Country Checks、Feasibility、Schedule、Calendar Output、車中泊、Recommendation Pass、Final Verification。
    validation: execution-flow.md 定義 17 個 workflow sections，從 skills/travel-planning/WORKFLOW.md 提取。

  - type: related_to
    target: workflow/travel-planning/artifact-gates.md
    reason: Travel planning 的產出閘門定義 — 14 個 output templates（Itinerary Summary、Day Plan、Weather-Aware Options、Source Table、Calendar/App-Ready Table、Offline Checklist、Agency Benchmark、Stop Experience、Restaurant、Exact Location、Non-Driving Transport、Self-Drive Cost、車中泊 Quietness、Final Verification Checklist）。
    validation: artifact-gates.md 定義 14 個 output templates，從 skills/travel-planning/DOCUMENTATION.md 提取。

  - type: related_to
    target: intelligence/travel/README.md
    reason: Travel intelligence 提供旅遊相關的工程智慧（如 japan-roadtrip-fatigue），workflow 可引用這些判斷。
    validation: intelligence/travel/README.md 定義 travel intelligence 的 scope。

  - type: related_to
    target: intelligence/travel/japan-roadtrip-fatigue.md
    reason: Japan roadtrip fatigue atom 提供長途自駕的疲勞管理原則，與車中泊 checks、transport mode decision 相關。
    validation: atom 定義 principle、when to apply、decision flow。

  - type: promotes_from
    target: skills/travel-planning/WORKFLOW.md
    reason: execution-flow.md 的 17 個 workflow sections 從 WORKFLOW.md 提取。
    validation: execution-flow.md 的 compatibility notes 標明舊入口維持 active。

  - type: promotes_from
    target: skills/travel-planning/DOCUMENTATION.md
    reason: artifact-gates.md 的 14 個 output templates 從 DOCUMENTATION.md 提取。
    validation: artifact-gates.md 的 compatibility notes 標明舊入口維持 active。

  - type: preserves_entrypoint
    target: skills/travel-planning/SKILL.md
    reason: SKILL.md 仍為 tools 載入 skill 的 canonical trigger。
    validation: workflow/travel-planning/README.md 說明舊入口維持 active。

  - type: routes_to
    target: knowledge/runtime/routing-registry.yaml
    reason: Registry 應提供 route.workflow.travel-planning record。
    validation: registry record 的 primary_source 指向 workflow/travel-planning/README.md。

metadata:
  priority: P2
  confidence: medium
  compatibility_state: new-layer-promoted
  last_checked: 2026-05-12
