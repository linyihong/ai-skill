id: graph.ddd-architecture-governance
source: intelligence/engineering/architecture/domain-modeling/README.md
status: candidate
summary: >
  Connects domain architecture cognition, architectural fit, software-delivery architecture workflow,
  governance translation, metadata heuristics and validation scenarios. DDD remains a selectable
  architecture strategy, not a runtime invariant.
edges:
  - type: depends_on
    target: intelligence/engineering/requirements/README.md
    reason: Domain architecture modeling depends on stabilized behavior language and acceptance boundary.
    validation: Requirements README defines behavior modeling and acceptance boundary before architecture.
  - type: depends_on
    target: intelligence/engineering/architecture/architectural-fit/README.md
    reason: Architectural fit decides when CRUD, DDD Lite or Full DDD is appropriate.
    validation: Architectural-fit README defines fit analysis and tradeoff matrix.
  - type: related_to
    target: workflow/software-delivery/architecture/README.md
    reason: Software-delivery architecture workflow applies fit analysis to delivery.
    validation: Workflow README defines DDD fit, bounded context discovery and consistency boundary design.
  - type: related_to
    target: governance/ai-runtime-governance/software-delivery-architecture-governance.md
    reason: Governance layer defines architecture fit, minimality and runtime boundary gate.
    validation: Governance document forbids tactical DDD promotion into runtime primitive.
  - type: related_to
    target: metadata/architecture/README.md
    reason: Metadata layer stores fit signal, DDD adoption signal, overengineering signal and bounded context heuristics.
    validation: Metadata README marks metadata-only boundary.
  - type: related_to
    target: validation/scenarios/architecture/cargo-cult-ddd.yaml
    reason: Scenario checks low-complexity project must not default to full DDD.
    validation: Scenario defines forbidden route project_implies_full_ddd.
  - type: routes_to
