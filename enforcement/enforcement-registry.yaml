schema_version: 2
id: enforcement.enforcement-registry
status: active
owner_layer: enforcement
source_markdown: enforcement/enforcement-registry.md

# ─────────────────────────────────────────────────────────────────────
# Mechanical Enforcement Registry — Layer 2.5 (Meta Governance)
#
# Canonical binding table for "Rule ←binding→ Executor ←evidence→ Verification".
# This file is the SoT for which knowledge-layer rule_class corresponds to which
# runtime-layer executor (or explicitly declares why no executor exists).
#
# Companion markdown: enforcement/enforcement-registry.md (philosophy + writing guide).
# Source plan: plans/active/2026-05-31-2100-mechanical-enforcement-registry.md
# ─────────────────────────────────────────────────────────────────────

purpose: >
  Cross-cutting binding table that links each rule_class declared in
  enforcement/, runtime/, or governance/ to its runtime executor (or to an
  explicit declaration that no executor exists, with required metadata).
  Compile-time lint enforces the binding so future rules cannot silently
  leak the "Rule Exists, Executor Missing" failure pattern.

# ─────────────────────────────────────────────────────────────────────
# Global enforcement policy (resolves Open Questions Q1/Q4/Q6)
# ─────────────────────────────────────────────────────────────────────

enforcement_mode:
  orphan_rule: fail        # Q1: hard block, no grace period
  orphan_executor: fail    # Q1: hard block, no grace period
  rationale: |
    Grace period would reintroduce the "warning → ignored → still here in 6
    months" failure mode the registry exists to prevent. Hard block from
    day 1 forces backfill to be a one-time cost, not a permanent backlog.

bootstrap_grace:
  enabled: false           # Q1: no special bootstrap concessions

governance_thresholds:
  rule_class_soft_target: 24
  rule_class_hard_limit: 40
  exceed_soft_target_action: review_split_opportunities
  exceed_hard_limit_action: governance_review_required
  current_count: 28
  # Round-4 T6 + Round-5: source_files per rule_class soft signal.
  # NOT a hard cap (renamed from max_source_files_per_class to be honest
  # about being a review trigger, not enforcement). Lint
  # class_size_review_threshold emits warning only.
  source_files_review_threshold: 5
  rationale: |
    Q6 + new Q resolution. 24 is the design target (registry stays
    legible); 40 is the hard ceiling. Between the two, maintainers are
    asked to review whether classes should be merged or further split.
    Beyond 40 triggers governance review on the abstraction granularity.

    source_files_review_threshold (round-4 T6 / round-5): when a single
    rule_class accumulates > 5 source_files, lint emits a warning to
    prompt review of whether the class should be split. NOT a hard cap —
    if the class is genuinely cohesive (e.g. linked_updates legitimately
    indexes many cross-cutting docs), exceeding the threshold is
    acceptable. The signal is documentation of "this class is getting
    large, consider splitting", not "this class is forbidden".

# ─────────────────────────────────────────────────────────────────────
# Bootstrap mode (Round-2 R2 / Round-4): governs first-import behavior
# ─────────────────────────────────────────────────────────────────────

bootstrap_mode: strict
# Allowed values:
#   strict              — orphan_rule / orphan_executor hard-fail from
#                         day 1 (current Ai-skill repo state; 22 findings
#                         backfilled in single session, manageable)
#   baseline_snapshot_v1 — first compile records existing orphans in
#                         baseline_snapshot.entries; lint downgrades
#                         baseline entries to warning; NEW orphans
#                         (not in baseline) still hard-fail. Intended for
#                         mature repos where initial hard-block would
#                         deadlock all commits during backfill.
#
# Schema patch v2 A2 — bootstrap_mode is the SINGLE source of truth.
# Removed `baseline_snapshot.enabled` (was duplicate state, could go out
# of sync with bootstrap_mode and create illegal {strict, enabled=true}
# combinations). Lint reads bootstrap_mode only; baseline_snapshot
# fields are required iff bootstrap_mode == baseline_snapshot_v1.

baseline_snapshot:
  # Schema present even when bootstrap_mode=strict so future migrations
  # don't need re-architecture. Fields ignored unless bootstrap_mode is
  # baseline_snapshot_v1.
  baseline_created_at: ~
  baseline_burndown_target_date: ~
  baseline_owner: ~                  # Round-4 T4: required when bootstrap_mode=baseline_snapshot_v1
  entries: []
  # entries[] schema (per Round-4 T4):
  #   - finding_type: orphan_rule | orphan_executor | ...
  #     identifier: <file path or symbol name>
  #     baseline_review_summary: |
  #       What the maintainer found when accepting this into baseline
  #       (≥ 20 chars, not "TBD" / "future")
  #     accepted_at: ISO-8601
  #     burndown_owner: <responsible party, may differ from baseline_owner>

# ─────────────────────────────────────────────────────────────────────
# Coverage status enum (v4: 6-value)
# ─────────────────────────────────────────────────────────────────────

coverage_status_spec:
  mechanical:
    semantics: "Executor exists and is enforcing the rule"
    requires: [executors, rationale]
    verification_required: true
    lint_behavior: |
      executors[].symbol must exist in file; coverage_evidence checked
      against verification_levels thresholds.
  behavioral_only:
    semantics: "Intentionally NOT mechanized; depends on agent behavior"
    # Round-4 T2: strip back to 3 hard required. behavioral_only is an
    # exception mechanism, not a second-class coverage; over-instrumenting
    # it makes governance cost exceed mechanical's, defeating the purpose.
    requires:
      - rationale
      - sunset_decision.revisit_when         # Q2 + Round-4: required (event trigger)
      - sunset_decision.success_criteria     # Q2 + Round-4: required (objective test)
    # Round-4 T2: 4 fields downgraded from required to recommended.
    # Lint emits warning (not fail) when these are missing, preserving
    # exception-mechanism lightweight semantics while still surfacing
    # governance gaps in coverage report.
    recommended:
      - sunset_decision.revisit_owner         # Round-2 R1: who reviews when revisit_when fires
      - sunset_decision.last_reviewed_at      # Round-3 + Round-5 U1
      - sunset_decision.last_review_summary   # Round-3: prevent formal-only date bumps
      - sunset_decision.depends_on_rule_classes  # Round-3 S1: structured chain (replaces NLP parse)
    lint_behavior: |
      Required field missing → compile FAIL:
        - rationale
        - sunset_decision.revisit_when
        - sunset_decision.success_criteria
      Recommended field missing → compile WARNING:
        - revisit_owner / last_reviewed_at / last_review_summary /
          depends_on_rule_classes

      Round-5 U1 mutual exclusion:
        behavioral_only_review_age (P0 fail at >24 months) ONLY fires
        when last_reviewed_at is present. If last_reviewed_at is missing,
        behavioral_only_missing_last_reviewed_at (warning) handles the
        case alone. No double-trigger.
        Semantics: age_unknown → skip; missing → warning.

      Q2 rationale: single-field schema would let behavioral_only decay
      into "have criteria but no one checks". Dual lock (revisit_when +
      success_criteria) forms the minimum governance closure.

      Round-3 S1: behavioral_only_revisit_chain lint reads ONLY
      sunset_decision.depends_on_rule_classes (structured array).
      Free-text revisit_when remains human-readable description but is
      NOT parsed by lint (NLP problem avoided).

      Round-3 S2 + Round-4 T3: dual-gate on success_criteria quality:
        - behavioral_only_vague_success_criteria (P0 fail, blacklist):
          rejects "TBD" / "future" / "eventually" / "未來" / "TODO"
        - behavioral_only_missing_measurable_signal (WARNING, whitelist):
          flags when none of {\d+, %, rule_class, executor, lint,
          coverage, validator, hook, scenario, gate} appears in
          success_criteria. Warning only (not fail) because legitimate
          non-numeric criteria like "constitution review process
          formalized" should not be blocked.
          NOTE (schema patch v2 C9): this is a TOKEN-LEVEL heuristic.
          Presence of a keyword does NOT imply the success_criteria is
          actually measurable; absence does NOT imply it is unmeasurable.
          The lint is a documentation prompt, not a semantic judge.
          Maintainers should treat both pass and fail as advisory.
  not_mechanizable:
    semantics: "Will NEVER be mechanized (subjective / no objective test)"
    requires: [rationale, objective_validation_impossible_because]
    lint_behavior: |
      Missing impossibility rationale → compile fail. Governance review
      may challenge whether the class is genuinely not mechanizable.
  pending_implementation:
    semantics: "Knows how to mechanize, child plan is active or scheduled"
    requires: [child_plan, target_promotion]
    # Round-5 U2: child_plan validity schema. Stub plans are LEGAL only
    # if they pass all 4 rules. Prevents "empty shell" plans that
    # technically satisfy child_plan_required but provide no governance
    # value.
    child_plan_validity:
      a_path_resolves: "child_plan path must resolve to an existing plans/active/*.md file. Schema patch v2 B5: path is normalized via `path.split('#')[0]` before resolution to mirror source_files anchor handling."
      b_phase_0_heading: "child_plan body must contain `## Phase 0` heading (minimum implementation outline)"
      c_owner_present: "child_plan frontmatter or body must declare an owner (e.g. `Owner: <name>` or `owner:` in frontmatter)"
      d_acceptance_section: "child_plan must contain non-empty `## Validation Plan` OR `## Acceptance` section"
    lint_behavior: |
      pending_implementation_child_plan_validity:
        (a) violation → P0 FAIL  (path doesn't resolve = registry pointing
            at nonexistent plan, hard breakage)
        (b)/(c)/(d) violation → WARNING  (gradual pressure on stub
            quality without immediately blocking stub creation; stubs are
            legitimate as long as they're growing toward implementation)

      target_promotion deadline: if it contains a date and that date has
      passed without promotion, surface as warning in coverage report
      (existing behavior, preserved).

      Round-5 U2 rationale: F19 case demonstrated that "stub plan with
      just title" is too weak — child_plan_validity 4 rules ensure stubs
      have minimum structure (Phase 0 outline + owner + acceptance) to
      prevent the schema from being gamed.
  research_required:
    semantics: "Knows it SHOULD be mechanizable, doesn't yet know HOW"
    requires: [rationale, research_questions, estimated_unblock_timeline]
    lint_behavior: |
      research_questions must list ≥ 1 concrete unresolved question.
      If estimated_unblock_timeline passes without promotion or demote →
      governance review trigger.
  deprecated:
    semantics: "Class is being removed; either replaced or scheduled for removal"
    requires_one_of: [replaced_by, removal_date]
    lint_behavior: |
      replaced_by must point to an active rule_class id; OR removal_date
      must be a future ISO-8601 date. Past removal_date with class still
      present → compile fail.

# ─────────────────────────────────────────────────────────────────────
# Executor kind whitelist (Q4 resolution)
# ─────────────────────────────────────────────────────────────────────

executor_kind_spec:
  enum:
    - hook_dispatcher_entry      # runSessionStart, runPreToolUse, ...
    - commit_msg_validator       # validateCognitiveContractFormat, ...
    - runtime_state_machine_phase # runtime.db phase machine transitions
    - internal_helper            # parseYaml, normalizePath, ... (exempt)
  binding_required_for:
    - hook_dispatcher_entry
    - commit_msg_validator
    - runtime_state_machine_phase
  rationale: |
    Q4 resolution: not every Go function is an "executor" worth registering.
    Only functions that are exported through hook dispatchers, registered
    as commit-msg validators, or implement runtime phase machine
    transitions count. Helpers (parseYaml, normalizePath, etc.) are
    explicitly exempt via internal_helper_allowlist to avoid registry
    bloat. The allowlist is maintained here (yaml) rather than as Go
    annotations to keep the boundary visible and reviewable.

internal_helper_allowlist:
  description: |
    Go symbols in scripts/ai-skill-cli/internal/app/hooks.go that look like
    they could be executors but are internal helpers. NOT considered
    orphan executors during lint.
  symbols:
    - appendLog
    - readFileSafe
    - resolveClaudeAiSkillRepo
    - md5Short
    - claudeFileExists
    - extractAssistantTexts
    - transcriptHasRequiredBootstrapReads  # called by PreToolUse gate; not an executor itself
    - collectDirtyGitRepoReports
    - nonEmptyLines
    - gitStatusNeedsReport
    - formatDirtyGitRepoReport
    - hookGitOutput
    - blockStopHookMissingAssistantText
    - isCursorNonFinalToolResponse
    - hasBootstrapAcknowledgement
    - isCursorStopPayload
    - isCursorAfterAgentResponsePayload
    - cursorHookEventName
    - writeCursorStopFollowup
    - extractStopHookAssistantTexts
    - collectStopHookAssistantTexts
    - collectStopHookAssistantValue
    - isStopHookAssistantTextKey
    - stagedRequiresDeepStrictCognitiveMode
    - parseCompactCognitiveLine
    - parseCognitiveModeBlock
    - deriveCognitiveCost
    - parseActivationSignals
    - readKnownCognitiveSignals
    - itoa
    - planDiffFlipsCheckbox
    - findArchivedPlans
    - bodyJustifiesUnchecked
    - stagedAddedRouteIDs
    - stagedManualAnnotatedRouteIDs
    - stagedAddedTargetKeys
    - routeWiredInTree
    - targetKeyConsumedInTree
    - sourceTreeContains
    - stagedDiff
    - readPerCommitObligationsOrder
    - parseGitHubRemote
    - cliCIPrePushPaths
    - hasCLICIPreflightChange
    - gitLines
    - hasRuntimeSourceChange
    - hasRuntimeDBChange
    - hasKnowledgeValidationChange
    - hookAdapterContent
    - hookSourceCheck
    - gitHooksTargetDir
    - listHookFiles
    - existingHookTargets
    - buildHooksInstallResult
    - buildHooksRunResult

# ─────────────────────────────────────────────────────────────────────
# Verification levels (v4: 4-level ladder)
# ─────────────────────────────────────────────────────────────────────

verification_levels:
  symbol_exists:
    check: "executor symbol resolves in declared file"
    lint: "missing → compile fail (mechanical only)"
  scenario_exists:
    check: "validation/scenarios/<area>/<class>*.yaml exists"
    lint: "missing → compile warning (will become fail in v5)"
  regression_exists:
    check: "at least one scenario covers a known historical failure"
    lint: "missing → compile warning"
  runtime_observed:
    check: |
      runtime.db.executor_observations shows ≥ 1 trigger in last
      observation_window_days; for classes with instance sets,
      runtime_observation_pct ≥ expected_observation_pct.
    lint: |
      runtime_observation_pct < expected → coverage report warning;
      < expected/2 → governance review trigger. Not a compile fail
      because runtime metrics are observational and need human judgment.

# ─────────────────────────────────────────────────────────────────────
# Runtime metrics spec (v4 NEW)
# ─────────────────────────────────────────────────────────────────────

runtime_metrics_spec:
  collection: |
    Runtime hooks write to runtime.db.executor_observations table on each
    fire. Schema: { rule_class_id, executor_symbol, fired_at,
    instance_id (optional), result (pass|warn|block) }.
    Table creation and write-path wiring is Phase 5 work; this registry
    declares the contract.
  default_observation_window_days: 30
  default_expected_observation_pct: 30
  per_class_overrides_allowed: true

# ─────────────────────────────────────────────────────────────────────
# Self-Governance (v4: Phase 4.5)
# ─────────────────────────────────────────────────────────────────────

self_governance:
  status_transition_matrix:
    - from: "(new)"
      to: pending_implementation
      requires: [child_plan exists]
    - from: "(new)"
      to: research_required
      requires: [research_questions >= 1, estimated_unblock_timeline]
    - from: pending_implementation
      to: mechanical
      requires: [executor symbol live, coverage_evidence complete, verification thresholds met]
    - from: research_required
      to: pending_implementation
      requires: [all research_questions resolved, child_plan exists]
    - from: mechanical
      to: behavioral_only
      requires: [demotion_rationale, adr_reference]  # demotion needs ADR
    - from: mechanical
      to: deprecated
      requires: [replaced_by points to active mechanical class]
    - from: behavioral_only
      to: "(review queue)"
      trigger: sunset_decision.revisit_when fires
    - from: deprecated
      to: "(removed)"
      trigger: removal_date reached, governance approves actual removal
  # Schema patch v2 A1 — split namespace by execution phase to avoid
  # mixing commit-msg lint with compile-time lint. Go code dispatches
  # by reading commit_msg_lint_rules / compile_time_lint_rules
  # separately, no phase filter needed.
  commit_msg_lint_rules:
    R1: "rule_class status change commit must include [registry-status-change] trailer + rationale: body"
    R2: "demotion commit must reference an ADR; missing adr_reference → reject"
    R3: "promotion must show verification_levels met mechanical thresholds; otherwise lint fail"
    R4: "deprecated past removal_date by 30+ days → governance alert (not blocking)"
    R5: "research_required past estimated_unblock_timeline → governance review trigger"
  compile_time_lint_rules:
    # Renumbered from former R6-R9 (which awkwardly mixed phases). These
    # run during `ai-skill runtime compile`, not at commit-msg.
    R1_upstream_chain_resolution: |
      rule_classes[].upstream_classes references must resolve to existing
      rule_class ids; transitive closure must not contain cycles. Cycle
      detected → P0 FAIL.
    R2_class_size_review_threshold: |
      rule_classes[].source_files > governance_thresholds.source_files_review_threshold
      → WARNING. Suppressible by setting
      rule_classes[].size_review_exemption_rationale: <non-empty string>
      (Schema patch v2 B6); the WARNING is still emitted but includes
      the maintainer rationale instead of bare threshold breach.
    R3_baseline_snapshot_missing_governance: |
      When bootstrap_mode = baseline_snapshot_v1, baseline_snapshot.baseline_owner
      must be set AND every entries[].baseline_review_summary must be
      non-empty (≥ 20 chars). Either missing → P0 FAIL.
    R4_pending_implementation_child_plan_validity: |
      See coverage_status_spec.pending_implementation.child_plan_validity
      schema; (a) violation P0 FAIL, (b)/(c)/(d) WARNING.

# ─────────────────────────────────────────────────────────────────────
# Executor schema (Schema patch v2 A4)
# ─────────────────────────────────────────────────────────────────────
# Formal shape for rule_classes[].executors[] and executors_planned[].
# Previously implicit from examples; formalized to prevent typos like
# `executor:` / `planned_executor:` / `executors_plan:` and to give Go
# code a clear unmarshal target.

executor_schema:
  required:
    - file        # repo-relative path
    - symbol      # Go function name (or `phase.<id>` for runtime_state_machine_phase)
    - executor_kind  # must be in executor_kind_spec.enum
  optional:
    - hook_phase    # PreToolUse / SessionStart / commit-msg / pre-commit / Stop / pre-push / etc.
    - block_or_warn # block | warn
    - notes         # free-text maintainer notes
    - instance_count  # for dispatchers managing N validators (e.g. runCommitMsgHook → 19)
  used_by:
    - coverage_status_spec.mechanical.executors[]
    - coverage_status_spec.pending_implementation.executors_planned[]
  lint_behavior: |
    Each item in executors[] or executors_planned[] must contain all
    required keys. Missing required key → P0 FAIL with explicit
    "executor missing required field <name>" message. Unknown keys
    → WARNING (forward compat).

# ─────────────────────────────────────────────────────────────────────
# upstream_classes scope (Round-4 T5 / Round-5 U3, ADR-010)
# ─────────────────────────────────────────────────────────────────────

upstream_classes_scope:
  governing_adr: constitution/ADR-010-registry-upstream-classes-scope-freeze.md
  schema: |
    rule_classes[].upstream_classes: []  # optional, array of rule_class id
  # Schema patch v2 A3 — distinguish what lint mechanically enforces
  # vs what is human-readable documentation only. Prevents readers from
  # assuming `is_for` / `is_not_for` semantics are checked by lint.
  mechanically_enforced:
    - reference_resolution    # R1 compile_time: upstream_classes ids must exist
    - cycle_detection         # R1 compile_time: transitive closure no cycles
  documentation_only:
    - is_for                  # human-readable scope; lint does NOT enforce semantics
    - is_not_for              # human-readable boundary; reviewers enforce via ADR check
    - supersession            # process rule, not machine-checkable
  is_for:
    - promotion_traceability
    - cycle_prevention
    - coverage_report_visualization  # future Phase 4
  is_not_for:
    - execution_ordering        # → runtime/phases/phase-machine.yaml
    - dependency_injection      # → Go code
    - runtime_orchestration     # → runtime/scheduler/
    - dag_based_scheduling      # → not a task scheduler
    - generic_graph_metadata    # no downstream_classes / promotion_role / artifact_type
  supersession: |
    Any new field crossing the IS NOT boundary requires a new ADR that
    explicitly supersedes ADR-010. Silent schema expansion is prohibited.
    See ADR-010 §Supersession Clause for the required ADR contents.
  adr_revision_policy: supersede_required

# ─────────────────────────────────────────────────────────────────────
# Rule Classes (28 total)
#   Distribution: mechanical 14 / pending_implementation 2 /
#                 behavioral_only 7 / not_mechanizable 2 /
#                 research_required 2 / deprecated 0  (==28 within 24/40 thresholds)
# ─────────────────────────────────────────────────────────────────────

rule_classes:

  # ═══ MECHANICAL ═══════════════════════════════════════════════════

  - id: bootstrap_integrity
    coverage: mechanical
    source_files:
      - runtime/core-bootstrap.yaml#per_session_obligations
      - CORE_BOOTSTRAP.md
    executors:
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: runPreToolUseHook
        executor_kind: hook_dispatcher_entry
        hook_phase: PreToolUse
        block_or_warn: block
        notes: "enforces gate.bootstrap.receipt_present via transcriptHasRequiredBootstrapReads"
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: runSessionStartHook
        executor_kind: hook_dispatcher_entry
        hook_phase: SessionStart
        block_or_warn: warn
        notes: "injects Receipt template + required-reads reminder"
    rationale: |
      Bootstrap Receipt is session integrity anchor. Bypass = skipping all
      required reads. Read-log gate prevents copy-paste fabrication.
    verification_status:
      symbol_exists: ✓
      scenario_exists: ✓
      regression_exists: ✓  # bootstrap-bypass-on-resume failure pattern
      runtime_observed: pending  # runtime.executor_observations table not yet wired
    coverage_evidence:
      expected_instance_count: 1
      validation_scenarios:
        - validation/scenarios/bootstrap/bootstrap-receipt-required-reads-gate-v1.yaml
        - validation/scenarios/bootstrap/bootstrap-bypass-on-resume-v1.yaml
      coverage_target_pct: 100

  - id: cognitive_mode_governance
    coverage: mechanical
    source_files:
      - runtime/core-bootstrap.yaml#per_turn_obligations
      - runtime/cognitive-modes.yaml
      - runtime/cognitive-modes-discovery.yaml
      - runtime/cognitive-modes-phase-integration.yaml
      - runtime/cognitive-modes-governance-integration.yaml
      - runtime/cognitive-modes-memory-integration.yaml
      - runtime/cognitive-modes-cost-class.yaml
      - runtime/cognitive-modes-adaptive.yaml
    executors:
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: runCommitMsgHook
        executor_kind: hook_dispatcher_entry
        hook_phase: commit-msg
        block_or_warn: block
        notes: "dispatcher for all per-commit validators"
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateExecutionModeFloors
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateGovernanceModeConsistency
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateMemoryModeSubdir
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateCognitiveCost
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateActivationSignals
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateCapabilitySnippet
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateTokenBudget
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateAdaptiveTriggers
        executor_kind: commit_msg_validator
        block_or_warn: block
      # validateCognitiveContractFormat lives in cognitive_modes pkg (different file);
      # confirmed via runCommitMsgHook dispatch.
    rationale: |
      All cognitive-mode-related commit obligations bundled into one
      rule_class because they share dispatcher + collectively enforce a
      single discipline (cognitive mode declaration must be consistent
      and complete on every commit).
    verification_status:
      symbol_exists: ✓
      scenario_exists: ✓
      regression_exists: partial
      runtime_observed: pending

  - id: plan_governance
    coverage: mechanical
    source_files:
      - runtime/plan-status-sync-enforcement.yaml
      - plans/README.md
    executors:
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validatePlanStatusSync
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validatePlanCheckboxSync
        executor_kind: commit_msg_validator
        block_or_warn: block
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validatePlanArchivalAudit
        executor_kind: commit_msg_validator
        block_or_warn: block
    rationale: |
      Plan lifecycle (status / checkbox / archival) shares the same
      governance domain — keeping a plan file truthful about what is
      done, in progress, or archived.
    verification_status:
      symbol_exists: ✓
      scenario_exists: partial
      regression_exists: partial
      runtime_observed: pending

  - id: evidence_hierarchy
    coverage: mechanical
    source_files:
      - enforcement/evidence-hierarchy.yaml
      - enforcement/evidence-hierarchy.md
    executors:
      - file: scripts/ai-skill-cli/internal/app/hooks.go
        symbol: validateEvidenceHierarchy
        executor_kind: commit_msg_validator
        block_or_warn: block
    rationale: |
      Forces commit messages claiming completion with code work to cite
      evidence at the appropriate hierarchy level.
