schema_version: executable-contract/v1
id: enforcement.linked-updates.contract
title: Linked updates executable contract
owner_layer: enforcement
source_markdown: enforcement/linked-updates.md
status: active
contract_type: policy_gate
blocking_level: blocking

runtime_projection:
  enabled: true
  target_key: enforcement.linked_updates.contract
  surface_type: executable_yaml_contract
  execution_scope: repo_writeback

activation:
  events:
    - multi_file_change
    - architecture_update
    - enforcement_rule_added_or_changed
    - workflow_changed
    - runtime_or_compiler_changed
    - validation_or_knowledge_changed
    - plan_completion
  required_when:
    - A change can affect another document, index, workflow entrypoint, runtime surface, template, or tool adapter.
    - A new executable YAML contract is added or an owner-layer executable rule changes.
    - Runtime compiler mappings, `runtime/runtime.db`, knowledge runtime sources, or validation scenarios change.

required_sources:
  always:
    - enforcement/linked-updates.md
    - enforcement/dependency-reading.md
  common_by_change:
    enforcement:
      - enforcement/README.md
      - enforcement/content-layering.md
      - related workflow entrypoints
      - metadata/rules/<rule>.yaml
    workflow:
      - workflow/<domain>/README.md
      - runtime/onboarding/ relevant quickstart when present
      - related cross-links
    runtime_or_compiler:
      - runtime/README.md
      - runtime/runtime.db
      - scripts/ai-skill-cli/internal/app/runtime_compiler.go
    knowledge_or_validation:
      - knowledge/runtime/README.md
      - validation/README.md
      - related scenario or registry sources
    plan:
      - plans/README.md
      - active plan source

steps:
  - id: classify_changed_paths
    order: 1
    action: Classify each changed path by owner layer and linked-update row.
    outputs:
      - changed_path_matrix
  - id: build_required_linked_checks
    order: 2
    action: Use the Markdown linked-update table to list required updates or explicit no-update decisions.
    required_sources:
      - enforcement/linked-updates.md
    outputs:
      - required_linked_checks
  - id: apply_or_record_decisions
    order: 3
    action: Update linked files, indexes, runtime surfaces, metadata, or record why each linked update is not applicable.
    gates:
      - gate.linked_updates.required_checks_closed
  - id: refresh_runtime_when_needed
    order: 4
    action: Run runtime compile / refresh / validate when changed files hit runtime mappings, generated surfaces, knowledge, validation, or compiler rules.
    required_if:
      - runtime_or_knowledge_surface_touched
      - executable_contract_added_or_changed
    gates:
      - gate.linked_updates.runtime_synced
  - id: close_writeback
    order: 5
    action: Ensure diff review, validation, staging, one or more logical commits, authorized push before conversation close, readback, and final clean/ahead status handling are complete.
    gates:
      - gate.linked_updates.writeback_closed

gates:
  - id: gate.linked_updates.required_checks_closed
    blocks: commit
    pass_when:
      - every changed owner group has linked checks
      - each linked check is updated or has a concrete not-applicable reason
    fail_when:
      - agent says linked updates are optional
      - related README, metadata, runtime, or workflow entrypoints are ignored
  - id: gate.linked_updates.runtime_synced
    blocks: commit
    pass_when:
      - runtime compile / refresh / validate passed when required
      - "`runtime/runtime.db` is staged when generated surfaces changed"
      - generated surface target key and data content are checked for executable contracts
    fail_when:
      - compiler success is assumed without SQLite content assertion
      - runtime.db changes are left unstaged
  - id: gate.linked_updates.writeback_closed
    blocks: final_completion_response
    pass_when:
      - diff review completed
      - validation completed or blocker reported
      - commit completed when authorized
      - multiple commits are allowed only when each commit is a logical unit
      - push/readback completed before task completion, task switch, final summary, or writeback transaction closure
      - git log origin/<branch>..HEAD is empty before completion is claimed
      - push/readback status and final git status are reported

required_evidence:
  - changed path matrix
  - linked update checklist with update / not_applicable decisions
  - runtime compile / refresh / validate summaries when applicable
  - generated surface target key and data assertion for executable contracts
  - final git status
  - post-push readback status and origin/<branch>..HEAD empty confirmation

success_criteria:
  - No required linked update is left implicit.
  - Runtime and knowledge generated surfaces are refreshed when source mappings require it.
  - Executable contract additions update inventory, runtime projection, validation, and relevant indexes.
  - Final response reports pending ahead/behind, dirty state, or unpushed commits when push is not authorized.

failure_modes:
  - id: optional_linked_update_language
    detection: Agent describes required linked updates as optional or future work.
    recovery: Reclassify as blocking linked update or record not-applicable reason.
  - id: runtime_surface_stale
    detection: Source changed but generated surface or runtime.db was not refreshed.
    recovery: Run runtime compile / refresh / validate and stage runtime artifacts.
  - id: mixed_owner_commit
    detection: Unrelated owner groups are committed together without grouping decision.
    recovery: Split by owner group or use close-loop automation when available.

final_status_report:
  required_fields:
    - changed_owner_groups
    - linked_updates_applied
    - linked_updates_not_applicable
    - runtime_sync_status
    - validation_status
    - git_status
