schema_version: executable-contract/v1
id: enforcement.failure-learning-system.contract
title: "Failure learning system executable contract"
owner_layer: enforcement
source_markdown: enforcement/failure-learning-system.md
status: active
contract_type: policy_gate
blocking_level: blocking

runtime_projection:
  enabled: true
  target_key: enforcement.failure_learning_system.contract
  surface_type: executable_yaml_contract
  execution_scope: durable_failure_prevention

activation:
  priority: P1
  triggers:
    - {"matches":["失誤","漏讀","忘記","錯誤","failure","miss","漏做","閉環不完整"],"type":"user_signal"}
    - {"matches":["close-loop","commit","push","sync","dirty","ahead","behind"],"type":"validation_gap"}
    - {"matches":["debug","troubleshoot","fix-error"],"type":"task_intent"}
  required_when:
    - "The user points out an agent mistake, close-loop gap, source/mirror drift, missed dependency, incomplete validation, forgotten goal, or unsafe parallel work."
    - "A failure pattern may recur across agents, tools, projects, or workflows."

required_sources:
  - enforcement/failure-learning-system.md
  - enforcement/dependency-reading.md

steps:
  - id: capture_failure
    order: 1
    action: "記錄發生什麼、在哪裡被發現、造成什麼 user-facing risk。"
  - id: classify_failure
    order: 2
    action: "用 failure taxonomy 命名 class。"
  - id: contain_current_risk
    order: 3
    action: "先控制當前風險，再做 promotion。"
  - id: promote_to_durable_target
    order: 4
    action: "選擇 failure-pattern、feedback lesson、validation scenario、tool doc 或 goal note。"
  - id: strengthen_guardrail
    order: 5
    action: "補強會防止重犯的 rule、workflow、checklist、adapter 或 validation gate。"
  - id: validate_prevention
    order: 6
    action: "確認未來 agent 找得到並能套用 prevention。"

gates:
  - id: gate.failure_learning.failure_class_named
    rule: "Failure class 已命名。"
  - id: gate.failure_learning.prevention_target_selected
    rule: "Durable prevention target 已選定。"
  - id: gate.failure_learning.validation_added_or_checked
    rule: "已檢查或新增 validation。"

required_evidence:
  - activation trigger matched or task context explains why this contract is required
  - required sources were read or marked not applicable
  - gates passed or blocker/recovery was reported

success_criteria:
  - contract activation is evaluated from this YAML, not duplicated in activation_rules
  - agent can name required sources, steps, gates, and failure modes before claiming compliance

failure_modes:
  - id: fix_only_current_file
    detection: "只修當下文件，沒有建立 durable prevention。"
    recovery: "執行 capture -> classify -> promote -> strengthen -> validate。"
  - id: unsanitized_failure_record
    detection: "Failure record 含私有路徑、host、token 或 project-specific evidence。"
    recovery: "先 sanitize 再 promotion。"

final_status_report:
  - contract_loaded
  - gates_checked
  - validation_or_blocker
